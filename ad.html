  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
  <style>
    /* ── 광고 그리드 (장터 동일 규칙: PC 4열 / 모바일 2열 / 페이지당 12개) ── */
    .ad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px 24px 24px;
    }
    @media (max-width: 1100px) { .ad-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .ad-grid { grid-template-columns: repeat(2, 1fr); padding: 14px 16px 18px; gap: 14px; } }
    @media (max-width: 400px)  { .ad-grid { grid-template-columns: 1fr; } }

    /* ── 광고 카드 (장터 market-card 동일 규칙) ── */
    .ad-card {
      border: 1.5px solid var(--rss-border);
      border-radius: var(--rss-radius-lg);
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .ad-card:hover {
      border-color: var(--rss-amber);
      box-shadow: 0 4px 16px rgba(245,158,11,0.12);
      transform: translateY(-2px);
    }
    .ad-card__img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      background: #f3f4f6;
      display: block;
    }
    .ad-card__body { padding: 14px 16px 18px; }
    /* 업체명: market-card__title 동일 스타일 */
    .ad-card__company {
      font-size: var(--rss-font-md);
      font-weight: 700;
      color: var(--rss-text);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── 광고문의 인라인 텍스트 (헤더 우측) ── */
    .ad-inquiry {
      font-size: var(--rss-font-sm);
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .ad-inquiry strong {
      color: var(--rss-text);
      font-weight: 600;
    }
  </style>
</head>

  <script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
    });
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            if (node.tagName === 'IMG') {
              node.addEventListener('error', function() { applyPlaceholder(this); });
            }
            node.querySelectorAll && node.querySelectorAll('img').forEach(function(img) {
              img.addEventListener('error', function() { applyPlaceholder(this); });
            });
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
  </script>
