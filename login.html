<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- 공통 커스텀 CSS -->
  <link rel="stylesheet" href="rss-common.css" />

  <style>
    /* ── 로그인 페이지 전체 ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      background: #f0ede6; /* 전체 크림/베이지 배경 — 앰버 메인 컬러를 은은하게 표현 */
    }

    /* ── 왼쪽 비주얼 패널 — 비율 1 (flex: 2) ── */
    .login-visual {
      display: none; /* 모바일 기본 숨김 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 2;          /* 왼쪽 비율 2 */
      position: relative;
      overflow: hidden;
      background: #f0ede6;
    }
    @media (min-width: 1024px) {
      .login-visual { display: flex; }
    }

    /* ── 왼쪽 패널 내부 콘텐츠 ── */
    .login-visual__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      text-align: center;
    }

    /* ── 로고 원형 카드 + 아이콘 배지 래퍼 ── */
    .login-logo-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 40px;
    }

    /* 흰색 원형 카드 (로고 담는 원) */
    .login-logo-circle {
      position: absolute;
      inset: 20px; /* 배지 공간 확보 */
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 원형 카드 안의 로고 이미지 */
    .login-logo-circle img {
      width: 80%;
      height: auto;
      object-fit: contain;
    }

    /* 아이콘 배지 공통 스타일 */
    .login-icon-badge {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #F59E0B;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(245,158,11,0.35);
    }
    .login-icon-badge svg {
      width: 18px;
      height: 18px;
      color: #ffffff;
      stroke: #ffffff;
    }

    /* 배지 위치 — 오른쪽 상단 */
    .login-icon-badge--top-right {
      top: 4px;
      right: 4px;
    }
    /* 배지 위치 — 왼쪽 하단 */
    .login-icon-badge--bottom-left {
      bottom: 4px;
      left: 4px;
    }

    /* 헤드라인 */
    .login-visual__headline {
      font-size: 30px;
      font-weight: 800;
      color: #1a1c23;
      line-height: 1.35;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    /* 설명 문구 */
    .login-visual__desc {
      font-size: var(--rss-font-base);
      color: #7c7c7c;
      line-height: 1.9;
    }

    /* 저작권 */
    .login-visual__footer {
      font-size: var(--rss-font-sm);
      color: #b8b2a8;
      position: absolute;
      bottom: 28px;
    }

    /* ── 오른쪽 폼 패널 — 비율 1.5 (flex: 3) ── */
    .login-form-panel {
      flex: 3;          /* 오른쪽 비율 3 → 왼쪽 2 : 오른쪽 3 = 1 : 1.5 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 48px;
      background: #f5f2eb; /* 오른쪽도 크림 계열 */
    }
    @media (max-width: 640px) {
      .login-form-panel { padding: 24px 20px; }
    }

    /* ── 로그인 카드 ── */
    .login-card {
      width: 100%;
      max-width: 420px;  /* 오른쪽 패널이 넓어졌으므로 카드도 확장 */
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    /* 카드 상단 앰버 라인 */
    .login-card__top-line {
      height: 4px;
      background: linear-gradient(90deg, #F59E0B 0%, #fbbf24 100%);
    }

    /* 카드 내부 패딩 */
    .login-card__body {
      padding: 28px 28px 24px;
    }

    /* 카드 타이틀 */
    .login-card__title {
      font-size: var(--rss-font-2xl);
      font-weight: 800;
      color: #1a1c23;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .login-card__subtitle {
      font-size: var(--rss-font-base);
      color: #9ca3af;
      text-align: center;
      margin-bottom: 20px;
    }

    /* 아이디/비밀번호 입력 + 로그인 버튼 가로 배치 래퍼 */
    .login-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* 입력 필드 (아이콘 포함) */
    .login-input-wrap {
      position: relative;
    }
    .login-input-wrap .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      width: 15px;
      height: 15px;
    }
    .login-input-field {
      width: 100%;
      padding: 11px 13px 11px 36px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: var(--rss-font-base);
      color: #1a1c23;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-input-field:focus {
      border-color: #F59E0B;
      background: #fff;
    }
    .login-input-field::placeholder { color: #c4c9d4; }

    /* 비밀번호 토글 버튼 */
    .pw-toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 2px;
      display: flex;
      align-items: center;
    }
    .pw-toggle-btn:hover { color: #6b7280; }

    /* 로그인 버튼 (앰버) */
    .login-submit-btn {
      width: 100%;
      padding: 13px;
      background: #F59E0B;
      color: #ffffff;
      font-size: var(--rss-font-md);
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .login-submit-btn:hover { background: #d97706; }

    /* 자동로그인 + 찾기 링크 행 */
    .login-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      margin-bottom: 16px;
    }
    .login-meta-row label {
      font-size: var(--rss-font-base);
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .login-meta-row .find-links {
      display: flex;
      gap: 10px;
    }
    .login-meta-row .find-links a {
      font-size: var(--rss-font-sm);
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.15s;
    }
    .login-meta-row .find-links a:hover { color: #6b7280; }

    /* 구분선 or */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 14px;
      font-size: var(--rss-font-sm);
      color: #c4c9d4;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* 회원가입 버튼 */
    .login-signup-btn {
      width: 100%;
      padding: 12px;
      background: #ffffff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: var(--rss-font-base);
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
    }
    .login-signup-btn:hover { border-color: #F59E0B; color: #1a1c23; }

    /* 안내 박스 */
    .login-notice-box {
      margin-top: 12px;
      padding: 11px 12px;
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.18);
      border-radius: 8px;
      font-size: var(--rss-font-sm);
      color: #7c7c7c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .login-notice-box strong { color: #374151; }

    /* 테스트 빠른 로그인 */
    .login-test-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f0ede6;
    }
    .login-test-label {
      font-size: var(--rss-font-sm);
      color: #b8b2a8;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }
    .login-test-btns {
      display: flex;
      gap: 6px;
    }
    .login-test-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      font-size: var(--rss-font-sm);
      font-weight: 600;
      color: #6b7280;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .login-test-btn:hover { border-color: #F59E0B; color: #1a1c23; }

    /* 모바일 전용 로고 */
    .login-mobile-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .login-mobile-logo img { height: 56px; width: auto; }
    @media (min-width: 1024px) { .login-mobile-logo { display: none; } }
  </style>
</head>
<body>

<div class="login-page">

  <!-- ══════════════════════════════════════════════════════
       왼쪽 비주얼 패널 (PC 1024px 이상에서만 표시)
       크림 배경 + 로고 원형 카드 + 서비스 아이콘 배지
  ══════════════════════════════════════════════════════ -->
  <aside class="login-visual" aria-hidden="true">

    <div class="login-visual__content">

      <!-- 로고 원형 카드 + 아이콘 배지 -->
      <div class="login-logo-wrap">

        <!-- 흰색 원형 카드 안의 RSS 로고 -->
        <!-- [이미지 경로] /assets/logo-rss.svg 또는 /assets/logo-rss-new.png -->
        <div class="login-logo-circle">
          <img src="assets/images/logo-rss-new.png" alt="RSS 로고">
        </div>

        <!-- 아이콘 배지 1 (오른쪽 상단) — 서비스 아이콘 -->
        <div class="login-icon-badge login-icon-badge--top-right">
          <i data-lucide="shield-check" style="width:20px;height:20px;"></i>
        </div>

        <!-- 아이콘 배지 2 (왼쪽 하단) — 서비스 아이콘 -->
        <div class="login-icon-badge login-icon-badge--bottom-left">
          <i data-lucide="lock" style="width:20px;height:20px;"></i>
        </div>

      </div>

      <!-- 헤드라인 + 설명 -->
      <h1 class="login-visual__headline">로드세이프티<br>시스템</h1>
      <p class="login-visual__desc">
        안전한 도로 공사 관리<br>
        효율적인 차단 기업 운영
      </p>

      <!-- 저작권 -->
      <p class="login-visual__footer">COPYRIGHTS © 2026 한국도로차단. ALL RIGHTS RESERVED.</p>

    </div>

  </aside>

  <!-- ══════════════════════════════════════════════════════
       오른쪽 폼 패널
  ══════════════════════════════════════════════════════ -->
  <div class="login-form-panel">

    <!-- 모바일 로고 -->
    <div class="login-mobile-logo">
      <img src="assets/images/logo-rss-new.png" alt="로드세이프티시스템 로고" />
    </div>

    <!-- 로그인 카드 -->
    <div class="login-card">

      <div class="login-card__top-line"></div>

      <div class="login-card__body">

        <!-- 카드 타이틀 -->
        <h2 class="login-card__title">로그인</h2>
        <p class="login-card__subtitle">서비스 이용을 위해 로그인해주세요.</p>

        <!-- 로그인 폼 -->
        <form id="loginForm" onsubmit="handleLogin(event)">

          <!-- 아이디 입력 -->
          <div class="login-input-group">
            <div class="login-input-wrap">
              <i class="input-icon" data-lucide="user"></i>
              <input
                type="text"
                id="userId"
                class="login-input-field"
                placeholder="아이디"
                required
              />
            </div>

            <!-- 비밀번호 입력 -->
            <div class="login-input-wrap">
              <i class="input-icon" data-lucide="lock"></i>
              <input
                type="password"
                id="userPassword"
                class="login-input-field"
                placeholder="비밀번호"
                required
              />
              <button type="button" class="pw-toggle-btn" onclick="togglePasswordVisibility()">
                <i data-lucide="eye" style="width:16px;height:16px;"></i>
              </button>
            </div>
          </div>

          <!-- 로그인 버튼 -->
          <button type="submit" class="login-submit-btn">
            <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
            <span>로그인</span>
          </button>

        </form>

        <!-- 자동로그인 + 찾기 링크 -->
        <div class="login-meta-row">
          <label>
            <input type="checkbox" id="autoLogin" />
            자동로그인
          </label>
          <div class="find-links">
            <a href="#" id="findIdLink">아이디 찾기</a>
            <span style="color:#e5e7eb;">|</span>
            <a href="#" id="findPwLink">비밀번호 찾기</a>
          </div>
        </div>

        <!-- 구분선 -->
        <div class="login-divider">or</div>

        <!-- 회원가입 버튼 -->
        <button type="button" class="login-signup-btn" onclick="location.href='register-terms.html'">
          <i data-lucide="user-plus" style="width:16px;height:16px;"></i>
          <span>신규 기업 회원가입</span>
        </button>

        <!-- 안내 박스 -->
        <div class="login-notice-box">
          <i data-lucide="alert-circle" style="width:15px;height:15px;flex-shrink:0;"></i>
          <span>사업자번호를 보유한 <strong>기업회원만 이용할 수 있습니다.</strong></span>
        </div>

        <!-- 테스트 빠른 로그인 -->
        <div class="login-test-section">
          <p class="login-test-label">테스트 빠른 로그인</p>
          <div class="login-test-btns">
            <button type="button" class="login-test-btn" onclick="testLogin('company')">
              <span>기업주</span>
            </button>
            <button type="button" class="login-test-btn" onclick="testLogin('employee')">
              <span>직원</span>
            </button>         </div>
        </div>

      </div>

    </div>

  </div>

</div>

<!-- [L1] 아이디 찾기: find-id.html 페이지로 이동 (기존 모달 제거) -->

<script>
  /* ── 비밀번호 표시/숨김 토글 ── */
  function togglePasswordVisibility() {
    const pwInput = document.getElementById('userPassword');
    const isPassword = pwInput.type === 'password';
    pwInput.type = isPassword ? 'text' : 'password';
  }

  /* ── 로그인 폼 제출 ── */
  function handleLogin(event) {
    event.preventDefault();
    const userId = document.getElementById('userId').value;
    const userPassword = document.getElementById('userPassword').value;
    
    // [Java] 서버에 로그인 요청
    console.log('로그인 시도:', userId);
    
    // 임시: 로그인 성공 시뮬레이션
    sessionStorage.setItem('rss_mber_id', userId);
    sessionStorage.setItem('rss_mber_type', 'company'); // 기본값
    window.location.href = 'index.html';
  }

  /* ── Lucide 아이콘 초기화 ── */
  lucide.createIcons();

  /* ── 테스트 로그인 함수 ── */
  function testLogin(type) {
    let userName = '';
    let dest = 'index.html';
    if (type === 'company') {
      userName = '김철수';
      /* [Java] 기업주 로그인 → 대시보드(index.html) */
      dest = 'index.html';
    } else if (type === 'employee') {
      userName = '이영희';
      /* [Java] 직원 로그인 → 대시보드(index.html) */
      dest = 'index.html';
    }
    sessionStorage.setItem('rss_mber_type', type);
    sessionStorage.setItem('rss_mber_name', userName);
    window.location.href = dest;
  }

  /* ── 찾기 링크 이벤트 ── */
  /* [L1] 아이디 찾기 → find-id.html 페이지로 이동 */
  document.getElementById('findIdLink').addEventListener('click', function(e) {
    e.preventDefault();
    window.location.href = 'find-id.html';
  });
  /* [L2] 비밀번호 찾기 → 추후 find-pw.html 연결 예정 */
  document.getElementById('findPwLink').addEventListener('click', function(e) {
    e.preventDefault();
    /* [Java] 비밀번호 찾기 페이지 연결 시 window.location.href = 'find-pw.html'; */
    alert('비밀번호 찾기 페이지는 준비 중입니다.');
  });
</script>

  <script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    // 기존 이미지에 onerror 등록
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
    });
    // 동적으로 추가되는 이미지 감지
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            if (node.tagName === 'IMG') {
              node.addEventListener('error', function() { applyPlaceholder(this); });
            }
            node.querySelectorAll && node.querySelectorAll('img').forEach(function(img) {
              img.addEventListener('error', function() { applyPlaceholder(this); });
            });
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
  </script>
</body>
</html>
