<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css?v=39044c6" />
  <style>
     /* ── 장터 그리드/카드: rss-common.css .rss-gallery-grid / .rss-gallery-card 공통 클래스 사용 ── */

    /* ── 모바일: 툴바 한 줄 유지 ── */
    @media (max-width: 768px) {
      /* 필터+툴바 래퍼: 모바일에서 세로 스택 */
      .rss-filter-toolbar-wrap {
        flex-direction: column !important;
        align-items: stretch !important;
      }
      /* 필터 탭: 가로 스크롤 한 줄 */
      .rss-filter-bar {
        flex-wrap: nowrap !important;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;       /* Firefox */
        padding: 10px 16px !important;
        gap: 6px !important;
      }
      .rss-filter-bar::-webkit-scrollbar { display: none; } /* Chrome/Safari */
      .cat-tab {
        flex-shrink: 0;
        white-space: nowrap;
        padding: 5px 10px !important;
        font-size: 12px !important;
      }
      /* 툴바: 모바일에서도 한 줄 유지 (내글보기+검색+등록하기) */
      .rss-filter-toolbar-wrap .rss-board-toolbar {
        height: auto !important;
        padding: 10px 16px !important;
        flex-wrap: nowrap !important;
        justify-content: flex-end;
        gap: 6px;
        border-top: 1px solid var(--rss-border);
      }
      /* 검색창: flex-grow로 남은 공간 채움 */
      .rss-filter-toolbar-wrap .rss-board-toolbar .rss-search-wrap {
        flex: 1;
        min-width: 0;
      }
      /* 내글보기 버튼: 텍스트 숨기고 아이콘만 */
      .rss-filter-toolbar-wrap .rss-board-toolbar #myPostBtn .btn-text {
        display: none;
      }
    }
  </style>
</head>

             .rss-filter-toolbar-wrap: PC에서 flex-row 한 줄, 모바일에서 flex-column 스택

<script>
  lucide.createIcons();

  /* 카테고리 탭 전환 (스토리보드 §B5 ①) */
  function switchCatTab(tab) {
    document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    /* [Java] location.href = '/market?category=' + tab.dataset.cat; */
  }

  /* 내 글 보기 토글 (스토리보드 §B5 ②) */
  function toggleMyPost(btn) {
    var isActive = btn.classList.contains('rss-btn--amber');
    btn.classList.toggle('rss-btn--amber', !isActive);
    btn.classList.toggle('rss-btn--outline', isActive);
    /* [Java] location.href = '/market?myYn=' + (isActive ? '' : 'Y'); */
  }
</script>
  <script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    // 기존 이미지에 onerror 등록
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
    });
    // 동적으로 추가되는 이미지 감지
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            if (node.tagName === 'IMG') {
              node.addEventListener('error', function() { applyPlaceholder(this); });
            }
            node.querySelectorAll && node.querySelectorAll('img').forEach(function(img) {
              img.addEventListener('error', function() { applyPlaceholder(this); });
            });
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
  </script>
