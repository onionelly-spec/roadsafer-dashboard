<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장터 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
  <style>
    /* ── 장터 그리드
       스토리보드 §B5 ④: PC 4열, 모바일 2열, 한 페이지 12개
    ── */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 20px 24px;
    }
    @media (max-width: 1100px) { .market-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .market-grid { grid-template-columns: repeat(2, 1fr); padding: 14px 16px; gap: 10px; } }
    @media (max-width: 400px)  { .market-grid { grid-template-columns: 1fr; } }

    /* ── 장터 상품 카드 ── */
    .market-card {
      border: 1.5px solid var(--rss-border);
      border-radius: var(--rss-radius-lg);
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .market-card:hover {
      border-color: var(--rss-amber);
      box-shadow: 0 4px 16px rgba(245,158,11,0.12);
      transform: translateY(-2px);
    }
    .market-card__img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      background: #f3f4f6;
      display: block;
    }
    .market-card__body { padding: 14px 16px 18px; }
    /* 카테고리 라벨 */
    .market-card__cat {
      font-size: var(--rss-font-sm);
      font-weight: 600;
      color: var(--rss-amber-dark);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    /* 제목: 카테고리 + 판매 (고정 문구, 스토리보드 §B5 ④) */
    .market-card__title {
      font-size: var(--rss-font-md);
      font-weight: 700;
      color: var(--rss-text);
      line-height: 1.5;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* 메타: 등록일(좌) + 아이디 마스킹(우) */
    .market-card__meta {
      font-size: var(--rss-font-sm);
      color: #9ca3af;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<div class="rss-app">
  <div id="rss-sidebar-wrap"></div>
  <div class="rss-main" id="rssMain">
    <div id="rss-header-wrap" data-title="장터" data-icon="shopping-bag"></div>

    <main class="rss-content">
      <div class="rss-card" style="padding:0;">

        <!-- ── 카테고리 필터 탭 (공통 .rss-filter-bar + .cat-tab)
             [Java] GET /market?category={cat}
             스토리보드 §B5 ①: 카테고리 선택 시 해당 카테고리 상품만 제시
        ── -->
        <div class="rss-filter-bar">
          <!-- [Java] th:classappend="${param.category == null || param.category == 'all'} ? 'active'" -->
          <button class="cat-tab active" data-cat="all"      onclick="switchCatTab(this)">전체</button>
          <button class="cat-tab"        data-cat="sinca"    onclick="switchCatTab(this)">씨인카</button>
          <button class="cat-tab"        data-cat="sign"     onclick="switchCatTab(this)">간판시설물</button>
          <button class="cat-tab"        data-cat="safety"   onclick="switchCatTab(this)">안전시설물</button>
          <button class="cat-tab"        data-cat="sinboard" onclick="switchCatTab(this)">씨인보드</button>
          <button class="cat-tab"        data-cat="tma"      onclick="switchCatTab(this)">TMA</button>
        </div>

        <!-- ── 검색 + 내 글 보기 + 등록하기 툴바 (공통 .market-toolbar)
             [Java] GET /market?myYn=Y&searchKeyword={keyword}
             스토리보드 §B5 ①②③
        ── -->
        <div class="market-toolbar" style="justify-content: space-between;">
          <div class="rss-board-toolbar__left">
            <!-- 내 글 보기 (스토리보드 §B5 ②) -->
            <!-- [Java] th:classappend="${param.myYn == 'Y'} ? 'rss-btn--amber' : 'rss-btn--outline'" -->
            <button type="button" class="rss-btn rss-btn--outline rss-btn--sm" id="myPostBtn"
                    onclick="toggleMyPost(this)">
              <i data-lucide="user" style="width:13px;height:13px;"></i>내 글 보기
            </button>
            <!-- 검색 (스토리보드 §B5 ①) -->
            <div class="rss-search-wrap">
              <input type="text" name="searchKeyword" id="marketSearchKeyword" placeholder="상품 검색" />
              <button type="button" aria-label="검색">
                <i data-lucide="search" style="width:15px;height:15px;"></i>
              </button>
            </div>
          </div>
          <div class="rss-board-toolbar__right">
            <!-- 등록하기 (스토리보드 §B5 ③) -->
            <a href="market-write.html" class="rss-btn rss-btn--amber">
              <i data-lucide="plus" style="width:14px;height:14px;"></i>등록하기
            </a>
          </div>
        </div>

        <!-- ── 장터 상품 그리드
             [DB] SELECT * FROM market ORDER BY reg_dtm DESC
             [Java] th:each="item : ${marketList}"
             스토리보드 §B5 ④: 최근 등록순, 한 페이지 12개
             - 제목: 카테고리 + '판매' 고정 문구
             - 아이디: 앞 4자리 + *** 마스킹
             - 대표 이미지: 첫 번째 이미지 (thumbImgUrl)
        ── -->
        <div class="market-grid">

          <!-- 카드 1 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=TMA-1" alt="씨인카 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">씨인카</p>
              <!-- [Java] th:text="${item.categoryLabel} + ' 판매'" -->
              <h3 class="market-card__title">씨인카 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-20</span><!-- [Java] th:text="${item.regDt}" -->
                <span>hope***</span><!-- [Java] th:text="${#strings.substring(item.usrId,0,4)} + '***'" -->
              </div>
            </div>
          </a>

          <!-- 카드 2 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=안전시설물" alt="안전시설물 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">안전시설물</p>
              <h3 class="market-card__title">안전시설물 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-20</span>
                <span>seho***</span>
              </div>
            </div>
          </a>

          <!-- 카드 3 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=간판시설물" alt="간판시설물 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">간판시설물</p>
              <h3 class="market-card__title">간판시설물 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-19</span>
                <span>seho***</span>
              </div>
            </div>
          </a>

          <!-- 카드 4 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=씨인카" alt="씨인카 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">씨인카</p>
              <h3 class="market-card__title">씨인카 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-18</span>
                <span>dea0***</span>
              </div>
            </div>
          </a>

          <!-- 카드 5 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=씨인보드" alt="씨인보드 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">씨인보드</p>
              <h3 class="market-card__title">씨인보드 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-17</span>
                <span>hope***</span>
              </div>
            </div>
          </a>

          <!-- 카드 6 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=TMA" alt="TMA 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">TMA</p>
              <h3 class="market-card__title">TMA 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-16</span>
                <span>seho***</span>
              </div>
            </div>
          </a>

          <!-- 카드 7 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=씨인카" alt="씨인카 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">씨인카</p>
              <h3 class="market-card__title">씨인카 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-15</span>
                <span>seho***</span>
              </div>
            </div>
          </a>

          <!-- 카드 8 -->
          <a href="market-detail.html" class="market-card">
            <img class="market-card__img" src="https://placehold.co/400x250/f3f4f6/9ca3af?text=안전시설물" alt="안전시설물 판매" loading="lazy" />
            <div class="market-card__body">
              <p class="market-card__cat">안전시설물</p>
              <h3 class="market-card__title">안전시설물 판매</h3>
              <div class="market-card__meta">
                <span>2026-06-12</span>
                <span>dea0***</span>
              </div>
            </div>
          </a>

        </div><!-- /market-grid -->

        <!-- ── 페이지네이션 (공통 .rss-pagination)
             스토리보드 §B5 ④: 한 페이지 12개
             [Java] Pageable pageable = PageRequest.of(page, 12);
             PC 10개 / 모바일 5개 표시
        ── -->
        <div class="rss-pagination" style="padding: 16px 0 20px;">
          <button class="rss-pagination__btn" aria-label="처음">
            <i data-lucide="chevrons-left" style="width:14px;height:14px;"></i>
          </button>
          <button class="rss-pagination__btn" aria-label="이전">
            <i data-lucide="chevron-left" style="width:14px;height:14px;"></i>
          </button>
          <button class="rss-pagination__btn active">1</button>
          <button class="rss-pagination__btn">2</button>
          <button class="rss-pagination__btn">3</button>
          <button class="rss-pagination__btn">4</button>
          <button class="rss-pagination__btn">5</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra">6</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra">7</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra">8</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra">9</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra">10</button>
          <button class="rss-pagination__btn" aria-label="다음">
            <i data-lucide="chevron-right" style="width:14px;height:14px;"></i>
          </button>
          <button class="rss-pagination__btn" aria-label="마지막">
            <i data-lucide="chevrons-right" style="width:14px;height:14px;"></i>
          </button>
        </div>

      </div><!-- /rss-card -->
    </main>

    <div id="rss-footer-wrap"></div>
  </div><!-- /rss-main -->
</div><!-- /rss-app -->

<script src="rss-common.js?v=764cc1che_bust"></script>
<script>
  lucide.createIcons();

  /* 카테고리 탭 전환 (스토리보드 §B5 ①) */
  function switchCatTab(tab) {
    document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    /* [Java] location.href = '/market?category=' + tab.dataset.cat; */
  }

  /* 내 글 보기 토글 (스토리보드 §B5 ②) */
  function toggleMyPost(btn) {
    var isActive = btn.classList.contains('rss-btn--amber');
    btn.classList.toggle('rss-btn--amber', !isActive);
    btn.classList.toggle('rss-btn--outline', isActive);
    /* [Java] location.href = '/market?myYn=' + (isActive ? '' : 'Y'); */
  }
</script>
</body>
</html>
