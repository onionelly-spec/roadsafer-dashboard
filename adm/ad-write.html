<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- [Java] th:text="${adSeq != null} ? '광고 수정 — 로드세이프티시스템 관리자' : '광고 등록 — 로드세이프티시스템 관리자'" -->
  <title>광고 등록/수정 — 로드세이프티시스템 관리자</title>
  <!-- 공통 CSS -->
  <link rel="stylesheet" href="../rss-common.css?v=20260526" />
  <link rel="stylesheet" href="adm-common-v2.css?v=20260526" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- CKEditor 4 CDN (standard 빌드, 한국어 포함) -->
  <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
</head>
<body>
<!-- ══════════════════════════════════════════════════
     관리자 레이아웃
══════════════════════════════════════════════════ -->
<div id="adm-topbar-wrap"></div>
<div class="adm-layout">
  <div id="adm-sidebar-wrap"></div>
  <div class="adm-main">
    <!-- 브레드크럼 -->
    <div class="adm-breadcrumb">
      <h1 class="adm-breadcrumb__title">광고 관리</h1>
      <nav class="adm-breadcrumb__nav" aria-label="breadcrumb">
        <a href="#">홈</a>
        <span class="adm-breadcrumb__sep">›</span>
        <!-- [Java] th:href="@{/adm/ad/list}" -->
        <a href="ad-list.html">광고 관리</a>
        <span class="adm-breadcrumb__sep">›</span>
        <!-- [Java] th:text="${adSeq != null} ? '수정' : '등록'" -->
        <span class="adm-breadcrumb__current">등록/수정</span>
      </nav>
    </div>
    <main class="rss-content">
      <!-- ══════════════════════════════════════════════════
           광고 등록/수정 폼 (M6-1)
           [Java] th:action="${adSeq != null}
                    ? @{/adm/ad/mod/{seq}(seq=${adSeq})}
                    : @{/adm/ad/reg}"
           [Java] th:method="post"
           [Java] th:enctype="multipart/form-data"
      ══════════════════════════════════════════════════ -->
      <form id="adWriteForm" method="post" action="#" enctype="multipart/form-data" novalidate>
        <!-- [Java] CSRF: th:hidden th:name="${_csrf.parameterName}" th:value="${_csrf.token}" -->
        <!-- [Java] 수정 모드: <input type="hidden" name="adSeq" th:value="${ad.adSeq}"> -->

        <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
             섹션: 광고 정보
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
        <section class="write-section" aria-labelledby="secAdTitle">
          <div class="write-section__head">
            <i data-lucide="megaphone" style="width:16px;height:16px;color:var(--rss-primary);flex-shrink:0;"></i>
            <h2 class="write-section__title" id="secAdTitle">광고 관리</h2>
            <span class="adm-required-note">*는 필수입니다</span>
          </div><!-- /write-section__head -->
          <div class="write-section__body">
            <table class="adm-form-table">
              <tbody>
                <!-- ─── 행 1: 제목 ────────────────────────────────────────
                     스토리보드: 자율입력, 50자 제한
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row">제목<span class="required">*</span></th>
                  <td>
                    <!-- [Java] th:value="${ad.adTitle}" -->
                    <input type="text" id="adTitle" name="adTitle"
                           class="rss-input" style="width:100%;"
                           placeholder="광고 제목을 입력하세요 (최대 50자)"
                           maxlength="50"
                           value="" />
                    <!-- 더미 수정 모드 예시: value="2026년 여름 특별 안전장비 프로모션" -->
                  </td>
                </tr>
                <!-- ─── 행 2: 업체명 ──────────────────────────────────────
                     스토리보드: 업체명 입력 + 찾기 버튼 → 업체 검색 모달
                     업체 선택 시 adCorpSeq(hidden) + adCorpNm(text) 자동 입력
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row">업체명<span class="required">*</span></th>
                  <td>
                    <div class="adm-find-group">
                      <!-- [Java] th:value="${ad.adCorpNm}" -->
                      <input type="text" id="adCorpNm" name="adCorpNm"
                             class="rss-input"
                             placeholder="업체명을 검색하세요"
                             readonly
                             value="" />
                      <!-- [Java] th:value="${ad.adCorpSeq}" -->
                      <input type="hidden" id="adCorpSeq" name="adCorpSeq" value="" />
                      <!-- 찾기 버튼 → 업체 검색 모달 오픈 -->
                      <button type="button" class="rss-btn rss-btn--outline"
                              onclick="openAdCorpSearchModal()">
                        <i data-lucide="search" style="width:14px;height:14px;margin-right:4px;vertical-align:middle;"></i>
                        찾기
                      </button>
                    </div>
                  </td>
                </tr>
                <!-- ─── 행 3: 대표이미지 ──────────────────────────────────
                     스토리보드: 이미지 파일 1개만 가능
                     파일 선택 후 파일명 + × 버튼으로 표시
                     × 클릭 시 이미지 삭제
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row" style="vertical-align:top;padding-top:12px;">대표이미지</th>
                  <td>
                    <div class="ad-img-area">
                      <!-- 파일 찾기 버튼 -->
                      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                        <button type="button" class="rss-btn rss-btn--outline"
                                onclick="triggerAdImgInput()">
                          <i data-lucide="image" style="width:14px;height:14px;margin-right:4px;vertical-align:middle;"></i>
                          이미지 찾기
                        </button>
                        <span class="adm-hint">* 이미지 1개만 가능 (jpg, png, gif)</span>
                        <!-- 실제 파일 input (hidden) -->
                        <input type="file" id="adImgInput" name="adImg"
                               accept="image/*"
                               style="display:none;"
                               onchange="addAdImg(this)" />
                      </div>
                      <!-- 선택된 이미지 파일 표시 -->
                      <!-- [Java] th:if="${ad.adImgNm != null}" -->
                      <div class="notice-file-list" id="adImgFileList">
                        <!-- 더미 — 수정 모드 예시 -->
                        <!-- [Java] th:if="${ad.adImgNm != null}" -->
                        <!--
                        <div class="notice-file-tag" id="adImgTag" data-img-nm="banner_2001.jpg">
                          <span class="notice-file-tag__name">banner_2001.jpg</span>
                          <button type="button" class="notice-file-tag__del"
                                  onclick="removeAdImg()"
                                  aria-label="이미지 삭제">×</button>
                        </div>
                        -->
                      </div>
                      <!-- 삭제 예정 이미지 여부 (수정 모드에서 Java로 전송) -->
                      <input type="hidden" id="adDeleteImgYn" name="deleteImgYn" value="N" />
                    </div>
                  </td>
                </tr>
                <!-- ─── 행 4: 광고기간 ────────────────────────────────────
                     스토리보드: 시작일 ~ 종료일 (date input 2개)
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row">광고기간<span class="required">*</span></th>
                  <td>
                    <div class="ad-period-wrap">
                      <!-- [Java] th:value="${#temporals.format(ad.adStartDt,'yyyy-MM-dd')}" -->
                      <input type="date" id="adStartDt" name="adStartDt"
                             class="rss-input"
                             value="" />
                      <span class="ad-period-sep">~</span>
                      <!-- [Java] th:value="${#temporals.format(ad.adEndDt,'yyyy-MM-dd')}" -->
                      <input type="date" id="adEndDt" name="adEndDt"
                             class="rss-input"
                             value="" />
                    </div>
                  </td>
                </tr>
                <!-- ─── 행 5: 내용 (CKEditor 4) ───────────────────────────
                     스토리보드: 에디터에서 광고 내용 작성
                     CKEditor 4 standard 빌드, 한국어 UI
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row" style="vertical-align:top;padding-top:12px;">
                    내용<span class="required">*</span>
                  </th>
                  <td>
                    <!-- CKEditor 4: textarea를 에디터로 대체 -->
                    <!-- [Java] 수정 모드: th:text="${ad.adContent}" -->
                    <textarea id="adContent" name="adContent"
                              class="notice-editor-wrap"
                              style="width:100%;min-height:300px;"
                              placeholder="광고 내용을 입력하세요."></textarea>
                  </td>
                </tr>
                <!-- ─── 행 6: 사용여부 ────────────────────────────────────
                     스토리보드: 공개 / 비공개 라디오
                     비공개 시 사용자 광고 목록에 표시되지 않음
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row">사용여부<span class="required">*</span></th>
                  <td>
                    <div class="notice-radio-group">
                      <!-- [Java] th:checked="${ad.adUseYn == 'Y' or ad.adUseYn == null}" -->
                      <label>
                        <input type="radio" id="adUseYnY" name="adUseYn" value="Y" checked />
                        공개
                      </label>
                      <!-- [Java] th:checked="${ad.adUseYn == 'N'}" -->
                      <label>
                        <input type="radio" id="adUseYnN" name="adUseYn" value="N" />
                        비공개
                      </label>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div><!-- /write-section__body -->
        </section><!-- /write-section -->

        <!-- ─── 하단 버튼 영역 ──────────────────────────────────
             스토리보드 ②: 저장 / ③: 취소
             버튼 순서: 취소 → 저장 (항상)
             저장: 필수 항목 확인 후 경고창 → 예 → 저장 후 목록(M6) 이동
             취소: 목록(M6)으로 이동
        ──────────────────────────────────────────────────────── -->
        <div class="rss-page-actions">
          <!-- ③ 취소 -->
          <!-- [Java] @{/adm/ad/list} -->
          <button type="button" class="rss-btn adm-btn--cancel"
                  onclick="location.href='ad-list.html'">취소</button>
          <!-- ② 저장 -->
          <button type="button" class="rss-btn adm-btn--save"
                  onclick="submitAdForm()">저장</button>
        </div>
      </form><!-- /adWriteForm -->
    </main>
    <div id="rss-footer-wrap"></div>
  </div><!-- /adm-main -->
</div><!-- /adm-layout -->
<!-- ══════════════════════════════════════════════════
     공통 스크립트
══════════════════════════════════════════════════ -->
<script src="adm-common.js?v=20260526"></script>
<script>
/* ─── CKEditor 4 초기화 ──────────────────────────────
   adm-common.js IIFE가 topbar/sidebar를 자동 삽입함
   CKEditor는 스크립트 로드 후 바로 replace() 호출 가능
──────────────────────────────────────────────────── */
if (window.lucide) lucide.createIcons();
CKEDITOR.replace('adContent', {
  language       : 'ko',          /* 한국어 UI */
  height         : 300,
  removePlugins  : 'elementspath', /* 하단 경로 표시 제거 */
  toolbar: [
    { name: 'styles',    items: ['Format', 'FontSize'] },
    { name: 'basicstyles',
      items: ['Bold', 'Italic', 'Underline', 'Strike', '-', 'RemoveFormat'] },
    { name: 'colors',    items: ['TextColor', 'BGColor'] },
    { name: 'paragraph',
      items: ['NumberedList', 'BulletedList', '-',
              'JustifyLeft', 'JustifyCenter', 'JustifyRight', 'JustifyBlock'] },
    { name: 'links',     items: ['Link', 'Unlink'] },
    { name: 'insert',    items: ['Image', 'Table', 'HorizontalRule', 'SpecialChar'] },
    { name: 'tools',     items: ['Maximize'] },
    { name: 'document',  items: ['Source'] }
  ],
  /* [Java] 이미지 업로드 URL 설정 시 아래 주석 해제
  filebrowserImageUploadUrl : '/adm/ad/upload/image',
  filebrowserUploadUrl      : '/adm/ad/upload/file',
  */
  contentsCss: ['https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap',
                'body { font-family: "Noto Sans KR", sans-serif; font-size: 14px; }']
});
/* [Java] 수정 모드: 기존 내용 로드
   CKEDITOR.instances['adContent'].setData('${ad.adContent}');
*/
/* 파일 input 초기화 */
document.getElementById('adImgInput').value = '';

/* ─── 이미지 찾기 버튼 트리거 ──────────────────────── */
function triggerAdImgInput() {
  document.getElementById('adImgInput').click();
}

/* ─── 대표이미지 추가 ───────────────────────────────── */
function addAdImg(input) {
  var fileList = document.getElementById('adImgFileList');
  var files = Array.from(input.files);
  if (files.length === 0) return;
  /* 이미지 1개만 허용: 기존 태그 제거 후 교체 */
  fileList.innerHTML = '';
  document.getElementById('adDeleteImgYn').value = 'N';
  var file = files[0];
  var tag = document.createElement('div');
  tag.className = 'notice-file-tag';
  tag.id = 'adImgTag';
  tag.dataset.newFile = 'true';
  tag.innerHTML =
    '<span class="notice-file-tag__name">' + escapeHtml(file.name) + '</span>' +
    '<button type="button" class="notice-file-tag__del" ' +
    'onclick="removeAdImg()" aria-label="이미지 삭제">×</button>';
  fileList.appendChild(tag);
  if (window.lucide) lucide.createIcons();
  /* input 초기화 (동일 파일 재선택 가능) */
  input.value = '';
}

/* ─── 대표이미지 삭제 ───────────────────────────────── */
function removeAdImg() {
  var fileList = document.getElementById('adImgFileList');
  fileList.innerHTML = '';
  /* 수정 모드: 기존 이미지 삭제 플래그 */
  document.getElementById('adDeleteImgYn').value = 'Y';
}

/* ─── HTML 이스케이프 유틸 ──────────────────────────── */
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── 업체 검색 모달 오픈 ───────────────────────────── */
function openAdCorpSearchModal() {
  /* [Java] 업체 검색 모달 연동 — adm-common.js의 공통 모달 함수 사용 예정 */
  /* 더미: 직접 입력 처리 */
  var corpNm = prompt('업체명을 입력하세요:');
  if (corpNm && corpNm.trim()) {
    document.getElementById('adCorpNm').value = corpNm.trim();
    /* [Java] 실제 연동 시 adCorpSeq도 함께 설정:
       document.getElementById('adCorpSeq').value = selectedCorp.corpSeq;
    */
    document.getElementById('adCorpSeq').value = '9999'; /* 더미 seq */
  }
}

/* ─── ② 저장 ────────────────────────────────────────
   필수 항목 확인 → 경고창 → 예 → 저장 후 목록(M6) 이동
   [Java] POST /adm/ad/reg  또는  PUT /adm/ad/mod/{seq}
──────────────────────────────────────────────────── */
function submitAdForm() {
  /* 제목 검증 */
  var title = document.getElementById('adTitle').value.trim();
  if (!title) {
    alert('제목을 입력하세요.');
    document.getElementById('adTitle').focus();
    return;
  }
  /* 업체명 검증 */
  var corpNm = document.getElementById('adCorpNm').value.trim();
  if (!corpNm) {
    alert('업체명을 선택하세요.');
    return;
  }
  /* 광고기간 검증 */
  var startDt = document.getElementById('adStartDt').value;
  var endDt   = document.getElementById('adEndDt').value;
  if (!startDt) {
    alert('광고 시작일을 입력하세요.');
    document.getElementById('adStartDt').focus();
    return;
  }
  if (!endDt) {
    alert('광고 종료일을 입력하세요.');
    document.getElementById('adEndDt').focus();
    return;
  }
  if (startDt > endDt) {
    alert('광고 종료일은 시작일 이후여야 합니다.');
    document.getElementById('adEndDt').focus();
    return;
  }
  /* CKEditor 내용 검증 */
  var editor  = CKEDITOR.instances['adContent'];
  var content = editor ? editor.getData() : '';
  var plainText = content.replace(/<[^>]*>/g, '').trim();
  if (!plainText) {
    alert('내용을 입력하세요.');
    if (editor) editor.focus();
    return;
  }
  /* 저장 확인 */
  if (!confirm('저장하시겠습니까?')) return;
  /* CKEditor 내용을 textarea에 동기화 */
  if (editor) editor.updateElement();
  /* [Java] 서버 요청으로 교체:
     document.getElementById('adWriteForm').submit();
  */
  console.log('[M6-1] 저장 요청 — title:', title, 'corpNm:', corpNm,
              'startDt:', startDt, 'endDt:', endDt);
  alert('저장 기능은 Java 연동 후 처리됩니다.');
  location.href = 'ad-list.html';
}
</script>
</body>
</html>
