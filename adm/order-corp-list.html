<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발주기업 관리 — 로드세이프티시스템 관리자</title>
  <!-- 공통 CSS -->
  <link rel="stylesheet" href="../rss-common.css?v=20260518" />
  <link rel="stylesheet" href="adm-common-v2.css?v=20260518" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     관리자 레이아웃
══════════════════════════════════════════════════ -->
<div id="adm-topbar-wrap"></div>
<div class="adm-layout">
  <div id="adm-sidebar-wrap"></div>
  <div class="adm-main">

    <!-- 브레드크럼 -->
    <div class="adm-breadcrumb">
      <h1 class="adm-breadcrumb__title">발주기업 관리</h1>
      <nav class="adm-breadcrumb__nav" aria-label="breadcrumb">
        <a href="#">로그인</a>
        <span class="adm-breadcrumb__sep">›</span>
        <a href="#">기업 관리</a>
        <span class="adm-breadcrumb__sep">›</span>
        <span class="adm-breadcrumb__current">발주기업 관리</span>
      </nav>
    </div>

    <main class="rss-content">
      <!-- ══════════════════════════════════════════════════
           발주기업 관리 목록 카드 (M4-3)
      ══════════════════════════════════════════════════ -->
      <div class="rss-card">

        <!-- ─── 검색 툴바 ──────────────────────────────────────
             스토리보드 ①: 검색조건 드롭다운 + 키워드 + 찾기
             오른쪽: 검색 + 엑셀 다운로드 + 등록
        ──────────────────────────────────────────────────────── -->
        <div class="rss-board-toolbar">
          <div class="rss-board-toolbar__left">
            <!-- 발주기업은 상태 구분 없음 (공개/비공개는 상세에서 관리) -->
          </div>
          <div class="rss-board-toolbar__right">
            <!-- [Java] th:value="${searchType}" -->
            <select id="orderCorpSearchType" class="rss-select">
              <option value="">선택</option>
              <!-- [Java] th:selected="${searchType == 'orderCorpNm'}" -->
              <option value="orderCorpNm">발주업체명</option>
              <!-- [Java] th:selected="${searchType == 'ceoNm'}" -->
              <option value="ceoNm">대표자명</option>
            </select>
            <!-- [Java] th:value="${keyword}" -->
            <input type="text" id="orderCorpSearchKeyword" class="rss-input rss-input--keyword"
                   placeholder=""
                   onkeydown="if(event.key==='Enter') searchOrderCorpList()" />
            <button type="button" class="rss-btn rss-btn--outline" onclick="searchOrderCorpList()">
              <i data-lucide="search" class="rss-icon-14"></i>
              찾기
            </button>
            <!-- 전체보기 버튼 — 검색 후에만 표시 -->
            <button type="button" class="rss-btn rss-btn--view-all" id="orderCorpViewAllBtn"
                    onclick="resetOrderCorpSearch()" style="display:none;">
              전체보기
            </button>
            <!-- ② 엑셀 다운로드 -->
            <button type="button" class="rss-btn adm-btn--excel" onclick="downloadOrderCorpExcel()">엑셀 다운로드</button>
            <!-- ③ 등록 -->
            <button type="button" class="rss-btn adm-btn--register" onclick="location.href='order-corp-write.html'">
              등록
            </button>
          </div>
        </div>

        <!-- ─── 목록 테이블 ────────────────────────────────────
             스토리보드 ③: 번호·발주업체명·대표자명·사업자번호·공사 수·등록일·공개
             - 발주업체명 클릭 → M4-3-1 등록/수정
             - 대표자명 클릭 → M4-3-1 등록/수정
             - 공사 수 클릭 → 공사정보(M1) 해당 기업 공사만 필터
             - 최근 등록순 30개/페이지
        ──────────────────────────────────────────────────────── -->
        <div class="rss-table-wrap">
          <div style="overflow-x:auto;">
            <!-- [Java] th:if="${#lists.isEmpty(orderCorpList)}" -->
            <!-- <div class="rss-empty">검색 결과가 없습니다.</div> -->
            <!-- [Java] th:unless="${#lists.isEmpty(orderCorpList)}" -->
            <table class="rss-table" id="orderCorpListTable" style="min-width:900px;">
              <colgroup>
                <col class="rss-col-no" />          <!-- 번호 5% -->
                <col class="rss-col-corp" />         <!-- 발주업체명 auto -->
                <col class="rss-col-author" />       <!-- 대표자명 10% -->
                <col class="rss-col-biz" />          <!-- 사업자번호 12% -->
                <col class="rss-col-mgmt" />         <!-- 공사 수 8% -->
                <col class="rss-col-date" />         <!-- 등록일 10% -->
                <col class="rss-col-open" />         <!-- 공개 5% -->
              </colgroup>
              <thead>
                <tr>
                  <th scope="col">번호</th>
                  <th scope="col">발주업체명</th>
                  <th scope="col">대표자명</th>
                  <th scope="col">사업자번호</th>
                  <th scope="col">공사 수</th>
                  <th scope="col">등록일</th>
                  <th scope="col">공개</th>
                </tr>
              </thead>
              <tbody>
                <!-- ══════════════════════════════════════════════════
                     [Java] th:each="corp : ${orderCorpList}"
                     더미 데이터 — 실제 데이터로 교체 필요
                ══════════════════════════════════════════════════ -->

                <!-- 행 1 -->
                <tr>
                  <!-- [Java] th:text="${corpStat.count}" -->
                  <td class="text-center">1</td>
                  <td>
                    <!-- [Java] th:href="@{/adm/order-corp/write(seq=${corp.orderCorpSeq})}" -->
                    <!-- [Java] th:text="${corp.orderCorpNm}" -->
                    <a href="order-corp-write.html?seq=1001" class="rss-link">용진토건</a>
                  </td>
                  <td>
                    <!-- [Java] th:href="@{/adm/order-corp/write(seq=${corp.orderCorpSeq})}" -->
                    <!-- [Java] th:text="${corp.ceoNm}" -->
                    <a href="order-corp-write.html?seq=1001" class="rss-link">김남준</a>
                  </td>
                  <!-- [Java] th:text="${corp.bizNo}" -->
                  <td class="text-center nowrap">000-00-00000</td>
                  <td class="text-center">
                    <!-- [Java] th:href="@{/adm/construction/list(orderCorpSeq=${corp.orderCorpSeq})}" -->
                    <!-- [Java] th:text="${corp.constCnt}" -->
                    <a href="construction-list.html?orderCorpSeq=1001" class="rss-link">0</a>
                  </td>
                  <!-- [Java] th:text="${#temporals.format(corp.regDt, 'yyyy-MM-dd')}" -->
                  <td class="text-center nowrap">2026-07-02</td>
                  <td class="text-center">
                    <!-- [Java] th:text="${corp.publicYn == 'Y'} ? '공개' : '비공개'" -->
                    <span class="adm-badge adm-badge--normal">공개</span>
                  </td>
                </tr>

                <!-- 행 2 -->
                <tr>
                  <td class="text-center">2</td>
                  <td>
                    <a href="order-corp-write.html?seq=1002" class="rss-link">한길안전</a>
                  </td>
                  <td>
                    <a href="order-corp-write.html?seq=1002" class="rss-link">박수만</a>
                  </td>
                  <td class="text-center nowrap">000-00-00000</td>
                  <td class="text-center">
                    <a href="construction-list.html?orderCorpSeq=1002" class="rss-link">21</a>
                  </td>
                  <td class="text-center nowrap">2026-06-25</td>
                  <td class="text-center">
                    <span class="adm-badge adm-badge--normal">공개</span>
                  </td>
                </tr>

                <!-- 행 3 -->
                <tr>
                  <td class="text-center">3</td>
                  <td>
                    <a href="order-corp-write.html?seq=1003" class="rss-link">스마트코리아</a>
                  </td>
                  <td>
                    <a href="order-corp-write.html?seq=1003" class="rss-link">김수창</a>
                  </td>
                  <td class="text-center nowrap">000-00-00000</td>
                  <td class="text-center">
                    <a href="construction-list.html?orderCorpSeq=1003" class="rss-link">0</a>
                  </td>
                  <td class="text-center nowrap">2026-06-15</td>
                  <td class="text-center">
                    <!-- 비공개 -->
                    <span class="adm-badge adm-badge--suspend">비공개</span>
                  </td>
                </tr>

                <!-- 행 4 -->
                <tr>
                  <td class="text-center">4</td>
                  <td>
                    <a href="order-corp-write.html?seq=1004" class="rss-link">오목세이프티</a>
                  </td>
                  <td>
                    <a href="order-corp-write.html?seq=1004" class="rss-link">오한길</a>
                  </td>
                  <td class="text-center nowrap">000-00-00000</td>
                  <td class="text-center">
                    <a href="construction-list.html?orderCorpSeq=1004" class="rss-link">0</a>
                  </td>
                  <td class="text-center nowrap">2026-06-16</td>
                  <td class="text-center">
                    <span class="adm-badge adm-badge--normal">공개</span>
                  </td>
                </tr>

                <!-- 행 5 -->
                <tr>
                  <td class="text-center">5</td>
                  <td>
                    <a href="order-corp-write.html?seq=1005" class="rss-link">소망안전</a>
                  </td>
                  <td>
                    <a href="order-corp-write.html?seq=1005" class="rss-link">이순희</a>
                  </td>
                  <td class="text-center nowrap">000-00-00000</td>
                  <td class="text-center">
                    <a href="construction-list.html?orderCorpSeq=1005" class="rss-link">34</a>
                  </td>
                  <td class="text-center nowrap">2026-06-02</td>
                  <td class="text-center">
                    <span class="adm-badge adm-badge--normal">공개</span>
                  </td>
                </tr>

                <!-- [Java] /th:each -->
              </tbody>
            </table>
          </div>
        </div><!-- /rss-table-wrap -->

        <!-- ─── 하단 영역: 페이지네이션(중) + 엑셀/등록(우) ── -->
        <!-- [Java] th:replace="fragments/pagination :: pagination(${pageInfo})" -->
        <div class="rss-pagination rss-pagination--with-actions" id="orderCorpPagination">
          <div class="adm-pagination-left">
            <!-- 발주기업 목록은 승인/반려 없음 — 빈 영역 -->
          </div>
          <button class="rss-pagination__btn" aria-label="첫 페이지" disabled>&lt;&lt;</button>
          <button class="rss-pagination__btn" aria-label="이전" disabled>&lt;</button>
          <button class="rss-pagination__btn active" data-page="1">1</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="2">2</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="3">3</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="4">4</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="5">5</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="6">6</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="7">7</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="8">8</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="9">9</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="10">10</button>
          <button class="rss-pagination__btn" aria-label="다음">&gt;</button>
          <button class="rss-pagination__btn" aria-label="마지막">&gt;&gt;</button>
          <!-- ② 엑셀 다운로드 (하단) + ③ 등록 (하단) -->
          <div class="adm-pagination-right">
            <button type="button" class="rss-btn adm-btn--excel" onclick="downloadOrderCorpExcel()">엑셀 다운로드</button>
            <button type="button" class="rss-btn adm-btn--register" onclick="location.href='order-corp-write.html'">
              등록
            </button>
          </div>
        </div>

      </div><!-- /rss-card -->
    </main>

    <div id="rss-footer-wrap"></div>
  </div><!-- /adm-main -->
</div><!-- /adm-layout -->

<!-- ══════════════════════════════════════════════════
     공통 스크립트
══════════════════════════════════════════════════ -->
<script src="../rss-common.js?v=20260518"></script>
<script src="adm-common.js?v=20260518"></script>
<script>
lucide.createIcons();

/* ── 검색 ──────────────────────────────────────── */
function searchOrderCorpList() {
  var keyword = document.getElementById('orderCorpSearchKeyword').value.trim();
  if (keyword) {
    document.getElementById('orderCorpViewAllBtn').style.display = 'inline-flex';
  }
  // [Java] GET /adm/order-corp/list?searchType=&keyword= 로 목록 재조회
  alert('검색 기능은 Java 연동 후 처리됩니다.');
}

function resetOrderCorpSearch() {
  document.getElementById('orderCorpSearchKeyword').value = '';
  document.getElementById('orderCorpSearchType').value = '';
  document.getElementById('orderCorpViewAllBtn').style.display = 'none';
  // [Java] 전체 목록 재조회
}

/* ── 엑셀 다운로드 ② ────────────────────────────── */
function downloadOrderCorpExcel() {
  // [Java] GET /adm/order-corp/excel 엔드포인트 호출
  alert('엑셀 다운로드 기능은 Java 연동 후 처리됩니다.');
}
</script>

</body>
</html>
