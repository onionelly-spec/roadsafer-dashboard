<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차단기업 관리 — 로드세이프티시스템 관리자</title>
  <!-- 공통 CSS -->
  <link rel="stylesheet" href="../rss-common.css?v=20260507" />
  <link rel="stylesheet" href="adm-common-v2.css?v=20260507" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     관리자 레이아웃
══════════════════════════════════════════════════ -->
<div id="adm-topbar-wrap"></div>
<div class="adm-layout">
  <div id="adm-sidebar-wrap"></div>
  <div class="adm-main">

    <!-- 브레드크럼 -->
    <div class="adm-breadcrumb">
      <h1 class="adm-breadcrumb__title">차단기업 관리</h1>
      <nav class="adm-breadcrumb__nav" aria-label="breadcrumb">
        <a href="#">로그인</a>
        <span class="adm-breadcrumb__sep">›</span>
        <a href="#">기업 관리</a>
        <span class="adm-breadcrumb__sep">›</span>
        <span class="adm-breadcrumb__current">차단기업 관리</span>
      </nav>
    </div>

    <main class="rss-content">
      <!-- ══════════════════════════════════════════════════
           차단기업 관리 목록 카드 (M4-1)
      ══════════════════════════════════════════════════ -->
      <div class="rss-card">

        <!-- ─── 검색 툴바 ──────────────────────────────────────
             스토리보드 ①: 상태 드롭다운 + 검색조건 드롭다운 + 키워드 + 찾기
             왼쪽: 상태 필터 / 오른쪽: 검색 + 엑셀 다운로드
        ──────────────────────────────────────────────────────── -->
        <div class="rss-board-toolbar">
          <div class="rss-board-toolbar__left">
            <!-- [Java] th:value="${statusFilter}" — 선택된 상태 유지 -->
            <select id="companyStatusFilter" class="rss-select" onchange="filterCompanyList()">
              <option value="">상태</option>
              <!-- [Java] th:selected="${statusFilter == 'pending'}" -->
              <option value="pending">대기</option>
              <!-- [Java] th:selected="${statusFilter == 'normal'}" -->
              <option value="normal">정상</option>
              <!-- [Java] th:selected="${statusFilter == 'suspend'}" -->
              <option value="suspend">사용 정지</option>
            </select>
          </div>
          <div class="rss-board-toolbar__right">
            <!-- [Java] th:value="${searchType}" -->
            <select id="companySearchType" class="rss-select">
              <option value="">선택</option>
              <!-- [Java] th:selected="${searchType == 'id'}" -->
              <option value="id">아이디</option>
              <!-- [Java] th:selected="${searchType == 'corpNm'}" -->
              <option value="corpNm">차단업체명</option>
            </select>
            <!-- [Java] th:value="${keyword}" -->
            <input type="text" id="companySearchKeyword" class="rss-input"
                   placeholder="" style="width:200px;"
                   onkeydown="if(event.key==='Enter') searchCompanyList()" />
            <button type="button" class="rss-btn rss-btn--outline" onclick="searchCompanyList()">
              <i data-lucide="search" style="width:14px;height:14px;margin-right:4px;"></i>
              찾기
            </button>
            <!-- 전체보기 버튼 — 검색 후에만 표시 -->
            <button type="button" class="rss-btn rss-btn--view-all" id="companyViewAllBtn"
                    onclick="resetCompanySearch()" style="display:none;">
              전체보기
            </button>
            <!-- ② 엑셀 다운로드 -->
            <button type="button" class="rss-btn adm-btn--excel" onclick="downloadCompanyExcel()">엑셀 다운로드</button>
          </div>
        </div>

        <!-- ─── 목록 테이블 ────────────────────────────────────
             스토리보드 ③: 체크박스·번호·아이디·차단업체명·대표자명·TMA수·직원수·공사수·가입일·상태
             - 대기 상태만 체크박스 표시
             - 차단업체명 클릭 → M4-1-1 상세보기
             - 직원 수 클릭 → 차단기업 직원(M4-2) 해당 기업 소속만 필터
             - 공사 수 클릭 → 공사정보(M1) 해당 기업 공사만 필터
        ──────────────────────────────────────────────────────── -->
        <div class="rss-table-wrap">
          <div style="overflow-x:auto;">
            <!-- [Java] th:if="${#lists.isEmpty(companyList)}" -->
            <!-- <div class="rss-empty">검색 결과가 없습니다.</div> -->
            <!-- [Java] th:unless="${#lists.isEmpty(companyList)}" -->
            <table class="rss-table" id="companyListTable" style="min-width:1000px;">
              <colgroup>
                <col class="rss-col-select" />      <!-- 체크박스 5% -->
                <col class="rss-col-no" />           <!-- 번호 5% -->
                <col class="rss-col-id" />           <!-- 아이디 10% -->
                <col class="rss-col-block-corp" />   <!-- 차단업체명 auto -->
                <col class="rss-col-author" />       <!-- 대표자명 10% -->
                <col class="rss-col-mgmt" />         <!-- TMA 수 10% -->
                <col class="rss-col-mgmt" />         <!-- 직원 수 10% -->
                <col class="rss-col-mgmt" />         <!-- 공사 수 10% -->
                <col class="rss-col-date" />         <!-- 가입일 10% -->
                <col class="rss-col-status" />       <!-- 상태 10% -->
              </colgroup>
              <thead>
                <tr>
                  <!-- ④⑤ 대기 상태 전체 선택 체크박스 -->
                  <th><input type="checkbox" id="companySelectAll" onchange="toggleSelectAll(this)"></th>
                  <th>번호</th>
                  <th>아이디</th>
                  <th>차단업체명</th>
                  <th>대표자명</th>
                  <th>TMA 수</th>
                  <th>직원 수</th>
                  <th>공사 수</th>
                  <th>가입일</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="companyListBody">
                <!-- ══════════════════════════════════════════
                     [Java] th:each="company : ${companyList}"
                     대기 상태 행 — 체크박스 표시, 빨간 폰트
                ══════════════════════════════════════════ -->
                <!-- 대기 행 예시 -->
                <tr class="row-pending">
                  <td class="text-center">
                    <!-- [Java] th:if="${company.status == 'pending'}" -->
                    <input type="checkbox" class="company-chk" value="1">
                  </td>
                  <!-- [Java] th:text="${companyStat.count}" -->
                  <td class="text-center" style="color:#dc2626;font-weight:700;">1</td>
                  <!-- [Java] th:text="${company.loginId}" -->
                  <td class="text-center" style="color:#dc2626;">BTS1004</td>
                  <!-- [Java] th:text="${company.corpNm}" — 클릭 시 M4-1-1 상세 -->
                  <td class="text-center">
                    <a href="company-detail.html?seq=1&status=pending" class="rss-link" style="color:#dc2626;font-weight:700;">BTS</a>
                  </td>
                  <!-- [Java] th:text="${company.ceoNm}" -->
                  <td class="text-center" style="color:#dc2626;">김보춘</td>
                  <!-- [Java] th:text="${company.tmaCnt}" -->
                  <td class="text-center" style="color:#dc2626;">11</td>
                  <!-- [Java] th:text="${company.staffCnt}" — 클릭 시 M4-2 직원 목록 -->
                  <td class="text-center">
                    <a href="company-staff-list.html?corpSeq=1" class="rss-link" style="color:#dc2626;">0</a>
                  </td>
                  <!-- [Java] th:text="${company.constCnt}" — 클릭 시 M1 공사 목록 -->
                  <td class="text-center">
                    <a href="construction-list.html?corpSeq=1" class="rss-link" style="color:#dc2626;">0</a>
                  </td>
                  <!-- [Java] th:text="${#temporals.format(company.regDtm,'yyyy-MM-dd')}" -->
                  <td class="text-center nowrap" style="color:#dc2626;">2026-07-02</td>
                  <!-- [Java] th:text="${company.statusNm}" -->
                  <td class="text-center">
                    <span class="adm-badge adm-badge--pending">대기</span>
                  </td>
                </tr>

                <!-- 정상 행 예시 -->
                <tr>
                  <td class="text-center">
                    <!-- [Java] th:if="${company.status == 'pending'}" — 정상은 체크박스 없음 -->
                  </td>
                  <td class="text-center">2</td>
                  <td class="text-center">koreapower</td>
                  <td class="text-center">
                    <a href="company-detail.html?seq=2&status=normal" class="rss-link">한국도로차단</a>
                  </td>
                  <td class="text-center">박수만</td>
                  <td class="text-center">12</td>
                  <td class="text-center">
                    <a href="company-staff-list.html?corpSeq=2" class="rss-link">1</a>
                  </td>
                  <td class="text-center">
                    <a href="construction-list.html?corpSeq=2" class="rss-link">21</a>
                  </td>
                  <td class="text-center nowrap">2026-06-25</td>
                  <td class="text-center">
                    <span class="adm-badge adm-badge--normal">정상</span>
                  </td>
                </tr>

                <!-- 정상 행 예시 2 -->
                <tr>
                  <td class="text-center"></td>
                  <td class="text-center">3</td>
                  <td class="text-center">smart001</td>
                  <td class="text-center">
                    <a href="company-detail.html?seq=3&status=normal" class="rss-link">스마트차단</a>
                  </td>
                  <td class="text-center">
                    <a href="company-detail.html?seq=3&status=normal" class="rss-link">김수창</a>
                  </td>
                  <td class="text-center">8</td>
                  <td class="text-center">
                    <a href="company-staff-list.html?corpSeq=3" class="rss-link">0</a>
                  </td>
                  <td class="text-center">
                    <a href="construction-list.html?corpSeq=3" class="rss-link">0</a>
                  </td>
                  <td class="text-center nowrap">2026-06-15</td>
                  <td class="text-center">
                    <span class="adm-badge adm-badge--normal">정상</span>
                  </td>
                </tr>

                <!-- 사용 정지 행 예시 -->
                <tr>
                  <td class="text-center"></td>
                  <td class="text-center">4</td>
                  <td class="text-center">hangil</td>
                  <td class="text-center">
                    <a href="company-detail.html?seq=4&status=suspend" class="rss-link">한길안전</a>
                  </td>
                  <td class="text-center">유현길</td>
                  <td class="text-center">5</td>
                  <td class="text-center">
                    <a href="company-staff-list.html?corpSeq=4" class="rss-link">0</a>
                  </td>
                  <td class="text-center">
                    <a href="construction-list.html?corpSeq=4" class="rss-link">0</a>
                  </td>
                  <td class="text-center nowrap">2026-06-16</td>
                  <td class="text-center">
                    <span class="adm-badge adm-badge--suspend">사용 정지</span>
                  </td>
                </tr>

                <!-- 정상 행 예시 3 -->
                <tr>
                  <td class="text-center"></td>
                  <td class="text-center">5</td>
                  <td class="text-center">soonhee</td>
                  <td class="text-center">
                    <a href="company-detail.html?seq=5&status=normal" class="rss-link">순희산업</a>
                  </td>
                  <td class="text-center">이순희</td>
                  <td class="text-center">21</td>
                  <td class="text-center">
                    <a href="company-staff-list.html?corpSeq=5" class="rss-link">5</a>
                  </td>
                  <td class="text-center">
                    <a href="construction-list.html?corpSeq=5" class="rss-link">34</a>
                  </td>
                  <td class="text-center nowrap">2026-06-02</td>
                  <td class="text-center">
                    <span class="adm-badge adm-badge--normal">정상</span>
                  </td>
                </tr>
                <!-- [Java] /th:each -->

              </tbody>
            </table>
          </div>
        </div><!-- /rss-table-wrap -->

        <!-- ─── 하단 영역: 승인/반려(좌) + 페이지네이션(중) + 엑셀(우) ── -->
        <!-- [Java] th:replace="fragments/pagination :: pagination(${pageInfo})" -->
        <div class="rss-pagination rss-pagination--with-actions" id="companyPagination">
          <!-- ⑤⑥ 승인 / 반려 버튼 — 대기 상태 체크박스 선택 후 클릭 -->
          <div class="adm-pagination-left">
            <button type="button" class="rss-btn adm-btn--approve" onclick="approveSelected()">승인</button>
            <button type="button" class="rss-btn adm-btn--reject" onclick="rejectSelected()">반려</button>
          </div>
          <button class="rss-pagination__btn" aria-label="첫 페이지" disabled>&lt;&lt;</button>
          <button class="rss-pagination__btn" aria-label="이전" disabled>&lt;</button>
          <button class="rss-pagination__btn active" data-page="1">1</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="2">2</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="3">3</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="4">4</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="5">5</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="6">6</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="7">7</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="8">8</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="9">9</button>
          <button class="rss-pagination__btn rss-pagination__btn--page-extra" data-page="10">10</button>
          <button class="rss-pagination__btn" aria-label="다음">&gt;</button>
          <button class="rss-pagination__btn" aria-label="마지막">&gt;&gt;</button>
          <!-- ② 엑셀 다운로드 (하단) -->
          <div class="adm-pagination-right">
            <button type="button" class="rss-btn adm-btn--excel" onclick="downloadCompanyExcel()">엑셀 다운로드</button>
          </div>
        </div>

      </div><!-- /rss-card -->
    </main>

    <div id="rss-footer-wrap"></div>
  </div><!-- /adm-main -->
</div><!-- /adm-layout -->

<!-- ══════════════════════════════════════════════════
     공통 스크립트
══════════════════════════════════════════════════ -->
<script src="../rss-common.js?v=20260507"></script>
<script src="adm-common.js?v=20260518"></script>
<script>
lucide.createIcons();

/* ── 전체 선택 ──────────────────────────────────── */
function toggleSelectAll(masterChk) {
  document.querySelectorAll('.company-chk').forEach(function(chk) {
    chk.checked = masterChk.checked;
  });
}

/* ── 검색 ──────────────────────────────────────── */
function searchCompanyList() {
  var keyword = document.getElementById('companySearchKeyword').value.trim();
  if (keyword) {
    document.getElementById('companyViewAllBtn').style.display = 'inline-flex';
  }
  // [Java] form submit 또는 AJAX 처리
  alert('검색 기능은 Java 연동 후 처리됩니다.');
}

function resetCompanySearch() {
  document.getElementById('companySearchKeyword').value = '';
  document.getElementById('companySearchType').value = '';
  document.getElementById('companyViewAllBtn').style.display = 'none';
  // [Java] 전체 목록 재조회
}

function filterCompanyList() {
  // [Java] 상태 필터 변경 시 목록 재조회
}

/* ── 승인 처리 ④ ────────────────────────────────── */
function approveSelected() {
  var checked = document.querySelectorAll('.company-chk:checked');
  if (checked.length === 0) {
    alert('1개 이상을 선택하세요.');
    return;
  }
  if (confirm('가입을 승인하시겠습니까?')) {
    // [Java] 선택된 기업 모두 승인 처리 → 카톡 전송(P01)
    alert('가입 승인되었습니다.');
    location.reload();
  }
}

/* ── 반려 처리 ⑤ ────────────────────────────────── */
function rejectSelected() {
  var checked = document.querySelectorAll('.company-chk:checked');
  if (checked.length === 0) {
    alert('1개 이상을 선택하세요.');
    return;
  }
  if (confirm('가입을 반려하시겠습니까?')) {
    // [Java] 선택된 기업 모두 반려 처리 → 카톡 전송(P02) → 개인정보 삭제(아이디/상호 제외)
    alert('가입 반려되었습니다.');
    location.reload();
  }
}

/* ── 엑셀 다운로드 ② ────────────────────────────── */
function downloadCompanyExcel() {
  // [Java] /adm/company/excel 엔드포인트 호출
  alert('엑셀 다운로드 기능은 Java 연동 후 처리됩니다.');
}
</script>

</body>
</html>
