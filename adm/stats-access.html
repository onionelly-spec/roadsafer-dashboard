<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>접속 현황 — 로드세이프티시스템 관리자</title>
  <!-- 공통 CSS — Tailwind보다 먼저 로드 -->
  <link rel="stylesheet" href="../rss-common.css?v=20260526" />
  <link rel="stylesheet" href="adm-common-v2.css?v=20260526" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<!-- ══════════════════════════════════════════════════
     M10-2. 접속 현황 — 관리자 페이지
     코드: M10-2
     경로: 로그인 > 통계 > 접속 현황
     [Java] @GetMapping("/adm/stats/access")
     [Java] 파라미터: year(int), month(int)
     [Java] 기본값: 현재년 현재월
     ──────────────────────────────────────────────────
     [집계 기준]
     ① 1회 이상 접속한 수: 해당 날짜에 1회라도 접속한 회원 수
        (여러 번 접속해도 계정당 1회로 계산)
     ② 2회 이상 반복 접속 수: 해당 날짜에 2회 이상 접속한 회원 수
══════════════════════════════════════════════════ -->
<div id="adm-topbar-wrap"></div>
<div class="adm-layout">
  <div id="adm-sidebar-wrap"></div>
  <div class="adm-main">

    <!-- 브레드크럼 -->
    <div class="adm-breadcrumb">
      <h1 class="adm-breadcrumb__title">접속 현황</h1>
      <nav class="adm-breadcrumb__nav" aria-label="breadcrumb">
        <a href="#">로그인</a>
        <span class="adm-breadcrumb__sep">›</span>
        <span>통계</span>
        <span class="adm-breadcrumb__sep">›</span>
        <span class="adm-breadcrumb__current">접속 현황</span>
      </nav>
    </div>

    <main class="rss-content">
      <div class="rss-card">
        <div class="stats-wrap">

          <!-- ══════════════════════════════════════════════════
               ① 년월 네비게이터 + ② 엑셀 다운로드
               [Java] model.addAttribute("currentYear", 2026)
               [Java] model.addAttribute("currentMonth", 6)
               [Java] model.addAttribute("prevYear", prevYear)
               [Java] model.addAttribute("prevMonth", prevMonth)
               [Java] model.addAttribute("nextYear", nextYear)
               [Java] model.addAttribute("nextMonth", nextMonth)
          ══════════════════════════════════════════════════ -->
          <div class="stats-toolbar" id="statsAccessMonthNav">

            <!-- 년월 네비게이터 (좌측) -->
            <div class="stats-month-nav">
              <!-- 이전 달 버튼 -->
              <!-- [Java] th:href="@{/adm/stats/access?year=${prevYear}&month=${prevMonth}}" -->
              <button type="button" class="stats-month-nav__btn"
                      onclick="changeAccessMonth(-1)" aria-label="이전 달">
                <i data-lucide="chevron-left" class="rss-icon-16"></i>
              </button>

              <!-- 년월 표시 (클릭 시 드롭다운) -->
              <span class="stats-month-nav__label" id="statsAccessMonthLabel">
                <span id="statsAccessYearDisplay"
                      class="stats-month-nav__year-btn"
                      onclick="toggleAccessYearDropdown(event)">
                  2026년<!-- [Java] ${currentYear}년 -->
                </span>
                <span id="statsAccessMonthDisplay"
                      class="stats-month-nav__month-btn"
                      onclick="toggleAccessMonthDropdown(event)">
                  6월<!-- [Java] ${currentMonth}월 -->
                </span>

                <!-- 년도 드롭다운 -->
                <div class="sales-month-dropdown hidden" id="statsAccessYearDropdown">
                  <!-- [Java] th:each="y : ${yearList}" -->
                  <div class="sales-month-dropdown__item" onclick="selectAccessYear(2024)">2024년</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessYear(2025)">2025년</div>
                  <div class="sales-month-dropdown__item active" onclick="selectAccessYear(2026)">2026년</div>
                </div>

                <!-- 월 드롭다운 -->
                <div class="sales-month-dropdown hidden" id="statsAccessMonthDropdown">
                  <!-- [Java] th:each="m : ${#numbers.sequence(1,12)}" -->
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(1)">1월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(2)">2월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(3)">3월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(4)">4월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(5)">5월</div>
                  <div class="sales-month-dropdown__item active" onclick="selectAccessMonth(6)">6월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(7)">7월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(8)">8월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(9)">9월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(10)">10월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(11)">11월</div>
                  <div class="sales-month-dropdown__item" onclick="selectAccessMonth(12)">12월</div>
                </div>
              </span>

              <!-- 다음 달 버튼 -->
              <!-- [Java] th:href="@{/adm/stats/access?year=${nextYear}&month=${nextMonth}}" -->
              <button type="button" class="stats-month-nav__btn"
                      onclick="changeAccessMonth(1)" aria-label="다음 달">
                <i data-lucide="chevron-right" class="rss-icon-16"></i>
              </button>
            </div><!-- /stats-month-nav -->

            <!-- ② 엑셀 다운로드 (우측) -->
            <!-- [Java] @{/adm/stats/access/excel?year=${currentYear}&month=${currentMonth}} -->
            <button type="button" class="rss-btn adm-btn--excel"
                    onclick="downloadStatsAccessExcel()">엑셀 다운로드</button>
          </div><!-- /stats-toolbar -->

          <!-- ══════════════════════════════════════════════════
               ③ 접속현황 테이블
               매월 1일부터 말일까지 순서대로 통계 제시
               [Java] model.addAttribute("accessList", accessList)
               [Java] model.addAttribute("totalRow", totalRow)
               컬럼: 날짜 /
                     1회 이상 접속한 수(차단기업·차단기업직원) /
                     2회 이상 반복 접속 수(차단기업·차단기업직원)
               ──────────────────────────────────────────────────
               [집계 기준 주석 — 개발팀 참고]
               1회 이상 접속한 수: 여러 번 접속해도 계정당 1회로
                 계산하여 접속한 수 합계 (DISTINCT accessId COUNT)
               2회 이상 반복 접속 수: 접속 계정 중 2회 이상 접속한
                 수 합계 (accessCnt >= 2 인 계정 COUNT)
          ══════════════════════════════════════════════════ -->
          <div class="rss-table-wrap">
            <table class="stats-table" aria-label="접속현황 테이블">
              <colgroup>
                <col class="stats-col-date" /><!-- 날짜 -->
                <col class="stats-col-num" /><!-- 1회 이상: 차단기업 -->
                <col class="stats-col-num" /><!-- 1회 이상: 차단기업 직원 -->
                <col class="stats-col-num" /><!-- 2회 이상: 차단기업 -->
                <col class="stats-col-num" /><!-- 2회 이상: 차단기업 직원 -->
              </colgroup>
              <thead>
                <!-- 1행: 그룹 헤더 -->
                <tr>
                  <th rowspan="2" class="stats-col-date">날짜</th>
                  <th colspan="2" class="stats-table__group-th">1회 이상 접속한 수</th>
                  <th colspan="2" class="stats-table__group-th">2회 이상 반복 접속 수</th>
                </tr>
                <!-- 2행: 세부 컬럼 헤더 -->
                <tr>
                  <th>차단기업</th>
                  <th>차단기업 직원</th>
                  <th>차단기업</th>
                  <th>차단기업 직원</th>
                </tr>
              </thead>
              <tbody id="statsAccessTableBody">
                <!-- ─── 합계 행 ─────────────────────────────────────
                     [Java] th:with="t=${totalRow}"
                ──────────────────────────────────────────────────── -->
                <tr class="stats-table__total-row">
                  <td>합계</td>
                  <!-- [Java] th:text="${t.access1BlockCorp}" -->
                  <td>16</td>
                  <!-- [Java] th:text="${t.access1BlockEmp}" -->
                  <td>9</td>
                  <!-- [Java] th:text="${t.access2BlockCorp}" -->
                  <td>7</td>
                  <!-- [Java] th:text="${t.access2BlockEmp}" -->
                  <td>8</td>
                </tr>

                <!-- ─── 날짜별 데이터 행 ────────────────────────────
                     [Java] th:each="row : ${accessList}"
                ──────────────────────────────────────────────────── -->
                <tr>
                  <!-- [Java] th:text="${row.accessDt}" -->
                  <td>2026-06-01</td>
                  <!-- [Java] th:text="${row.access1BlockCorp}" -->
                  <td>4</td>
                  <!-- [Java] th:text="${row.access1BlockEmp}" -->
                  <td>1</td>
                  <!-- [Java] th:text="${row.access2BlockCorp}" -->
                  <td>0</td>
                  <!-- [Java] th:text="${row.access2BlockEmp}" -->
                  <td>0</td>
                </tr>
                <tr>
                  <td>2026-06-02</td>
                  <td>1</td>
                  <td>0</td>
                  <td>3</td>
                  <td>6</td>
                </tr>
                <tr>
                  <td>2026-06-03</td>
                  <td>7</td>
                  <td>4</td>
                  <td>0</td>
                  <td>0</td>
                </tr>
                <tr>
                  <td>2026-06-04</td>
                  <td>1</td>
                  <td>3</td>
                  <td>1</td>
                  <td>0</td>
                </tr>
                <tr>
                  <td>2026-06-05</td>
                  <td>3</td>
                  <td>1</td>
                  <td>3</td>
                  <td>2</td>
                </tr>
                <!-- [Java] /th:each -->

              </tbody>
            </table>
          </div><!-- /rss-table-wrap -->

        </div><!-- /stats-wrap -->
      </div><!-- /rss-card -->
    </main>
    <div id="rss-footer-wrap"></div>
  </div><!-- /adm-main -->
</div><!-- /adm-layout -->

<!-- ══════════════════════════════════════════════════
     공통 스크립트
══════════════════════════════════════════════════ -->
<script src="../rss-common.js?v=20260507"></script>
<script src="adm-common.js?v=20260507"></script>
<script>
/* ─── M10-2. 접속현황 스크립트 ──────────────────────────────
   [Java 전환 시] 이 스크립트 블록 전체를 제거하고
   서버 사이드 렌더링(Thymeleaf)으로 교체하세요.
──────────────────────────────────────────────────────────── */

/** 현재 선택 년/월 (퍼블리싱 더미) */
let accessYear  = 2026;
let accessMonth = 6;

/**
 * 이전/다음 달 이동
 * [Java] GET /adm/stats/access?year=&month= 로 교체
 */
function changeAccessMonth(delta) {
  accessMonth += delta;
  if (accessMonth < 1)  { accessYear--;  accessMonth = 12; }
  if (accessMonth > 12) { accessYear++;  accessMonth = 1;  }
  document.getElementById('statsAccessYearDisplay').textContent  = accessYear  + '년';
  document.getElementById('statsAccessMonthDisplay').textContent = accessMonth + '월';
  /* [Java] window.location.href = '/adm/stats/access?year=' + accessYear + '&month=' + accessMonth; */
  console.log('[M10-2] 월 변경 → ' + accessYear + '년 ' + accessMonth + '월 (Java 연동 후 서버 요청)');
}

/**
 * 년도 드롭다운 토글
 */
function toggleAccessYearDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('statsAccessYearDropdown');
  document.getElementById('statsAccessMonthDropdown').classList.add('hidden');
  dd.classList.toggle('hidden');
}

/**
 * 월 드롭다운 토글
 */
function toggleAccessMonthDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('statsAccessMonthDropdown');
  document.getElementById('statsAccessYearDropdown').classList.add('hidden');
  dd.classList.toggle('hidden');
}

/**
 * 년도 선택
 * [Java] GET /adm/stats/access?year=&month= 로 교체
 */
function selectAccessYear(year) {
  accessYear = year;
  document.getElementById('statsAccessYearDisplay').textContent = year + '년';
  document.getElementById('statsAccessYearDropdown').classList.add('hidden');
  /* [Java] window.location.href = '/adm/stats/access?year=' + accessYear + '&month=' + accessMonth; */
  console.log('[M10-2] 년도 선택 → ' + year + '년');
}

/**
 * 월 선택
 * [Java] GET /adm/stats/access?year=&month= 로 교체
 */
function selectAccessMonth(month) {
  accessMonth = month;
  document.getElementById('statsAccessMonthDisplay').textContent = month + '월';
  document.getElementById('statsAccessMonthDropdown').classList.add('hidden');
  /* [Java] window.location.href = '/adm/stats/access?year=' + accessYear + '&month=' + accessMonth; */
  console.log('[M10-2] 월 선택 → ' + month + '월');
}

/**
 * 엑셀 다운로드
 * [Java] GET /adm/stats/access/excel?year=&month= 로 교체
 */
function downloadStatsAccessExcel() {
  /* [Java] window.location.href = '/adm/stats/access/excel?year=' + accessYear + '&month=' + accessMonth; */
  alert('엑셀 다운로드 기능은 Java 연동 후 처리됩니다.');
}

/** 드롭다운 외부 클릭 시 닫기 */
document.addEventListener('click', function() {
  document.getElementById('statsAccessYearDropdown').classList.add('hidden');
  document.getElementById('statsAccessMonthDropdown').classList.add('hidden');
});
</script>
</body>
</html>
