<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 상세 정보 — 로드세이프티시스템 관리자</title>
  <!-- 공통 CSS -->
  <link rel="stylesheet" href="../rss-common.css?v=20260507" />
  <link rel="stylesheet" href="adm-common-v2.css?v=20260507" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     관리자 레이아웃
══════════════════════════════════════════════════ -->
<div id="adm-topbar-wrap"></div>
<div class="adm-layout">
  <div id="adm-sidebar-wrap"></div>
  <div class="adm-main">

    <!-- 브레드크럼 -->
    <div class="adm-breadcrumb">
      <h1 class="adm-breadcrumb__title">차단기업 직원</h1>
      <nav class="adm-breadcrumb__nav" aria-label="breadcrumb">
        <a href="#">로그인</a>
        <span class="adm-breadcrumb__sep">›</span>
        <a href="#">기업 관리</a>
        <span class="adm-breadcrumb__sep">›</span>
        <a href="company-staff-list.html">차단기업 직원</a>
        <span class="adm-breadcrumb__sep">›</span>
        <span class="adm-breadcrumb__current">상세정보</span>
      </nav>
    </div>

    <main class="rss-content">

      <!-- ══════════════════════════════════════════════════
           직원 상세 정보 카드 (M4-2-1)
      ══════════════════════════════════════════════════ -->
      <div class="rss-card">

        <!-- ─── 직원 정보 섹션 ─────────────────────────────── -->
        <div class="write-section">
          <div class="write-section__head">
            <h2 class="write-section__title">직원 정보</h2>
            <!-- [Java] th:text="${staff.statusNm}" -->
            <span class="adm-badge adm-badge--normal" id="staffStatusBadge">정상</span>
          </div>
          <div class="write-section__body">

            <!-- [Java] th:object="${staff}" -->
            <table class="adm-form-table">
              <colgroup>
                <col style="width:140px;" />
                <col />
                <col style="width:140px;" />
                <col />
              </colgroup>
              <tbody>
                <!-- 행 1: 상태 / 아이디 -->
                <tr>
                  <th>상태</th>
                  <td>
                    <!-- [Java] th:text="${staff.statusNm}" — 수정 불가 -->
                    <span id="staffStatusText">정상</span>
                  </td>
                  <th>아이디</th>
                  <td>
                    <!-- [Java] th:text="${staff.staffId}" — 수정 불가 -->
                    <span>roadace</span>
                  </td>
                </tr>
                <!-- 행 2: 이름(부서명) / 상호 -->
                <tr>
                  <th>이름(부서명)</th>
                  <td>
                    <!-- [Java] th:value="${staff.empNm}" -->
                    <input type="text" class="rss-input" id="empNm" value="오수진" style="width:100%;" />
                  </td>
                  <th>상호</th>
                  <td>
                    <!-- [Java] th:text="${staff.corpNm}" — 수정 불가, 클릭 시 M4-1-1 -->
                    <a href="company-detail.html?seq=1" class="rss-link">잘한도로차단</a>
                  </td>
                </tr>
                <!-- 행 3: 사업자번호 / 대표자명 -->
                <tr>
                  <th>사업자번호</th>
                  <td>
                    <!-- [Java] th:text="${staff.bizNo}" — 수정 불가 -->
                    <span>000-00-00000</span>
                  </td>
                  <th>대표자명</th>
                  <td>
                    <!-- [Java] th:text="${staff.ceoNm}" — 수정 불가 -->
                    <span>나잘난</span>
                  </td>
                </tr>
                <!-- 행 4: 공사 수 -->
                <tr>
                  <th>공사 수</th>
                  <td colspan="3">
                    <!-- [Java] th:text="${staff.constCnt}+'개'" — 클릭 시 M1 해당 직원 공사만 필터 -->
                    <a href="construction-list.html?staffSeq=1" class="rss-link">7개</a>
                  </td>
                </tr>
                <!-- 행 5: 휴대폰 번호 -->
                <tr>
                  <th>휴대폰 번호</th>
                  <td colspan="3">
                    <div class="adm-inline-group">
                      <!-- [Java] th:value="${staff.empTel1}" -->
                      <input type="text" class="rss-input" id="empTel1" value="010"
                             style="width:70px;" maxlength="4" />
                      <span class="adm-inline-sep">-</span>
                      <!-- [Java] th:value="${staff.empTel2}" -->
                      <input type="text" class="rss-input" id="empTel2" value="0000"
                             style="width:80px;" maxlength="4" />
                      <span class="adm-inline-sep">-</span>
                      <!-- [Java] th:value="${staff.empTel3}" -->
                      <input type="text" class="rss-input" id="empTel3" value="1111"
                             style="width:80px;" maxlength="4" />
                      <span class="adm-field-note">* SMS 수신:</span>
                      <!-- [Java] th:checked="${staff.smsYn == 'Y'}" -->
                      <label class="adm-radio-label">
                        <input type="radio" name="smsYn" value="Y" checked /> 수신
                      </label>
                      <label class="adm-radio-label">
                        <input type="radio" name="smsYn" value="N" /> 거부
                      </label>
                    </div>
                  </td>
                </tr>
                <!-- 행 6: 이메일 주소 -->
                <tr>
                  <th>이메일 주소</th>
                  <td colspan="3">
                    <div class="adm-inline-group">
                      <!-- [Java] th:value="${staff.emailId}" -->
                      <input type="text" class="rss-input" id="emailId" value="jalnan"
                             style="width:140px;" />
                      <span class="adm-inline-sep">@</span>
                      <!-- [Java] th:value="${staff.emailDomain}" -->
                      <input type="text" class="rss-input" id="emailDomain" value="naver.com"
                             style="width:140px;" />
                      <!-- [Java] th:value="${staff.emailDomainSelect}" -->
                      <select class="rss-select" id="emailDomainSelect"
                              onchange="setEmailDomain(this)" style="width:140px;">
                        <option value="">선택</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                        <option value="kakao.com">kakao.com</option>
                        <option value="direct">직접입력</option>
                      </select>
                      <span class="adm-field-note">* 이메일 수신:</span>
                      <!-- [Java] th:checked="${staff.emailYn == 'Y'}" -->
                      <label class="adm-radio-label">
                        <input type="radio" name="emailYn" value="Y" checked /> 수신
                      </label>
                      <label class="adm-radio-label">
                        <input type="radio" name="emailYn" value="N" /> 거부
                      </label>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>

          </div><!-- /write-section__body -->
        </div><!-- /write-section -->

        <!-- ─── 하단 버튼 영역 ────────────────────────────────
             스토리보드 ②: 상태에 따라 버튼 다름
               - 대기:  승인 + 반려 + 비밀번호 변경
               - 정상:  승인취소 + 비밀번호 변경
             ③ 비밀번호 변경 — 홈페이지와 동일한 모달
        ──────────────────────────────────────────────────────── -->
        <div class="rss-page-actions">
          <!-- 상태별 버튼 — [Java] th:if 로 조건부 렌더링 -->

          <!-- [Java] th:if="${staff.staffStatus == 'pending'}" — 대기 상태 -->
          <button type="button" class="rss-btn adm-btn--approve" id="btnStaffApprove"
                  onclick="approveStaff()">승인</button>
          <button type="button" class="rss-btn adm-btn--reject" id="btnStaffReject"
                  onclick="rejectStaff()">반려</button>

          <!-- [Java] th:if="${staff.staffStatus == 'normal'}" — 정상 상태 (현재는 숨김) -->
          <button type="button" class="rss-btn adm-btn--delete" id="btnStaffApproveCancel"
                  onclick="cancelApproveStaff()" style="display:none;">승인취소</button>

          <!-- 비밀번호 변경 — 항상 표시 -->
          <button type="button" class="rss-btn rss-btn--outline" onclick="openStaffPwModal()">비밀번호 변경</button>
        </div>

      </div><!-- /rss-card -->
    </main>

    <div id="rss-footer-wrap"></div>
  </div><!-- /adm-main -->
</div><!-- /adm-layout -->

<!-- ══════════════════════════════════════════════════
     비밀번호 변경 모달 (홈페이지와 동일 규격)
══════════════════════════════════════════════════ -->
<div class="adm-modal-overlay" id="staffPwModalOverlay" style="display:none;">
  <div class="adm-modal-box" id="staffPwModal" role="dialog" aria-modal="true"
       aria-labelledby="staffPwModalTitle">
    <div class="adm-modal-box__head">
      <h3 class="adm-modal-box__title" id="staffPwModalTitle">비밀번호 변경</h3>
      <button type="button" class="adm-modal-box__close" onclick="closeStaffPwModal()"
              aria-label="닫기">&times;</button>
    </div>
    <div class="adm-modal-box__body">
      <table class="adm-form-table">
        <colgroup>
          <col style="width:120px;" />
          <col />
        </colgroup>
        <tbody>
          <tr>
            <th>새 비밀번호</th>
            <td>
              <input type="password" class="rss-input" id="staffNewPw"
                     placeholder="새 비밀번호 입력" style="width:100%;" />
            </td>
          </tr>
          <tr>
            <th>비밀번호 확인</th>
            <td>
              <input type="password" class="rss-input" id="staffNewPwConfirm"
                     placeholder="비밀번호 재입력" style="width:100%;" />
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="adm-modal-box__foot">
      <button type="button" class="rss-btn adm-btn--save" onclick="saveStaffPw()">변경</button>
      <button type="button" class="rss-btn adm-btn--cancel" onclick="closeStaffPwModal()">취소</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     공통 스크립트
══════════════════════════════════════════════════ -->
<script src="../rss-common.js?v=20260507"></script>
<script src="adm-common.js?v=20260507"></script>
<script>
lucide.createIcons();

/* ── 상태별 버튼 토글 ────────────────────────────
   대기 → 승인 + 반려 표시 / 승인취소 숨김
   정상 → 승인취소 표시 / 승인 + 반려 숨김
   [Java] th:if 로 서버사이드 렌더링 시 이 함수 불필요
──────────────────────────────────────────────── */
function initStaffButtons() {
  /* URL 파라미터 status 우선 — 없으면 badge 텍스트 폴백
     [Java] 서버사이드 렌더링 시 URL 파라미터 불필요 — th:if 로 버튼 직접 제어 */
  var params = new URLSearchParams(window.location.search);
  var statusParam = params.get('status') || '';
  var badgeText   = (document.getElementById('staffStatusBadge').textContent || '').trim();

  /* URL 파라미터 없으면 badge 텍스트로 판단 */
  var isPending = (statusParam === 'pending') || (!statusParam && badgeText === '대기');
  var isNormal  = (statusParam === 'normal')  || (!statusParam && badgeText === '정상');

  /* badge 동기화 — URL 파라미터가 있으면 badge도 업데이트 */
  if (statusParam === 'pending') {
    document.getElementById('staffStatusBadge').textContent = '대기';
    document.getElementById('staffStatusBadge').className   = 'adm-badge adm-badge--pending';
    document.getElementById('staffStatusText').textContent  = '대기';
  } else if (statusParam === 'normal') {
    document.getElementById('staffStatusBadge').textContent = '정상';
    document.getElementById('staffStatusBadge').className   = 'adm-badge adm-badge--normal';
    document.getElementById('staffStatusText').textContent  = '정상';
  }

  var btnApprove       = document.getElementById('btnStaffApprove');
  var btnReject        = document.getElementById('btnStaffReject');
  var btnCancelApprove = document.getElementById('btnStaffApproveCancel');

  if (isPending) {
    btnApprove.style.display       = '';
    btnReject.style.display        = '';
    btnCancelApprove.style.display = 'none';
  } else if (isNormal) {
    btnApprove.style.display       = 'none';
    btnReject.style.display        = 'none';
    btnCancelApprove.style.display = '';
  } else {
    /* 사용정지 등 기타 — 모든 상태 버튼 숨김 */
    btnApprove.style.display       = 'none';
    btnReject.style.display        = 'none';
    btnCancelApprove.style.display = 'none';
  }
}
document.addEventListener('DOMContentLoaded', initStaffButtons);

/* ── 이메일 도메인 선택 ──────────────────────────── */
function setEmailDomain(sel) {
  var domain = document.getElementById('emailDomain');
  if (sel.value === 'direct') {
    domain.value = '';
    domain.readOnly = false;
    domain.focus();
  } else if (sel.value) {
    domain.value = sel.value;
    domain.readOnly = true;
  } else {
    domain.readOnly = false;
  }
}

/* ── 승인 처리 ② ────────────────────────────────── */
function approveStaff() {
  if (confirm('승인 처리 하시겠습니까?')) {
    // [Java] POST /adm/staff/approve?staffSeq= → 승인 처리 → 카톡 전송(P03)
    alert('승인 처리되었습니다.');
    location.reload();
  }
}

/* ── 반려 처리 ② ────────────────────────────────── */
function rejectStaff() {
  if (confirm('반려하면 모든 가입 정보가 사라집니다.\n그래도 반려하시겠습니까?')) {
    // [Java] POST /adm/staff/reject?staffSeq= → 반려 처리 → 카톡 전송(P02) → 아이디/이름 제외 개인정보 삭제
    alert('반려되었습니다.');
    location.reload();
  }
}

/* ── 승인취소 처리 ② ────────────────────────────── */
function cancelApproveStaff() {
  if (confirm('승인 취소하면 로그인이 불가하고 모든 개인정보가 삭제됩니다.\n그래도 승인취소하시겠습니까?')) {
    // [Java] POST /adm/staff/approveCancel?staffSeq= → 승인취소 → 카톡 전송(P03) → 아이디/비밀번호(암호화)/이름 제외 삭제
    alert('승인 취소되었습니다.');
    location.reload();
  }
}

/* ── 비밀번호 변경 모달 ③ ────────────────────────── */
function openStaffPwModal() {
  document.getElementById('staffNewPw').value = '';
  document.getElementById('staffNewPwConfirm').value = '';
  document.getElementById('staffPwModalOverlay').style.display = 'flex';
}

function closeStaffPwModal() {
  document.getElementById('staffPwModalOverlay').style.display = 'none';
}

function saveStaffPw() {
  var pw  = document.getElementById('staffNewPw').value.trim();
  var pw2 = document.getElementById('staffNewPwConfirm').value.trim();
  if (!pw) { alert('새 비밀번호를 입력하세요.'); return; }
  if (pw !== pw2) { alert('비밀번호가 일치하지 않습니다.'); return; }
  // [Java] POST /adm/staff/changePw?staffSeq=&newPw=
  alert('비밀번호가 변경되었습니다.');
  closeStaffPwModal();
}

/* ── ESC 키로 모달 닫기 ──────────────────────────── */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeStaffPwModal();
});
</script>

</body>
</html>
