<!--
  adm-sidebar.html — 관리자 사이트 공통 사이드바 컴포넌트
  =====================================================
  [메뉴 구조]
    M1  공사 관리
    M2  차단불이행내역
    M3  취소 내역
    M4  기업 관리
    M5  공지사항 관리
    M6  광고 관리
    M7  장터 관리
    M8  커뮤니티 관리
    M9  매출 현황
    M10 통계
    M11 관리자 관리

  [사용법] 각 페이지에서 아래 div를 배치하면 자동 삽입됩니다.
    <div id="adm-sidebar-wrap"></div>

  [Java Thymeleaf 전환 시]
    이 파일 내용을 /templates/fragments/adm/sidebar.html 로 이동하고
    각 페이지에서 <div th:replace="fragments/adm/sidebar :: sidebar"></div> 로 교체하세요.

  [활성 메뉴 처리]
    adm-common.js 에서 현재 페이지 URL을 감지하여 자동으로 active 클래스를 부여합니다.
    Java 환경에서는 th:classappend="${currentMenu == 'construction'} ? 'active'" 방식으로 처리하세요.
  =====================================================
-->
<aside class="adm-sidebar" id="admSidebar" role="navigation" aria-label="관리자 메뉴">
  <nav class="rss-nav" aria-label="관리자 주 메뉴">
    <ul style="list-style:none;padding:0;margin:0;">

      <!-- M1. 공사 관리 -->
      <li>
        <a href="construction-list.html" class="rss-nav__link" data-menu="construction">
          <span class="rss-nav__icon"><i data-lucide="hard-hat"></i></span>
          <span class="rss-nav__label">공사 관리</span>
        </a>
      </li>

      <!-- M2. 차단불이행내역 -->
      <li>
        <a href="block-violation.html" class="rss-nav__link" data-menu="block-violation">
          <span class="rss-nav__icon"><i data-lucide="alert-triangle"></i></span>
          <span class="rss-nav__label">차단불이행내역</span>
        </a>
      </li>

      <!-- M3. 취소 내역 -->
      <li>
        <a href="cancel-list.html" class="rss-nav__link" data-menu="cancel">
          <span class="rss-nav__icon"><i data-lucide="x-circle"></i></span>
          <span class="rss-nav__label">취소 내역</span>
        </a>
      </li>

      <!-- M4. 기업 관리 -->
      <li>
        <a href="company-list.html" class="rss-nav__link" data-menu="company">
          <span class="rss-nav__icon"><i data-lucide="building-2"></i></span>
          <span class="rss-nav__label">기업 관리</span>
        </a>
      </li>

      <!-- M5. 공지사항 관리 -->
      <li>
        <a href="notice-list.html" class="rss-nav__link" data-menu="notice">
          <span class="rss-nav__icon"><i data-lucide="bell"></i></span>
          <span class="rss-nav__label">공지사항 관리</span>
        </a>
      </li>

      <!-- M6. 광고 관리 -->
      <li>
        <a href="ad-list.html" class="rss-nav__link" data-menu="ad">
          <span class="rss-nav__icon"><i data-lucide="megaphone"></i></span>
          <span class="rss-nav__label">광고 관리</span>
        </a>
      </li>

      <!-- M7. 장터 관리 -->
      <li>
        <a href="market-list.html" class="rss-nav__link" data-menu="market">
          <span class="rss-nav__icon"><i data-lucide="shopping-bag"></i></span>
          <span class="rss-nav__label">장터 관리</span>
        </a>
      </li>

      <!-- M8. 커뮤니티 관리 -->
      <li>
        <a href="community-list.html" class="rss-nav__link" data-menu="community">
          <span class="rss-nav__icon"><i data-lucide="users"></i></span>
          <span class="rss-nav__label">커뮤니티 관리</span>
        </a>
      </li>

      <!-- M9. 매출 현황 -->
      <li>
        <a href="sales.html" class="rss-nav__link" data-menu="sales">
          <span class="rss-nav__icon"><i data-lucide="circle-dollar-sign"></i></span>
          <span class="rss-nav__label">매출 현황</span>
        </a>
      </li>

      <!-- M10. 통계 (2depth: 가입탈퇴현황 / 접속현황) -->
      <li>
        <!-- 아코디언 토글 -->
        <button type="button" class="rss-nav__link adm-nav__accordion-btn"
                data-menu="stats" aria-expanded="false"
                onclick="toggleAdmAccordion(this)"
                style="width:100%;text-align:left;border:none;background:transparent;cursor:pointer;">
          <span class="rss-nav__icon"><i data-lucide="bar-chart-2"></i></span>
          <span class="rss-nav__label">통계</span>
          <span class="adm-nav__accordion-arrow" style="margin-left:auto;">
            <i data-lucide="chevron-down" style="width:14px;height:14px;transition:transform 0.2s;"></i>
          </span>
        </button>
        <!-- 2depth 서브메뉴 -->
        <ul class="adm-nav__sub" id="statsSubMenu"
            style="list-style:none;padding:0;margin:0;display:none;overflow:hidden;">
          <!-- M10-1. 가입탈퇴현황 -->
          <li>
            <a href="stats-member.html" class="rss-nav__link" data-menu="stats-member"
               style="padding-left:36px;font-size:var(--rss-font-sm);">
              <span class="rss-nav__icon"><i data-lucide="user-minus"></i></span>
              <span class="rss-nav__label">가입탈퇴현황</span>
            </a>
          </li>
          <!-- M10-2. 접속현황 -->
          <li>
            <a href="stats-access.html" class="rss-nav__link" data-menu="stats-access"
               style="padding-left:36px;font-size:var(--rss-font-sm);">
              <span class="rss-nav__icon"><i data-lucide="activity"></i></span>
              <span class="rss-nav__label">접속현황</span>
            </a>
          </li>
        </ul>
      </li>

      <!-- M11. 관리자 관리 -->
      <li>
        <a href="admin-list.html" class="rss-nav__link" data-menu="admin">
          <span class="rss-nav__icon"><i data-lucide="shield-check"></i></span>
          <span class="rss-nav__label">관리자 관리</span>
        </a>
      </li>

    </ul>
  </nav>
</aside>

<!-- 모바일 오버레이 — 사이드바 외부 클릭 시 닫기 -->
<div class="adm-overlay" id="admOverlay" aria-hidden="true"
     onclick="closeAdmSidebar()"></div>
