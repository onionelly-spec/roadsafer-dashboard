<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- [Java] th:text="${noticeSeq != null} ? '공지사항 수정 — 로드세이프티시스템 관리자' : '공지사항 등록 — 로드세이프티시스템 관리자'" -->
  <title>공지사항 등록/수정 — 로드세이프티시스템 관리자</title>
  <!-- 공통 CSS -->
  <link rel="stylesheet" href="../rss-common.css?v=20260526" />
  <link rel="stylesheet" href="adm-common-v2.css?v=20260526" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- CKEditor 4 CDN (standard 빌드, 한국어 포함) -->
  <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
</head>
<body>
<!-- ══════════════════════════════════════════════════
     관리자 레이아웃
══════════════════════════════════════════════════ -->
<div id="adm-topbar-wrap"></div>
<div class="adm-layout">
  <div id="adm-sidebar-wrap"></div>
  <div class="adm-main">
    <!-- 브레드크럼 -->
    <div class="adm-breadcrumb">
      <h1 class="adm-breadcrumb__title">공지사항 관리</h1>
      <nav class="adm-breadcrumb__nav" aria-label="breadcrumb">
        <a href="#">로그인</a>
        <span class="adm-breadcrumb__sep">›</span>
        <!-- [Java] th:href="@{/adm/notice/list}" -->
        <a href="notice-list.html">공지사항 관리</a>
        <span class="adm-breadcrumb__sep">›</span>
        <!-- [Java] th:text="${noticeSeq != null} ? '수정' : '등록'" -->
        <span class="adm-breadcrumb__current">등록/수정</span>
      </nav>
    </div>
    <main class="rss-content">
      <!-- ══════════════════════════════════════════════════
           공지사항 등록/수정 폼 (M5-1)
           [Java] th:action="${noticeSeq != null}
                    ? @{/adm/notice/mod/{seq}(seq=${noticeSeq})}
                    : @{/adm/notice/reg}"
           [Java] th:method="post"
           [Java] th:enctype="multipart/form-data"
      ══════════════════════════════════════════════════ -->
      <form id="noticeWriteForm" method="post" action="#" enctype="multipart/form-data" novalidate>
        <!-- [Java] CSRF: th:hidden th:name="${_csrf.parameterName}" th:value="${_csrf.token}" -->
        <!-- [Java] 수정 모드: <input type="hidden" name="noticeSeq" th:value="${notice.noticeSeq}"> -->

        <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
             섹션: 공지사항 정보
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
        <section class="write-section" aria-labelledby="secNoticeTitle">
          <div class="write-section__head">
            <i data-lucide="bell" class="rss-icon-16"></i>
            <h2 class="write-section__title" id="secNoticeTitle">공지사항 관리</h2>
            <span class="adm-required-note">*는 필수입니다</span>
          </div><!-- /write-section__head -->
          <div class="write-section__body">
            <table class="adm-form-table">
              <tbody>
                <!-- ─── 행 1: 제목 ────────────────────────────────────────
                     스토리보드: 자율입력, 30자 제한
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row">제목<span class="required">*</span></th>
                  <td>
                    <!-- [Java] th:value="${notice.noticeTitle}" -->
                    <input type="text" id="noticeTitle" name="noticeTitle"
                           class="rss-input"
                           placeholder="제목을 입력하세요 (최대 30자)"
                           maxlength="30"
                           value="" />
                    <!-- 더미 수정 모드 예시: value="시스템 정기 점검 예정입니다" -->
                  </td>
                </tr>

                <!-- ─── 행 2: 카톡 전송 ──────────────────────────────────
                     스토리보드: 예/아니오 라디오, 기본값 아니오
                     → 예 선택 시 저장 누르면 카카오 알림 발송
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row">카톡 전송<span class="required">*</span></th>
                  <td>
                    <div class="notice-radio-group">
                      <!-- [Java] th:checked="${notice.kakaoSendYn == 'Y'}" -->
                      <label>
                        <input type="radio" id="kakaoSendYnY" name="kakaoSendYn" value="Y" />
                        예
                      </label>
                      <!-- [Java] th:checked="${notice.kakaoSendYn == 'N' or notice.kakaoSendYn == null}" -->
                      <label>
                        <input type="radio" id="kakaoSendYnN" name="kakaoSendYn" value="N" checked />
                        아니오
                      </label>
                    </div>
                  </td>
                </tr>

                <!-- ─── 행 3: 내용 (CKEditor 4) ───────────────────────────
                     스토리보드: 에디터에서 내용 작성
                     CKEditor 4 standard 빌드, 한국어 UI
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row" class="adm-th--top">
                    내용<span class="required">*</span>
                  </th>
                  <td>
                    <!-- CKEditor 4: textarea를 에디터로 대체 -->
                    <!-- [Java] 수정 모드: th:text="${notice.noticeContent}" -->
                    <textarea id="noticeContent" name="noticeContent"
                              class="notice-editor-wrap"
                              placeholder="공지 내용을 입력하세요."></textarea>
                  </td>
                </tr>

                <!-- ─── 행 4: 첨부파일 ────────────────────────────────────
                     스토리보드: 파일 찾기 버튼, 최대 10개
                     파일 추가 후 파일명 + × 버튼으로 표시
                     × 클릭 시 파일 삭제
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row" class="adm-th--top">체부파일</th>
                  <td>
                    <div class="notice-attach-area">
                      <!-- 파일 찾기 버튼 -->
                      <div class="adm-inline-group">
                        <button type="button" class="rss-btn rss-btn--outline"
                                onclick="triggerNoticeFileInput()">
                          <i data-lucide="paperclip" class="rss-icon-14"></i>
                          파일 찾기
                        </button>
                        <span class="notice-attach-hint">* 최대 10개까지 가능</span>
                        <!-- 실제 파일 input (hidden) -->
                        <input type="file" id="noticeFileInput" name="noticeAttach"
                               multiple accept="*/*"
                               style="display:none;"
                               onchange="addNoticeFiles(this)" />
                      </div>
                      <!-- 첨부 파일 목록 -->
                      <!-- [Java] th:each="attach : ${notice.attachList}" -->
                      <div class="notice-file-list" id="noticeFileList">
                        <!-- 더미 — 수정 모드 예시 -->
                        <!-- [Java] th:if="${attach != null}" -->
                        <div class="notice-file-tag" data-attach-seq="9001">
                          <!-- [Java] th:text="${attach.attachFileNm}" -->
                          <span class="notice-file-tag__name">첨부파일.pdf</span>
                          <button type="button" class="notice-file-tag__del"
                                  onclick="removeNoticeFile(this, 9001)"
                                  aria-label="파일 삭제">×</button>
                        </div>
                        <!-- [Java] /th:each 끝 -->
                      </div>
                      <!-- 삭제 예정 파일 seq 목록 (수정 모드에서 Java로 전송) -->
                      <input type="hidden" id="noticeDeleteAttachSeqs" name="deleteAttachSeqs" value="" />
                    </div>
                  </td>
                </tr>

                <!-- ─── 행 5: 사용여부 ────────────────────────────────────
                     스토리보드: 공개 / 비공개 라디오
                     비공개 시 사용자 공지사항에 표시되지 않음
                ──────────────────────────────────────────────────────── -->
                <tr>
                  <th scope="row">사용여부<span class="required">*</span></th>
                  <td>
                    <div class="notice-radio-group">
                      <!-- [Java] th:checked="${notice.useYn == 'Y' or notice.useYn == null}" -->
                      <label>
                        <input type="radio" id="useYnY" name="useYn" value="Y" checked />
                        공개
                      </label>
                      <!-- [Java] th:checked="${notice.useYn == 'N'}" -->
                      <label>
                        <input type="radio" id="useYnN" name="useYn" value="N" />
                        비공개
                      </label>
                    </div>
                  </td>
                </tr>

              </tbody>
            </table>
          </div><!-- /write-section__body -->
        </section><!-- /write-section -->

        <!-- ─── 하단 버튼 영역 ──────────────────────────────────
             스토리보드 ②: 저장 / ③: 취소
             저장: 필수 항목 확인 후 경고창 → 예 → 저장 후 목록(M5) 이동
             취소: 목록(M5)으로 이동
        ──────────────────────────────────────────────────────── -->
        <div class="rss-page-actions">
          <!-- ③ 취소 -->
          <!-- [Java] @{/adm/notice/list} -->
          <button type="button" class="rss-btn adm-btn--cancel"
                  onclick="location.href='notice-list.html'">취소</button>
          <!-- ② 저장 -->
          <button type="button" class="rss-btn adm-btn--save"
                  onclick="submitNoticeForm()">저장</button>
        </div>
      </form><!-- /noticeWriteForm -->
    </main>
    <div id="rss-footer-wrap"></div>
  </div><!-- /adm-main -->
</div><!-- /adm-layout -->

<!-- ══════════════════════════════════════════════════
     공통 스크립트
══════════════════════════════════════════════════ -->
<script src="adm-common.js?v=20260526"></script>
<script>
/* ─── CKEditor 4 초기화 ──────────────────────────────
   adm-common.js IIFE가 topbar/sidebar를 자동 삽입함
   CKEditor는 스크립트 로드 후 바로 replace() 호출 가능
──────────────────────────────────────────────────── */
if (window.lucide) lucide.createIcons();

CKEDITOR.replace('noticeContent', {
  language       : 'ko',          /* 한국어 UI */
  height         : 300,
  removePlugins  : 'elementspath', /* 하단 경로 표시 제거 */
  toolbar: [
    { name: 'styles',    items: ['Format', 'FontSize'] },
    { name: 'basicstyles',
      items: ['Bold', 'Italic', 'Underline', 'Strike', '-', 'RemoveFormat'] },
    { name: 'colors',    items: ['TextColor', 'BGColor'] },
    { name: 'paragraph',
      items: ['NumberedList', 'BulletedList', '-',
              'JustifyLeft', 'JustifyCenter', 'JustifyRight', 'JustifyBlock'] },
    { name: 'links',     items: ['Link', 'Unlink'] },
    { name: 'insert',    items: ['Image', 'Table', 'HorizontalRule', 'SpecialChar'] },
    { name: 'tools',     items: ['Maximize'] },
    { name: 'document',  items: ['Source'] }
  ],
  /* [Java] 이미지 업로드 URL 설정 시 아래 주석 해제
  filebrowserImageUploadUrl : '/adm/notice/upload/image',
  filebrowserUploadUrl      : '/adm/notice/upload/file',
  */
  contentsCss: ['https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap',
                'body { font-family: "Noto Sans KR", sans-serif; font-size: 14px; }']
});

/* [Java] 수정 모드: 기존 내용 로드
   CKEDITOR.instances['noticeContent'].setData('${notice.noticeContent}');
*/

/* 파일 input 재사용을 위해 값 초기화 */
document.getElementById('noticeFileInput').value = '';

/* ─── 파일 찾기 버튼 트리거 ─────────────────────────── */
function triggerNoticeFileInput() {
  document.getElementById('noticeFileInput').click();
}

/* ─── 첨부파일 추가 ─────────────────────────────────── */
function addNoticeFiles(input) {
  var fileList = document.getElementById('noticeFileList');
  var existingCount = fileList.querySelectorAll('.notice-file-tag').length;
  var files = Array.from(input.files);
  var maxFiles = 10;

  if (existingCount + files.length > maxFiles) {
    alert('첨부파일은 최대 ' + maxFiles + '개까지 가능합니다.');
    input.value = '';
    return;
  }

  files.forEach(function(file) {
    var tag = document.createElement('div');
    tag.className = 'notice-file-tag';
    tag.dataset.newFile = 'true'; /* 신규 파일 구분 */
    tag.innerHTML =
      '<span class="notice-file-tag__name">' + escapeHtml(file.name) + '</span>' +
      '<button type="button" class="notice-file-tag__del" ' +
      'onclick="removeNoticeFile(this, null)" aria-label="파일 삭제">×</button>';
    fileList.appendChild(tag);
  });

  /* 아이콘 재생성 */
  if (window.lucide) lucide.createIcons();
  /* input 초기화 (동일 파일 재선택 가능) */
  input.value = '';
}

/* ─── 첨부파일 삭제 ─────────────────────────────────── */
function removeNoticeFile(btn, attachSeq) {
  var tag = btn.closest('.notice-file-tag');
  /* 기존 파일(수정 모드): deleteAttachSeqs에 seq 추가 */
  if (attachSeq) {
    var seqInput = document.getElementById('noticeDeleteAttachSeqs');
    var current = seqInput.value ? seqInput.value.split(',') : [];
    current.push(String(attachSeq));
    seqInput.value = current.join(',');
  }
  tag.remove();
}

/* ─── HTML 이스케이프 유틸 ──────────────────────────── */
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── ② 저장 ────────────────────────────────────────
   필수 항목 확인 → 경고창 → 예 → 저장 후 목록(M5) 이동
   [Java] POST /adm/notice/reg  또는  PUT /adm/notice/mod/{seq}
──────────────────────────────────────────────────── */
function submitNoticeForm() {
  /* 제목 검증 */
  var title = document.getElementById('noticeTitle').value.trim();
  if (!title) {
    alert('제목을 입력하세요.');
    document.getElementById('noticeTitle').focus();
    return;
  }

  /* CKEditor 내용 검증 */
  var editor  = CKEDITOR.instances['noticeContent'];
  var content = editor ? editor.getData() : '';
  /* 태그 제거 후 텍스트만 추출하여 공백 체크 */
  var plainText = content.replace(/<[^>]*>/g, '').trim();
  if (!plainText) {
    alert('내용을 입력하세요.');
    if (editor) editor.focus();
    return;
  }

  /* 저장 확인 */
  if (!confirm('저장하시겠습니까?')) return;

  /* CKEditor 내용을 textarea에 동기화 (form submit 시 자동 처리되지만 명시적으로) */
  if (editor) editor.updateElement();

  /* [Java] 서버 요청으로 교체:
     document.getElementById('noticeWriteForm').submit();
  */
  console.log('[M5-1] 저장 요청 — title:', title);
  alert('저장 기능은 Java 연동 후 처리됩니다.');
  location.href = 'notice-list.html';
}
</script>
</body>
</html>
