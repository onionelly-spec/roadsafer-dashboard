<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- [Java] th:text="'장터 자세히보기 — 로드세이프티시스템 관리자'" -->
  <title>장터 자세히보기 — 로드세이프티시스템 관리자</title>
  <!-- 공통 CSS -->
  <link rel="stylesheet" href="../rss-common.css?v=20260526" />
  <link rel="stylesheet" href="adm-common-v2.css?v=20260526" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<!-- ══════════════════════════════════════════════════
     관리자 레이아웃
══════════════════════════════════════════════════ -->
<div id="adm-topbar-wrap"></div>
<div class="adm-layout">
  <div id="adm-sidebar-wrap"></div>
  <div class="adm-main">
    <!-- 브레드크럼 -->
    <div class="adm-breadcrumb">
      <h1 class="adm-breadcrumb__title">장터 자세히보기</h1>
      <nav class="adm-breadcrumb__nav" aria-label="breadcrumb">
        <a href="#">홈</a>
        <span class="adm-breadcrumb__sep">›</span>
        <a href="market-list.html">장터 관리</a>
        <span class="adm-breadcrumb__sep">›</span>
        <span class="adm-breadcrumb__current">자세히보기</span>
      </nav>
    </div>
    <main class="rss-content">
      <!-- ══════════════════════════════════════════════════
           장터 자세히보기 (M7-1)
           [Java] GET /adm/market/detail?marketSeq=N
           [DB] 테이블: market WHERE market_seq = #{marketSeq}
           [Java] Model: market (MarketDto), imageList (List<MarketImageDto>)
           ① 등록 정보: 작성자, 등록일, 카테고리, 수량, 규격, 판매가, 내용
           ② 사진: 등록순 순차 표시 (marketImgUrl 리스트)
           ③ 삭제: 경고창 → 예 → 삭제 처리 → 목록(M7)으로 이동
           ④ 목록: market-list.html 으로 이동
      ══════════════════════════════════════════════════ -->
      <!-- write-section: 흰색 카드 박스 (버튼은 이 바깥 회색 배경에 위치) -->
      <section class="write-section" aria-labelledby="secMarketDetail">
        <div class="write-section__head">
          <i data-lucide="shopping-bag" style="width:16px;height:16px;color:var(--rss-primary);flex-shrink:0;"></i>
          <h2 class="write-section__title" id="secMarketDetail">장터 자세히보기</h2>
        </div><!-- /write-section__head -->
        <div class="write-section__body">

        <!-- ① 등록 정보 테이블 + 내용 + ② 사진 -->
        <div class="market-detail-wrap">
          <!-- 스펙 테이블 (rss-table--detail 공통 클래스) -->
          <table class="rss-table rss-table--detail" style="margin-bottom:20px;">
            <tbody>
              <tr>
                <th scope="row">작성자</th>
                <!-- [Java] th:text="${market.usrNm} + '(' + ${market.usrId} + ')'" -->
                <!-- [DB] market.usr_id, member.mbr_nm -->
                <td>스마트차단(smart001)</td>
              </tr>
              <tr>
                <th scope="row">등록일</th>
                <!-- [Java] th:text="${market.regDt}" -->
                <!-- [DB] market.reg_dtm -->
                <td>2026-06-22</td>
              </tr>
              <tr>
                <th scope="row">카테고리</th>
                <!-- [Java] th:text="${market.categoryLabel}" -->
                <!-- [DB] market.market_cat (sinca/sign/safety/sinboard/tma) -->
                <td>TMA</td>
              </tr>
              <tr>
                <th scope="row">수량</th>
                <!-- [Java] th:text="${market.marketQty}" -->
                <!-- [DB] market.market_qty -->
                <td>1개</td>
              </tr>
              <tr>
                <th scope="row">규격</th>
                <!-- [Java] th:text="${market.marketSpec}" -->
                <!-- [DB] market.market_spec -->
                <td>규격은 자율입력으로 작성합니다.</td>
              </tr>
              <tr>
                <th scope="row">판매가</th>
                <!-- [Java] th:text="${market.marketPrice}" -->
                <!-- [DB] market.market_price -->
                <td>20,000,000원 이상 (조정 가능)</td>
              </tr>
              <tr>
                <th scope="row">내용</th>
                <!-- [Java] th:text="${market.marketContent}" -->
                <!-- [DB] market.market_content -->
                <td>
                  <div class="market-info__content">최신식 2026년 TMA1 입니다. 출고 후 2회 현상에 나간 신생입니다.
내용이 보여집니다
내용이 보여집니다
내용이 보여집니다
내용이 보여집니다.</div>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- ② 사진: 등록순 순차 표시 (스토리보드 M7-1 ①) -->
          <!-- [Java] th:if="${imageList != null and !imageList.isEmpty()}" -->
          <div class="market-photo-list">
            <!-- [Java] th:each="img : ${imageList}" -->
            <!-- [Java] th:src="${img.marketImgUrl}" th:alt="'상품 사진 ' + ${imgStat.index + 1}" -->
            <img src="https://placehold.co/800x500/f3f4f6/9ca3af?text=사진1" alt="상품 사진 1" loading="lazy" />
            <img src="https://placehold.co/800x500/e5e7eb/9ca3af?text=사진2" alt="상품 사진 2" loading="lazy" />
          </div>
        </div><!-- /market-detail-wrap -->

        </div><!-- /write-section__body -->
      </section><!-- /write-section -->

      <!-- ─── 하단 버튼 영역 ─────────────────────────────────
           스토리보드 M7-1:
           ② 삭제 버튼 (좌측)
           ③ 목록 버튼 (우측)
           rss-page-actions--split : 좌(삭제) / 중앙(빈 공간) / 우(목록)
           rss-card 바깥에 위치 → 회색 배경(rss-content) 위에 버튼 표시 (표준 스타일)
      ──────────────────────────────────────────────────── -->
      <div class="rss-page-actions rss-page-actions--split">
        <!-- ② 삭제 버튼 (좌측) -->
        <!-- [Java] @{/adm/market/delete(marketSeq=${market.marketSeq})} -->
        <div class="rss-page-actions__left">
          <button type="button" class="rss-btn adm-btn--delete"
                  onclick="deleteMarket()">삭제</button>
        </div>
        <!-- 가운데: 빈 공간 -->
        <div></div>
        <!-- ③ 목록 버튼 (우측) -->
        <!-- [Java] @{/adm/market/list} -->
        <div class="rss-page-actions__right">
          <a href="market-list.html" class="rss-btn rss-btn--list">목록</a>
        </div>
      </div><!-- /rss-page-actions -->
    </main>
  </div><!-- /adm-main -->
</div><!-- /adm-layout -->
<!-- ══════════════════════════════════════════════════
     공통 JS
══════════════════════════════════════════════════ -->
<script src="adm-common.js?v=20260526"></script>
<script>
/* ─── 페이지 초기화 ─────────────────────────────────── */
if (window.lucide) lucide.createIcons();

/* ─── ② 삭제 (스토리보드 M7-1 ②) ──────────────────────
   경고창: 삭제하시겠습니까? → 예 → 삭제 처리 → 목록(M7)으로 이동
   [Java] DELETE /adm/market?marketSeq=N
──────────────────────────────────────────────────── */
function deleteMarket() {
  if (!confirm('삭제하시겠습니까?')) return;
  /* [Java] 서버 요청으로 교체:
     var params = new URLSearchParams(location.search);
     var marketSeq = params.get('marketSeq');
     fetch('/adm/market?marketSeq=' + marketSeq, { method: 'DELETE' })
       .then(function(r) { if (r.ok) { location.href = '/adm/market/list'; } });
  */
  alert('삭제 기능은 Java 연동 후 처리됩니다.');
  location.href = 'market-list.html';
}
</script>
</body>
</html>
