<!--
  sidebar.html — 공통 사이드바 컴포넌트
  =====================================================
  [사용법] 각 페이지에서 아래 div를 배치하면 자동 삽입됩니다.
    <div id="rss-sidebar-wrap"></div>
    (rss-overlay는 이 파일 하단에 포함되어 있습니다)

  [Java Thymeleaf 전환 시]
    이 파일 내용을 /templates/fragments/sidebar.html 로 이동하고
    각 페이지에서 <div th:replace="fragments/sidebar :: sidebar"></div> 로 교체하세요.

  [활성 메뉴 처리]
    rss-common.js 에서 현재 페이지 URL을 감지하여 자동으로 active 클래스를 부여합니다.
    Java 환경에서는 th:classappend="${currentMenu == 'notice'} ? 'active'" 방식으로 처리하세요.
  =====================================================
-->
<aside class="rss-sidebar" id="rssSidebar">

  <!-- 로고 -->
  <a href="index.html" class="rss-sidebar__logo">
    <!-- [이미지 경로] 실제 서버 배포 시 /assets/images/logo-rss-new.png 로 변경 -->
    <img src="logo-rss-new.png" alt="로드세이프티시스템 로고" class="rss-sidebar__logo-img"
         style="width:36px;height:36px;object-fit:contain;border-radius:4px;" />
    <div class="rss-sidebar__logo-text">
      <span class="rss-sidebar__logo-main">(주)로드세이프티시스템</span>
      <span class="rss-sidebar__logo-sub">Road Safety System</span>
    </div>
  </a>

  <!-- 사용자 정보 -->
  <!-- [DB] tbl_mber: usr_nm, company_nm, user_type -->
  <div class="rss-sidebar__user">
    <div class="rss-sidebar__user-info">
      <div class="rss-sidebar__user-name" id="sidebar_usr_nm">나잘난</div>
      <!-- [Java] ${session.loginUsr.usrNm} -->
      <div class="rss-sidebar__user-company" id="sidebar_company_nm">한국도로차단(주)</div>
      <!-- [Java] ${session.loginUsr.companyNm} -->
    </div>
  </div>

  <!-- 내비게이션 -->
  <nav class="rss-nav" aria-label="주 메뉴">
    <!-- [Java] 사용자 유형(user_type)에 따라 메뉴 노출 제어 -->
    <!-- [Java] th:if="${session.loginUsr.userType == 'BLOCKER'}" -->
    <ul style="list-style:none;padding:0;margin:0;">
      <li>
        <a href="index.html" class="rss-nav__link" data-menu="index">
          <span class="rss-nav__icon"><i data-lucide="layout-dashboard"></i></span>
          <span class="rss-nav__label">대시보드</span>
        </a>
      </li>
      <li>
        <a href="construction-list.html" class="rss-nav__link" data-menu="construction-list">
          <span class="rss-nav__icon"><i data-lucide="hard-hat"></i></span>
          <span class="rss-nav__label">내 공사 현황</span>
        </a>
      </li>
      <li>
        <a href="construction-info.html" class="rss-nav__link" data-menu="construction-info">
          <span class="rss-nav__icon"><i data-lucide="file-text"></i></span>
          <span class="rss-nav__label">공사 정보</span>
        </a>
      </li>
      <li>
        <a href="tma-card.html" class="rss-nav__link" data-menu="tma-card">
          <span class="rss-nav__icon"><i data-lucide="credit-card"></i></span>
          <span class="rss-nav__label">TMA 카드 관리</span>
        </a>
      </li>
      <li>
        <a href="market.html" class="rss-nav__link" data-menu="market">
          <span class="rss-nav__icon"><i data-lucide="shopping-bag"></i></span>
          <span class="rss-nav__label">장터</span>
        </a>
      </li>
      <li>
        <a href="community.html" class="rss-nav__link" data-menu="community">
          <span class="rss-nav__icon"><i data-lucide="users"></i></span>
          <span class="rss-nav__label">커뮤니티</span>
        </a>
      </li>
      <li>
        <a href="notice.html" class="rss-nav__link" data-menu="notice">
          <span class="rss-nav__icon"><i data-lucide="bell"></i></span>
          <span class="rss-nav__label">공지사항</span>
        </a>
      </li>
      <li>
        <a href="ad.html" class="rss-nav__link" data-menu="ad">
          <span class="rss-nav__icon"><i data-lucide="megaphone"></i></span>
          <span class="rss-nav__label">광고</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- 하단 메뉴 -->
  <div class="rss-sidebar__bottom">
    <a href="profile.html" class="rss-sidebar__bottom-link">
      <span class="rss-nav__icon"><i data-lucide="settings"></i></span>
      <span class="rss-nav__label">정보변경</span>
    </a>
    <a href="login.html" class="rss-sidebar__bottom-link">
      <span class="rss-nav__icon"><i data-lucide="log-out"></i></span>
      <span class="rss-nav__label">로그아웃</span>
    </a>
  </div>

  <!-- PC 전용 사이드바 접기/펼치기 화살표 버튼 -->
  <!-- 모바일(max-width:1023px)에서는 CSS로 숨김 처리 -->
  <button class="rss-sidebar__collapse-btn" id="rssSidebarCollapseBtn"
          aria-label="사이드바 접기/펼치기" title="사이드바 접기/펼치기">
    <i data-lucide="chevron-left" class="rss-sidebar__collapse-icon" id="rssSidebarCollapseIcon"
       style="width:16px;height:16px;"></i>
  </button>

</aside>

<!-- 모바일 오버레이 — 사이드바 외부 클릭 시 닫기 -->
<div class="rss-overlay" id="rssOverlay" aria-hidden="true"></div>
