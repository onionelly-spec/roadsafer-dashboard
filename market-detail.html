<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장터 상세 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
  <style>
    /* ── 상세 레이아웃 ── */
    .market-detail-wrap {
      padding: 24px;
    }
    @media (max-width: 768px) {
      .market-detail-wrap { padding: 16px; }
    }

    /* ── 제목 영역 ── */
    .market-detail__title-bar {
      padding: 20px 24px 0;
      border-bottom: 1px solid var(--rss-border);
      padding-bottom: 16px;
      margin-bottom: 0;
    }
    .market-detail__cat {
      font-size: var(--rss-font-sm);
      font-weight: 600;
      color: var(--rss-amber-dark);
      margin-bottom: 4px;
    }
    .market-detail__title {
      font-size: var(--rss-font-xl);
      font-weight: 700;
      color: var(--rss-text);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .market-detail__meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: var(--rss-font-sm);
      color: #9ca3af;
      flex-wrap: wrap;
    }
    @media (max-width: 768px) {
      .market-detail__title-bar { padding: 16px 16px 14px; }
      .market-detail__title { font-size: var(--rss-font-md); }
    }

    /* ── 사진 영역 (스토리보드 §B5-1 ④: 등록순 순차 표시) ── */
    .market-photo-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .market-photo-list img {
      width: 100%;
      max-width: 1200px;
      border-radius: var(--rss-radius);
      border: 1.5px solid var(--rss-border);
      display: block;
      background: #f3f4f6;
    }

    /* ── 상품 내용 ── */
    .market-info__content {
      font-size: var(--rss-font-base);
      color: #374151;
      line-height: 1.75;
      padding: 14px;
      background: #f9fafb;
      border-radius: var(--rss-radius);
      border: 1px solid var(--rss-border);
      white-space: pre-line;
    }
  </style>
</head>
<body>

<div class="rss-app">
  <div id="rss-sidebar-wrap"></div>
  <div class="rss-main" id="rssMain">
    <div id="rss-header-wrap" data-title="장터" data-icon="shopping-bag"></div>

    <main class="rss-content">
      <div class="rss-card" style="padding:0;">

        <!-- ══════════════════════════════════════════════════
             장터 상세 (스토리보드 §B5-1)
             [DB] 테이블: market WHERE market_seq = #{marketSeq}
             [Java] Model: market (MarketDto), imageList (List<MarketImageDto>)

             ① 제목: 카테고리 + '판매' 고정 (스토리보드 §B5 ④)
             ② 등록일, 아이디(앞 4자리 + ***)
             ③ 등록 정보: 수량, 규격, 판매가, 내용
             ④ 사진: 등록순으로 순차 표시
             ⑤ 수정/삭제: 글 쓴 본인만 보임
             ⑥ 삭제: 경고창 → 예 → 삭제 처리 → 목록(B5)으로 이동
             ⑦ 상담 신청: 글 쓴 본인 외 회원에게만 보임
        ══════════════════════════════════════════════════ -->

        <!-- ① 제목 영역 -->
        <div class="market-detail__title-bar">
          <!-- [Java] th:text="${market.categoryLabel} + ' 판매'" -->
          <h1 class="market-detail__title">싸인카 판매</h1>
          <div class="market-detail__meta">
            <!-- [Java] th:text="${market.regDt}" -->
            <span>2026-06-19</span>
            <!-- [Java] th:text="${#strings.substring(market.usrId,0,4)} + '***'" -->
            <span>seho***</span>
          </div>
        </div>

        <!-- ③ 등록 정보 테이블 + 내용 + ④ 사진 -->
        <div class="market-detail-wrap">

          <!-- 스펙 테이블 (rss-table--detail 공통 클래스) -->
          <table class="rss-table rss-table--detail" style="margin-bottom:20px;">
            <tbody>
              <tr>
                <th scope="row">분류</th>
                <!-- [Java] th:text="${market.categoryLabel}" -->
                <!-- [DB] market.market_cat -->
                <td>싸인카</td>
              </tr>
              <tr>
                <th scope="row">수량</th>
                <!-- [Java] th:text="${market.marketQty}" -->
                <!-- [DB] market.market_qty -->
                <td>1개</td>
              </tr>
              <tr>
                <th scope="row">규격</th>
                <!-- [Java] th:text="${market.marketSpec}" -->
                <!-- [DB] market.market_spec -->
                <td>규격은 자율입력으로 작성합니다.</td>
              </tr>
              <tr>
                <th scope="row">판매가</th>
                <!-- [Java] th:text="${market.marketPrice}" -->
                <!-- [DB] market.market_price -->
                <td>20,000,000원 이상 (조정 가능)</td>
              </tr>
              <tr>
                <th scope="row">내용</th>
                <!-- [Java] th:text="${market.marketContent}" -->
                <!-- [DB] market.market_content -->
                <td>
                  <div class="market-info__content">최신식 2026년 TMA1 입니다. 출고 후 2회 현상에 나간 신생입니다.
내용이 보여집니다
내용이 보여집니다
내용이 보여집니다
내용이 보여집니다.</div>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- ④ 사진: 등록순 순차 표시 (스토리보드 §B5-1 ④) -->
          <!-- [Java] th:if="${imageList != null and !imageList.isEmpty()}" -->
          <div class="market-photo-list">
            <!-- [Java] th:each="img : ${imageList}" -->
            <img src="https://placehold.co/800x500/f3f4f6/9ca3af?text=사진1" alt="상품 사진 1" loading="lazy" />
            <img src="https://placehold.co/800x500/e5e7eb/9ca3af?text=사진2" alt="상품 사진 2" loading="lazy" />
          </div>

        </div><!-- /market-detail-wrap -->

        <!-- ====================================================
             수정/삭제 버튼: 작성자만 표시
             [Java] th:if="${loginUsr.mberSeq == market.mberSeq}"
             ==================================================== -->
        <div class="rss-page-actions rss-page-actions--left" style="border-top:none;">
          <a href="market-write.html" class="rss-btn rss-btn--outline rss-btn--sm">
            <i data-lucide="pencil" style="width:13px;height:13px;"></i>수정
          </a>
          <button type="button" class="rss-btn rss-btn--outline-danger rss-btn--sm"
                  onclick="deleteMarket()">
            <i data-lucide="trash-2" style="width:13px;height:13px;"></i>삭제
          </button>
        </div>

        <!-- ⑦ 상담신청(타인만) + 목록: 가운데 정렬 (공통 CSS: rss-page-actions) -->
        <div class="rss-page-actions">
          <!-- [Java] th:unless="${loginUsr.mberSeq == market.mberSeq}" -->
          <button type="button" class="rss-btn rss-btn--amber px-10"
                  onclick="openConsultModal()">
            <i data-lucide="message-circle" style="width:14px;height:14px;"></i>상담 신청
          </button>
          <a href="market.html" class="rss-btn rss-btn--outline px-10">
            <i data-lucide="list" style="width:14px;height:14px;"></i>목록
          </a>
        </div>

      </div><!-- /rss-card -->
    </main>

    <div id="rss-footer-wrap"></div>
  </div><!-- /rss-main -->
</div><!-- /rss-app -->

<!-- ══════════════════════════════════════════════════
     상담 신청 모달 (스토리보드 §B5-1 ⑦)
     경고창: 판매자에게 이름, 연락처가 전송됩니다.
     개인정보 활용에 동의하시나요?
     → 예 → 판매자에게 카톡 알림 전송 → 경고창: 상담 신청되었습니다.
     → 확인 → 경고창 닫힘. 카톡전송(P11)
══════════════════════════════════════════════════ -->
<div id="consultModal" class="rss-modal-backdrop" style="display:none;" onclick="closeConsultModal(event)">
  <div class="rss-modal" role="dialog" aria-modal="true" aria-labelledby="consultModalTitle">
    <p class="rss-modal__title" id="consultModalTitle">상담 신청</p>
    <div class="rss-modal__body">
      <p style="font-size:var(--rss-font-base); line-height:1.7; color:var(--rss-text);">
        판매자에게 이름, 연락처가 전송됩니다.<br>
        개인정보 활용에 동의하시나요?
      </p>
    </div>
    <div class="rss-modal__footer">
      <button type="button" class="rss-btn rss-btn--outline rss-btn--sm" onclick="closeConsultModal()">아니오</button>
      <button type="button" class="rss-btn rss-btn--amber rss-btn--sm"  onclick="submitConsult()">예</button>
    </div>
  </div>
</div>

<!-- 상담 신청 완료 모달 -->
<div id="consultDoneModal" class="rss-modal-backdrop" style="display:none;" onclick="if(event.target===this){this.style.display='none';}">
  <div class="rss-modal" role="dialog" aria-modal="true">
    <p class="rss-modal__title">상담 신청</p>
    <div class="rss-modal__body">
      <p style="font-size:var(--rss-font-base); line-height:1.7; color:var(--rss-text);">
        상담 신청되었습니다.<br>
        연락처를 통해 판매자가 상담을 진행할 예정입니다.
      </p>
    </div>
    <div class="rss-modal__footer">
      <button type="button" class="rss-btn rss-btn--amber rss-btn--sm"
              onclick="document.getElementById('consultDoneModal').style.display='none';">확인</button>
    </div>
  </div>
</div>

<script src="rss-common.js?v=7e12cb4he_bust"></script>
<script>
  lucide.createIcons();

  /* ── 삭제 (스토리보드 §B5-1 ⑥) ── */
  function deleteMarket() {
    if (confirm('해당 게시글을 삭제하시겠습니까?')) {
      /* [Java] POST /market/delete?marketSeq=#{marketSeq} */
      alert('삭제되었습니다. (더미 동작)');
      location.href = 'market.html';
    }
  }

  /* ── 상담 신청 모달 (스토리보드 §B5-1 ⑦) ── */
  function openConsultModal() {
    document.getElementById('consultModal').style.display = 'flex';
  }
  function closeConsultModal(e) {
    if (!e || e.target === document.getElementById('consultModal')) {
      document.getElementById('consultModal').style.display = 'none';
    }
  }
  function submitConsult() {
    document.getElementById('consultModal').style.display = 'none';
    /* [Java] POST /market/consult?marketSeq=#{marketSeq} → 판매자에게 카톡 알림 전송 (P11) */
    document.getElementById('consultDoneModal').style.display = 'flex';
  }
</script>
  <script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    // 기존 이미지에 onerror 등록
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
    });
    // 동적으로 추가되는 이미지 감지
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            if (node.tagName === 'IMG') {
              node.addEventListener('error', function() { applyPlaceholder(this); });
            }
            node.querySelectorAll && node.querySelectorAll('img').forEach(function(img) {
              img.addEventListener('error', function() { applyPlaceholder(this); });
            });
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
  </script>
</body>
</html>
