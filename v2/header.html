<!--
  header.html — 공통 헤더 컴포넌트
  =====================================================
  [사용법] 각 페이지에서 아래 div를 배치하면 자동 삽입됩니다.
    <div id="rss-header-wrap" data-title="페이지 제목"></div>

  data-title 속성에 페이지 제목을 지정하면 헤더 타이틀이 자동으로 설정됩니다.

  [Java Thymeleaf 전환 시]
    이 파일 내용을 /templates/fragments/header.html 로 이동하고
    각 페이지에서 <div th:replace="fragments/header :: header(title='공지사항')"></div> 로 교체하세요.
  =====================================================
-->
<header class="rss-header">
  <div class="rss-header__left">
    <button class="rss-header__toggle" id="rssSidebarToggle" aria-label="사이드바 토글">
      <i data-lucide="menu" style="width:20px;height:20px;"></i>
    </button>
    <!-- 페이지 타이틀: data-title 속성 또는 Java th:text로 설정 -->
    <h1 class="rss-header__title" id="rss_header_title">대시보드</h1>
    <!-- [Java] th:text="${pageTitle}" -->
  </div>
  <div class="rss-header__right">
    <!-- 알림 버튼 -->
    <button class="rss-header__icon-btn" aria-label="알림" style="position:relative;">
      <i data-lucide="bell" style="width:20px;height:20px;"></i>
      <!-- [DB] tbl_notification WHERE user_id = ? AND is_read = 0 COUNT > 0 -->
      <span class="rss-header__badge" id="header_noti_badge" style="display:none;">3</span>
      <!-- [Java] th:if="${notiCount > 0}" th:text="${notiCount}" -->
    </button>
    <!-- 사용자 아바타 + 이름 -->
    <div class="rss-header__avatar" id="header_user_avatar">나</div>
    <!-- [Java] ${session.loginUser.userName.substring(0,1)} -->
    <span class="rss-header__username" id="header_user_name">나잘난</span>
    <!-- [Java] ${session.loginUser.userName} -->
  </div>
</header>
