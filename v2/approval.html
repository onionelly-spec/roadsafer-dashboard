<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>승인 관리 — 로드세이프티시스템</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />

  <style>
    /* ── 승인관리 전용 스타일 ────────────────────────────── */

    /* 섹션 타이틀 */
    .apv-section-title {
      font-size: var(--rss-font-md);
      font-weight: 700;
      color: var(--rss-text);
      letter-spacing: 0.01em;
      padding: 20px 24px 14px;
      background: #f9fafb;
      border-bottom: 2px solid var(--rss-border);
    }

    /* 테이블 td 전용 스타일 */
    .apv-td-name {
      font-weight: 600;
      color: var(--rss-text);
      text-align: center;
    }
    .apv-td-tel {
      color: var(--rss-muted);
      letter-spacing: 0.02em;
      text-align: center;
    }
    .apv-td-action {
      text-align: center;
    }

    /* 두 섹션 공통 colgroup 너비 */
    .apv-col-nm   { width: 160px; }
    .apv-col-tel  { width: auto; }
    .apv-col-act  { width: 160px; }

    /* 빈 상태 */
    .apv-empty {
      padding: 32px 24px;
      text-align: center;
      color: var(--rss-muted);
      font-size: var(--rss-font-base);
    }

    /* 섹션 구분 */
    .apv-section-divider {
      height: 8px;
      background: var(--rss-bg);
      border-top: 1px solid var(--rss-border);
      border-bottom: 1px solid var(--rss-border);
    }

    /* 반응형 */
    @media (max-width: 640px) {
      .apv-section-title { padding: 14px 16px 10px; font-size: var(--rss-font-base); }
      .apv-col-nm  { width: 80px; }
      .apv-col-act { width: 120px; }
    }
  </style>
</head>
<body>

<div class="rss-app">

  <!-- 공통 사이드바 -->
  <div id="rss-sidebar-wrap"></div>

  <div class="rss-main" id="rssMain">

    <!-- 공통 헤더 -->
    <!-- [Java] user_type = 'BLOCK' (차단기업 대표) 인 경우에만 이 페이지 접근 허용 -->
    <div id="rss-header-wrap" data-title="승인 관리" data-icon="user-check"></div>

    <main class="rss-content">

      <!-- ══════════════════════════════════════════════════
           승인 관리 카드
      ══════════════════════════════════════════════════ -->
      <div class="rss-card" style="padding:0; overflow:hidden;">

        <!-- ① 승인 요청 섹션 ─────────────────────────────
             [DB] 테이블: tbl_mber
             [DB] 조건: mber_type = 'EMPLOYEE' AND approve_yn = 0
                        AND company_nm = #{loginUsr.companyNm}
             [DB] 정렬: ORDER BY reg_dtm DESC
             [Java] th:if="${!approveReqList.isEmpty()}"
        ──────────────────────────────────────────────── -->
        <p class="apv-section-title">승인 요청</p>

        <div class="rss-table-wrap">
          <table class="rss-table" aria-label="승인 요청 목록">
            <colgroup>
              <col class="apv-col-nm" />
              <col class="apv-col-tel" />
              <col class="apv-col-act" />
            </colgroup>
            <thead>
              <tr>
                <th style="text-align:center;">이름</th>
                <th style="text-align:center;">휴대폰 번호</th>
                <th style="text-align:center;">관리</th>
              </tr>
            </thead>
            <tbody id="approveReqList">
              <!-- [Java] th:each="mber : ${approveReqList}" -->

              <!-- 더미 데이터 1 -->
              <tr data-mber-seq="101">
                <!-- [Java] th:text="${mber.usrNm}" -->
                <td class="apv-td-name">도시진</td>
                <!-- [Java] th:text="${mber.tel}" -->
                <td class="apv-td-tel">010-2222-7777</td>
                <td class="apv-td-action">
                  <div style="display:inline-flex;align-items:center;gap:8px;">
                    <!-- [Java] th:attr="data-mber-seq=${mber.mberSeq}" -->
                    <button class="rss-btn rss-btn--primary rss-btn--sm"
                            onclick="approveConfirm(this, '101', '도시진')"
                            data-mber-seq="101">승인</button>
                    <button class="rss-btn rss-btn--sm"
                            style="background:var(--rss-bg);border:1px solid var(--rss-border);color:var(--rss-muted);"
                            onclick="rejectConfirm(this, '101', '도시진')"
                            data-mber-seq="101">반려</button>
                  </div>
                </td>
              </tr>

              <!-- 더미 데이터 2 -->
              <tr data-mber-seq="102">
                <td class="apv-td-name">김소리</td>
                <td class="apv-td-tel">010-8888-4111</td>
                <td class="apv-td-action">
                  <div style="display:inline-flex;align-items:center;gap:8px;">
                    <button class="rss-btn rss-btn--primary rss-btn--sm"
                            onclick="approveConfirm(this, '102', '김소리')"
                            data-mber-seq="102">승인</button>
                    <button class="rss-btn rss-btn--sm"
                            style="background:var(--rss-bg);border:1px solid var(--rss-border);color:var(--rss-muted);"
                            onclick="rejectConfirm(this, '102', '김소리')"
                            data-mber-seq="102">반려</button>
                  </div>
                </td>
              </tr>

              <!-- [Java] th:if="${approveReqList.isEmpty()}" -->
              <!--
              <tr id="approveReqEmpty">
                <td colspan="3" class="apv-empty">새로운 승인 요청이 없습니다.</td>
              </tr>
              -->
            </tbody>
          </table>
        </div>

        <!-- 섹션 구분 -->
        <div class="apv-section-divider"></div>

        <!-- ② 승인 완료 직원(부서) 섹션 ──────────────────
             [DB] 테이블: tbl_mber
             [DB] 조건: mber_type = 'EMPLOYEE' AND approve_yn = 1
                        AND company_nm = #{loginUsr.companyNm}
             [DB] 정렬: ORDER BY reg_dtm DESC
             [Java] th:if="${!approvedMberList.isEmpty()}"
        ──────────────────────────────────────────────── -->
        <p class="apv-section-title">승인 직원(부서)</p>

        <div class="rss-table-wrap">
          <table class="rss-table" aria-label="승인 완료 직원 목록">
            <colgroup>
              <col class="apv-col-nm" />
              <col class="apv-col-tel" />
              <col class="apv-col-act" />
            </colgroup>
            <thead>
              <tr>
                <th style="text-align:center;">이름</th>
                <th style="text-align:center;">휴대폰 번호</th>
                <th style="text-align:center;">관리</th>
              </tr>
            </thead>
            <tbody id="approvedMberList">
              <!-- [Java] th:each="mber : ${approvedMberList}" -->

              <!-- 더미 데이터 1 -->
              <tr data-mber-seq="201">
                <!-- [Java] th:text="${mber.usrNm}" -->
                <td class="apv-td-name">민윤기</td>
                <!-- [Java] th:text="${mber.tel}" -->
                <td class="apv-td-tel">010-2222-7777</td>
                <td class="apv-td-action">
                  <!-- [Java] th:attr="data-mber-seq=${mber.mberSeq}" -->
                  <button class="rss-btn rss-btn--sm"
                          style="background:#6b7280;color:#fff;border:none;"
                          onclick="cancelConfirm(this, '201', '민윤기')"
                          data-mber-seq="201">승인 취소</button>
                </td>
              </tr>

              <!-- 더미 데이터 2 -->
              <tr data-mber-seq="202">
                <td class="apv-td-name">신성민</td>
                <td class="apv-td-tel">010-8888-4111</td>
                <td class="apv-td-action">
                  <button class="rss-btn rss-btn--sm"
                          style="background:#6b7280;color:#fff;border:none;"
                          onclick="cancelConfirm(this, '202', '신성민')"
                          data-mber-seq="202">승인 취소</button>
                </td>
              </tr>

              <!-- [Java] th:if="${approvedMberList.isEmpty()}" -->
              <!--
              <tr id="approvedMberEmpty">
                <td colspan="3" class="apv-empty">승인된 직원이 없습니다.</td>
              </tr>
              -->
            </tbody>
          </table>
        </div>

      </div><!-- /.rss-card -->

    </main><!-- /.rss-content -->

    <!-- 공통 푸터 -->
    <div id="rss-footer-wrap"></div>

  </div><!-- /.rss-main -->
</div><!-- /.rss-app -->


<!-- ══════════════════════════════════════════════════
     확인 모달 (승인 / 반려 / 승인 취소 공용)
     [Java] 실제 환경에서는 form submit 또는 fetch API로 교체
══════════════════════════════════════════════════ -->
<div class="rss-modal-backdrop" id="apvConfirmModal" role="dialog" aria-modal="true"
     aria-labelledby="apvConfirmTitle" style="display:none;">
  <div class="rss-modal" style="max-width:400px;">
    <div class="rss-modal__header">
      <h2 class="rss-modal__title" id="apvConfirmTitle">승인 확인</h2>
      <button class="rss-modal__close" onclick="closeApvModal()" aria-label="닫기">
        <i data-lucide="x" style="width:20px;height:20px;"></i>
      </button>
    </div>
    <div class="rss-modal__body">
      <p id="apvConfirmMsg" style="font-size:var(--rss-font-base);color:var(--rss-text);line-height:1.7;"></p>
    </div>
    <div class="rss-modal__footer" style="gap:8px;">
      <button class="rss-btn rss-btn--sm"
              style="background:var(--rss-bg);border:1px solid var(--rss-border);color:var(--rss-muted);"
              onclick="closeApvModal()">취소</button>
      <button class="rss-btn rss-btn--primary rss-btn--sm" id="apvConfirmOkBtn"
              onclick="executeApvAction()">확인</button>
    </div>
  </div>
</div>


<script src="rss-common.js"></script>
<script>
/* ══════════════════════════════════════════════════
   승인 관리 인터랙션
   [Java] 실제 환경에서는 fetch API 또는 form submit으로 서버 요청 처리
   [Java] 승인: POST /api/approval/approve  { mberSeq: ... }
   [Java] 반려: POST /api/approval/reject   { mberSeq: ... }
   [Java] 취소: POST /api/approval/cancel   { mberSeq: ... }
══════════════════════════════════════════════════ */

var _apvAction   = null;
var _apvMberSeq  = null;
var _apvRowEl    = null;

function approveConfirm(btn, mberSeq, usrNm) {
  _apvAction  = 'approve';
  _apvMberSeq = mberSeq;
  _apvRowEl   = btn.closest('tr');
  document.getElementById('apvConfirmTitle').textContent = '승인 처리';
  document.getElementById('apvConfirmMsg').innerHTML =
    '<strong>' + usrNm + '</strong> 님을 승인 처리하시겠습니까?<br>' +
    '승인 후 해당 계정은 정상 사용 가능 상태로 전환됩니다.';
  document.getElementById('apvConfirmOkBtn').style.background = 'var(--rss-amber)';
  document.getElementById('apvConfirmOkBtn').textContent = '승인';
  openApvModal();
}

function rejectConfirm(btn, mberSeq, usrNm) {
  _apvAction  = 'reject';
  _apvMberSeq = mberSeq;
  _apvRowEl   = btn.closest('tr');
  document.getElementById('apvConfirmTitle').textContent = '반려 처리';
  document.getElementById('apvConfirmMsg').innerHTML =
    '<strong>' + usrNm + '</strong> 님을 반려 처리하시겠습니까?<br>' +
    '반려하면 모든 가입 정보가 삭제됩니다.';
  document.getElementById('apvConfirmOkBtn').style.background = '#dc2626';
  document.getElementById('apvConfirmOkBtn').textContent = '반려';
  openApvModal();
}

function cancelConfirm(btn, mberSeq, usrNm) {
  _apvAction  = 'cancel';
  _apvMberSeq = mberSeq;
  _apvRowEl   = btn.closest('tr');
  document.getElementById('apvConfirmTitle').textContent = '승인 취소';
  document.getElementById('apvConfirmMsg').innerHTML =
    '<strong>' + usrNm + '</strong> 님의 승인을 취소하시겠습니까?<br>' +
    '승인 취소 시 로그인이 불가능하고 모든 개인 정보가 삭제됩니다.';
  document.getElementById('apvConfirmOkBtn').style.background = '#6b7280';
  document.getElementById('apvConfirmOkBtn').textContent = '승인 취소';
  openApvModal();
}

function openApvModal() {
  var modal = document.getElementById('apvConfirmModal');
  modal.style.display = 'flex';
  if (window.lucide) lucide.createIcons();
}
function closeApvModal() {
  document.getElementById('apvConfirmModal').style.display = 'none';
  _apvAction = null; _apvMberSeq = null; _apvRowEl = null;
}

function executeApvAction() {
  closeApvModal();
  if (!_apvRowEl) return;
  if (_apvAction === 'approve') {
    _apvRowEl.remove();
    RSS.toast('승인 처리되었습니다.', 'success');
  } else if (_apvAction === 'reject') {
    _apvRowEl.remove();
    RSS.toast('반려 처리되었습니다.', 'info');
  } else if (_apvAction === 'cancel') {
    _apvRowEl.remove();
    RSS.toast('승인이 취소되었습니다.', 'info');
  }
}

document.getElementById('apvConfirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeApvModal();
});
</script>
</body>
</html>
