<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 로드세이프티시스템</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide 아이콘 CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- 공통 커스텀 CSS -->
  <link rel="stylesheet" href="rss-common.css" />

  <style>
    /* ── 로그인 페이지 전체 ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      background: #f0ede6; /* 전체 크림/베이지 배경 — 앰버 메인 컬러를 은은하게 표현 */
    }

    /* ── 왼쪽 비주얼 패널 — 비율 1 (flex: 2) ── */
    .login-visual {
      display: none; /* 모바일 기본 숨김 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 2;          /* 왼쪽 비율 2 */
      position: relative;
      overflow: hidden;
      background: #f0ede6;
    }
    @media (min-width: 1024px) {
      .login-visual { display: flex; }
    }

    /* ── 왼쪽 패널 내부 콘텐츠 ── */
    .login-visual__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      text-align: center;
    }

    /* ── 로고 원형 카드 + 아이콘 배지 래퍼 ── */
    .login-logo-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 40px;
    }

    /* 흰색 원형 카드 (로고 담는 원) */
    .login-logo-circle {
      position: absolute;
      inset: 20px; /* 배지 공간 확보 */
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 원형 카드 안의 로고 이미지 */
    .login-logo-circle img {
      width: 80%;
      height: auto;
      object-fit: contain;
    }

    /* 아이콘 배지 공통 스타일 */
    .login-icon-badge {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #F59E0B;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(245,158,11,0.35);
    }
    .login-icon-badge svg {
      width: 18px;
      height: 18px;
      color: #ffffff;
      stroke: #ffffff;
    }

    /* 배지 위치 — 오른쪽 상단 */
    .login-icon-badge--top-right {
      top: 4px;
      right: 4px;
    }
    /* 배지 위치 — 왼쪽 하단 */
    .login-icon-badge--bottom-left {
      bottom: 4px;
      left: 4px;
    }

    /* 헤드라인 */
    .login-visual__headline {
      font-size: 30px;
      font-weight: 800;
      color: #1a1c23;
      line-height: 1.35;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    /* 설명 문구 */
    .login-visual__desc {
      font-size: 15px;
      color: #7c7c7c;
      line-height: 1.9;
    }

    /* 저작권 */
    .login-visual__footer {
      font-size: 13px;
      color: #b8b2a8;
      position: absolute;
      bottom: 28px;
    }

    /* ── 오른쪽 폼 패널 — 비율 1.5 (flex: 3) ── */
    .login-form-panel {
      flex: 3;          /* 오른쪽 비율 3 → 왼쪽 2 : 오른쪽 3 = 1 : 1.5 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 48px;
      background: #f5f2eb; /* 오른쪽도 크림 계열 */
    }
    @media (max-width: 640px) {
      .login-form-panel { padding: 24px 20px; }
    }

    /* ── 로그인 카드 ── */
    .login-card {
      width: 100%;
      max-width: 420px;  /* 오른쪽 패널이 넓어졌으므로 카드도 확장 */
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    /* 카드 상단 앰버 라인 */
    .login-card__top-line {
      height: 4px;
      background: linear-gradient(90deg, #F59E0B 0%, #fbbf24 100%);
    }

    /* 카드 내부 패딩 */
    .login-card__body {
      padding: 28px 28px 24px;
    }

    /* 카드 타이틀 */
    .login-card__title {
      font-size: 22px;
      font-weight: 800;
      color: #1a1c23;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .login-card__subtitle {
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 20px;
    }

    /* 아이디/비밀번호 입력 + 로그인 버튼 가로 배치 래퍼 */
    .login-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* 입력 필드 (아이콘 포함) */
    .login-input-wrap {
      position: relative;
    }
    .login-input-wrap .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      width: 15px;
      height: 15px;
    }
    .login-input-field {
      width: 100%;
      padding: 11px 13px 11px 36px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      color: #1a1c23;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-input-field:focus {
      border-color: #F59E0B;
      background: #fff;
    }
    .login-input-field::placeholder { color: #c4c9d4; }

    /* 비밀번호 토글 버튼 */
    .pw-toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 2px;
      display: flex;
      align-items: center;
    }
    .pw-toggle-btn:hover { color: #6b7280; }

    /* 로그인 버튼 (앰버) */
    .login-submit-btn {
      width: 100%;
      padding: 13px;
      background: #F59E0B;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .login-submit-btn:hover { background: #d97706; }

    /* 자동로그인 + 찾기 링크 행 */
    .login-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      margin-bottom: 16px;
    }
    .login-meta-row label {
      font-size: 14px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .login-meta-row .find-links {
      display: flex;
      gap: 10px;
    }
    .login-meta-row .find-links a {
      font-size: 13px;
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.15s;
    }
    .login-meta-row .find-links a:hover { color: #6b7280; }

    /* 구분선 or */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 14px;
      font-size: 13px;
      color: #c4c9d4;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* 회원가입 버튼 */
    .login-signup-btn {
      width: 100%;
      padding: 12px;
      background: #ffffff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
    }
    .login-signup-btn:hover { border-color: #F59E0B; color: #1a1c23; }

    /* 안내 박스 */
    .login-notice-box {
      margin-top: 12px;
      padding: 11px 15px;
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.18);
      border-radius: 8px;
      font-size: 13px;
      color: #7c7c7c;
      text-align: center;
      line-height: 1.6;
    }
    .login-notice-box strong { color: #374151; }

    /* 테스트 빠른 로그인 */
    .login-test-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f0ede6;
    }
    .login-test-label {
      font-size: 13px;
      color: #b8b2a8;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }
    .login-test-btns {
      display: flex;
      gap: 6px;
    }
    .login-test-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .login-test-btn:hover { border-color: #F59E0B; color: #1a1c23; }

    /* 모바일 전용 로고 */
    .login-mobile-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .login-mobile-logo img { height: 56px; width: auto; }
    @media (min-width: 1024px) { .login-mobile-logo { display: none; } }
  </style>
</head>
<body>

<div class="login-page">

  <!-- ══════════════════════════════════════════════════════
       왼쪽 비주얼 패널 (PC 1024px 이상에서만 표시)
       크림 배경 + 로고 원형 카드 + 서비스 아이콘 배지
  ══════════════════════════════════════════════════════ -->
  <aside class="login-visual" aria-hidden="true">

    <div class="login-visual__content">

      <!-- 로고 원형 카드 + 아이콘 배지 -->
      <div class="login-logo-wrap">

        <!-- 흰색 원형 카드 안의 RSS 로고 -->
        <!-- [이미지 경로] 서버 배포 시 /assets/images/logo-rss.png 등으로 변경 -->
        <div class="login-logo-circle">
          <img src="logo-rss.png" alt="(주)로드세이프티시스템 로고" />
        </div>

        <!-- 아이콘 배지 — 오른쪽 상단: 공사 헬멧 (안전 상징) -->
        <div class="login-icon-badge login-icon-badge--top-right">
          <i data-lucide="hard-hat"></i>
        </div>

        <!-- 아이콘 배지 — 왼쪽 하단: 스마트폰 (모바일 관리 상징) -->
        <div class="login-icon-badge login-icon-badge--bottom-left">
          <i data-lucide="smartphone"></i>
        </div>

      </div>

      <!-- 헤드라인 -->
      <h2 class="login-visual__headline">안전한 도로의 시작</h2>

      <!-- 설명 문구 -->
      <p class="login-visual__desc">
        로드세이프티시스템은<br>
        신속하고 안전한 공사 현장을 위해<br>
        최적의 파트너를 연결합니다.
      </p>

      <!-- 저작권 -->
      <p class="login-visual__footer">© 2026 (주)로드세이프티시스템. All rights reserved.</p>
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════════
       오른쪽 폼 패널
  ══════════════════════════════════════════════════════ -->
  <main class="login-form-panel">

    <!-- 모바일 전용 로고 -->
    <!-- [이미지 경로] 서버 배포 시 /assets/images/logo-rss.png 등으로 변경 -->
    <div class="login-mobile-logo">
      <img src="logo-rss.png" alt="(주)로드세이프티시스템 로고" />
    </div>

    <!-- ── 로그인 카드 ── -->
    <div class="login-card">

      <!-- 상단 앰버 라인 -->
      <div class="login-card__top-line"></div>

      <div class="login-card__body">

        <!-- 카드 타이틀 -->
        <h1 class="login-card__title">기업 로그인</h1>
        <p class="login-card__subtitle">서비스 이용을 위해 로그인해주세요.</p>

        <!-- ── 에러 메시지 ── -->
        <!-- [Java] 로그인 실패 시 model.addAttribute("loginError", "...") 로 전달 -->
        <div id="loginErrorBar"
             class="hidden items-center gap-2 px-3 py-2.5 rounded-lg text-xs mb-3"
             style="background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.18); color:#dc2626;">
          <i data-lucide="alert-circle" style="width:14px;height:14px;flex-shrink:0;"></i>
          <span id="loginErrorMsg">아이디와 비밀번호를 입력해주세요.</span>
        </div>

        <!-- ── 로그인 폼 ── -->
        <!-- [Java] action="/api/auth/login" method="POST" 로 변경 -->
        <!-- [Java] th:action="@{/login}" (Thymeleaf 사용 시) -->
        <form id="loginForm" name="loginForm" novalidate>

          <div class="login-input-group">

            <!-- 아이디 입력 -->
            <!-- [DB] 컬럼: member.user_id (VARCHAR 50) -->
            <div class="login-input-wrap">
              <i data-lucide="user" class="input-icon"></i>
              <input
                type="text"
                id="user_id"
                name="user_id"
                class="login-input-field"
                placeholder="아이디"
                autocomplete="username"
                maxlength="50"
                value="block"
              />
            </div>

            <!-- 비밀번호 입력 -->
            <!-- [DB] 컬럼: member.user_pw (VARCHAR 255, BCrypt 해시) -->
            <div class="login-input-wrap">
              <i data-lucide="lock" class="input-icon"></i>
              <input
                type="password"
                id="user_pw"
                name="user_pw"
                class="login-input-field"
                placeholder="비밀번호"
                autocomplete="current-password"
                maxlength="100"
                style="padding-right:36px;"
                value="1234"
              />
              <!-- 비밀번호 표시/숨김 토글 -->
              <button type="button" id="pwToggleBtn" class="pw-toggle-btn" aria-label="비밀번호 표시/숨김">
                <i data-lucide="eye" id="pwToggleIcon" style="width:15px;height:15px;"></i>
              </button>
            </div>

            <!-- 로그인 버튼 -->
            <button type="submit" id="loginSubmitBtn" class="login-submit-btn">
              <i data-lucide="log-in" style="width:15px;height:15px;"></i>
              로그인
            </button>

          </div><!-- /login-input-group -->

          <!-- 자동로그인 + 찾기 링크 -->
          <div class="login-meta-row">
            <!-- [DB] 컬럼: member_session.auto_login (TINYINT 1) -->
            <label>
              <input type="checkbox" id="auto_login" name="auto_login" value="1"
                class="w-3.5 h-3.5 rounded accent-amber-500 cursor-pointer" />
              자동로그인
            </label>
            <div class="find-links">
              <a href="#" onclick="openFindModal('id'); return false;">아이디 찾기</a>
              <a href="#" onclick="openFindModal('pw'); return false;">비밀번호 찾기</a>
            </div>
          </div>

        </form>

        <!-- 구분선 -->
        <div class="login-divider">or</div>

        <!-- 신규 기업 회원가입 버튼 -->
        <a href="signup.html" class="login-signup-btn">
          <i data-lucide="building-2" style="width:15px;height:15px;"></i>
          신규 기업 회원가입
        </a>

        <!-- 안내 박스 -->
        <div class="login-notice-box">
          <i data-lucide="info" style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:3px;color:#F59E0B;"></i>
          사업자번호를 보유한 <strong>기업회원</strong>만 이용할 수 있습니다.
        </div>

        <!-- 테스트 빠른 로그인 (개발/데모용 — 실서비스 제거 필요) -->
        <div class="login-test-section">
          <p class="login-test-label">테스트 빠른 로그인</p>
          <div class="login-test-btns">
            <button class="login-test-btn" onclick="testLogin('block')">🚧 차단기업</button>
            <button class="login-test-btn" onclick="testLogin('order')">🏗️ 발주기업</button>
            <button class="login-test-btn" onclick="testLogin('worker')">👷 차단직원</button>
          </div>
        </div>

      </div><!-- /login-card__body -->
    </div><!-- /login-card -->

    <!-- 하단 링크 -->
    <div class="flex justify-center gap-4 mt-5">
      <a href="terms.html" class="text-xs" style="color:#b8b2a8;">이용약관</a>
      <a href="privacy.html" class="text-xs" style="color:#b8b2a8;">개인정보처리방침</a>
    </div>

  </main>

</div><!-- /login-page -->


<!-- ══════════════════════════════════════════════════════
     아이디/비밀번호 찾기 모달
     [Java] 실제 구현 시 /api/auth/find-account API 연동
══════════════════════════════════════════════════════ -->
<div id="findModal"
     style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.35); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:20px;">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
    <!-- 모달 헤더 -->
    <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid #f0ede6;">
      <h2 class="text-sm font-bold text-gray-900" id="findModalTitle">계정 찾기</h2>
      <button class="w-7 h-7 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors" onclick="closeFindModal()">
        <i data-lucide="x" style="width:13px;height:13px;color:#6b7280;"></i>
      </button>
    </div>
    <!-- 모달 바디 -->
    <div class="p-5">
      <p class="text-xs text-gray-500 mb-4 leading-relaxed">가입 시 등록한 정보를 입력하여 계정을 찾으세요.</p>
      <!-- [DB] 컬럼: company.company_name (VARCHAR 100) -->
      <div class="rss-form-group">
        <label class="rss-label" for="find_company_name">회사명 <span style="color:#F59E0B;">*</span></label>
        <input type="text" id="find_company_name" name="find_company_name"
          class="rss-input" placeholder="회사명을 입력하세요" maxlength="100" />
      </div>
      <!-- [DB] 컬럼: member.phone (VARCHAR 20) -->
      <div class="rss-form-group">
        <label class="rss-label" for="find_phone">담당자 연락처 <span style="color:#F59E0B;">*</span></label>
        <input type="tel" id="find_phone" name="find_phone"
          class="rss-input" placeholder="010-0000-0000" maxlength="20" />
      </div>
      <button type="button" onclick="closeFindModal()"
        class="rss-btn rss-btn--amber rss-btn--full">확인</button>
    </div>
  </div>
</div>


<script>
  /* ── 비밀번호 표시/숨김 ── */
  document.getElementById('pwToggleBtn').addEventListener('click', function() {
    const input = document.getElementById('user_pw');
    const icon  = document.getElementById('pwToggleIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.setAttribute('data-lucide', 'eye-off');
    } else {
      input.type = 'password';
      icon.setAttribute('data-lucide', 'eye');
    }
    lucide.createIcons();
  });

  /* ── 로그인 폼 유효성 검사 ── */
  /* [Java] 실제 서버 로그인 처리 시 form action/method 변경 후 이 JS 제거 가능 */
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const id  = document.getElementById('user_id').value.trim();
    const pw  = document.getElementById('user_pw').value.trim();
    const bar = document.getElementById('loginErrorBar');
    const msg = document.getElementById('loginErrorMsg');

    if (!id || !pw) {
      msg.textContent = '아이디와 비밀번호를 입력해주세요.';
      bar.classList.remove('hidden');
      bar.classList.add('flex');
      return;
    }
    bar.classList.add('hidden');
    bar.classList.remove('flex');

    /* [Java] 서버 로그인 처리 후 리다이렉트 — 아래 라인 제거 */
    location.href = 'index.html';
  });

  /* ── 테스트 로그인 (데모용) ── */
  function testLogin(type) {
    document.getElementById('user_id').value = type;
    document.getElementById('user_pw').value = '1234';
    location.href = 'index.html';
  }

  /* ── 찾기 모달 ── */
  function openFindModal(type) {
    const m = document.getElementById('findModal');
    const t = document.getElementById('findModalTitle');
    t.textContent = type === 'id' ? '아이디 찾기' : '비밀번호 찾기';
    m.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeFindModal() {
    document.getElementById('findModal').style.display = 'none';
    document.body.style.overflow = '';
  }
  document.getElementById('findModal').addEventListener('click', function(e) {
    if (e.target === this) closeFindModal();
  });

  /* ── Lucide 아이콘 초기화 ── */
  lucide.createIcons();
</script>

</body>
</html>
