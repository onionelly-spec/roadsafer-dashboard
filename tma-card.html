<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMA 카드 관리 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
  <style>
    /* ── TMA 카드 그리드 ── */
    .tma-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 20px 24px;
    }
    @media (max-width: 1200px) { .tma-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px)  { .tma-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .tma-grid { grid-template-columns: 1fr; } }

    /* ── TMA 카드 ── */
    .tma-card {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .tma-card:hover { border-color: var(--rss-amber); box-shadow: 0 4px 14px rgba(245,158,11,0.12); }

    /* 카드 상단 — 차량번호 헤더 */
    .tma-card__head {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #f3f4f6;
    }
    /* [용어사전 §14-3] tmaCarNo: TMA 차량번호 */
    .tma-card__car-no {
      font-size: var(--rss-font-md);
      font-weight: 700;
      color: #1a1c23;
    }

    /* 카드 본문 */
    .tma-card__body {
      padding: 12px 16px 14px;
    }
    .tma-card__row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 6px;
      font-size: var(--rss-font-sm);
    }
    .tma-card__row:last-child { margin-bottom: 0; }
    .tma-card__label {
      color: #9ca3af;
      font-weight: 600;
      min-width: 56px;
      flex-shrink: 0;
    }
    .tma-card__value { color: #374151; line-height: 1.5; }

    /* 카드 하단 — 액션 버튼 */
    .tma-card__foot {
      padding: 10px 16px;
      border-top: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    /* ── 등록/수정 모달 ── */
    .rss-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .rss-modal-overlay.hidden { display: none; }
    .rss-modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .rss-modal__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid #f3f4f6;
    }
    .rss-modal__title { font-size: var(--rss-font-md); font-weight: 700; color: #1a1c23; }
    .rss-modal__close {
      background: none; border: none;
      color: #9ca3af; cursor: pointer; padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .rss-modal__close:hover { background: #f3f4f6; color: #374151; }
    .rss-modal__body { padding: 20px 22px; }
    .rss-modal__foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px 22px;
      border-top: 1px solid #f3f4f6;
    }
    .rss-form-row { margin-bottom: 14px; }
    .rss-form-label {
      display: block;
      font-size: var(--rss-font-sm);
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }
    .rss-form-label .required { color: #dc2626; margin-left: 2px; }
    .rss-form-input {
      width: 100%;
      padding: 9px 12px;
      font-size: var(--rss-font-base);
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      color: #374151;
      background: #fff;
      transition: border-color 0.15s;
    }
    .rss-form-input:focus { outline: none; border-color: var(--rss-amber); }

    /* 파일 업로드 영역 */
    .tma-file-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tma-file-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 12px;
      font-size: var(--rss-font-sm);
      font-weight: 600;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      color: #374151;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .tma-file-btn:hover { border-color: var(--rss-amber); background: #fffbeb; }
    .tma-file-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      font-size: var(--rss-font-xs);
      background: #f3f4f6;
      border-radius: 4px;
      color: #374151;
    }
    .tma-file-item__remove {
      background: none; border: none;
      color: #9ca3af; cursor: pointer; padding: 0;
      display: flex; align-items: center;
    }
    .tma-file-item__remove:hover { color: #dc2626; }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .tma-grid { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<div class="rss-app">

  <div id="rss-sidebar-wrap"></div>

  <div class="rss-main" id="rssMain">

    <div id="rss-header-wrap" data-title="TMA 카드 관리" data-icon="credit-card"></div>

    <main class="rss-content">

      <div class="rss-card" style="padding:0;">

        <!-- ── 툴바 ──────────────────────────────────────────
             [Java] 로그인 사용자 소유 TMA 카드만 조회
             [DB] 테이블: tma_card WHERE mber_seq = #{loginUsr.mberSeq}
        ─────────────────────────────────────────────────── -->
        <div class="rss-board-toolbar">
          <div class="rss-board-toolbar__left">
            <!-- [용어사전 §14-3] tmaType: TMA 종류 필터 -->
            <!-- [DB] 컬럼: tma_card.tma_type ('TMA1'|'TMA3'|'PLCS') -->
            <select name="tmaType" id="tmaTypeFilter" class="rss-select">
              <option value="">전체 유형</option>
              <option value="TMA1">TMA-1</option>
              <option value="TMA3">TMA-3</option>
              <option value="PLCS">PLCS</option>
            </select>
            <!-- [용어사전 §7] searchKeyword: 검색어 -->
            <div class="rss-search-wrap">
              <input type="text" name="searchKeyword" id="tmaSearchKeyword" placeholder="차량번호 검색" />
              <button type="button" aria-label="검색">
                <i data-lucide="search" style="width:15px;height:15px;"></i>
              </button>
            </div>
          </div>
          <div class="rss-board-toolbar__right">
            <!-- TMA 카드 등록 버튼 -->
            <button type="button" class="rss-btn rss-btn--amber" onclick="openTmaModal('register')">
              <i data-lucide="plus" style="width:14px;height:14px;"></i>
              TMA 카드 등록
            </button>
          </div>
        </div>

        <!-- ── TMA 카드 그리드 ──────────────────────────────
             [Java] th:each="card : ${tmaCardList}"
        ─────────────────────────────────────────────────── -->
        <div class="tma-grid">

          <!-- 카드 1 -->
          <!-- [Java] th:each="card : ${tmaCardList}" -->
          <div class="tma-card" data-tma-seq="1">
            <div class="tma-card__head">
              <!-- [용어사전 §14-3] tmaCarNo: TMA 차량번호 -->
              <!-- [Java] th:text="${card.tmaCarNo}" -->
              <!-- [DB] 컬럼: tma_card.tma_car_no -->
              <span class="tma-card__car-no">12가 3456</span>
            </div>
            <div class="tma-card__body">
              <div class="tma-card__row">
                <!-- [용어사전 §14-3] tmaType: TMA 종류 -->
                <span class="tma-card__label">종류</span>
                <!-- [Java] th:text="${card.tmaTypeLabel}" -->
                <!-- [DB] 컬럼: tma_card.tma_type -->
                <span class="tma-card__value">TMA-1</span>
              </div>
              <div class="tma-card__row">
                <!-- [용어사전 §14-3] tmaCarNo: TMA 차량번호 -->
                <span class="tma-card__label">차량번호</span>
                <!-- [Java] th:text="${card.tmaCarNo}" -->
                <span class="tma-card__value">12가 3456</span>
              </div>
              <div class="tma-card__row">
                <!-- [용어사전 §14-3] tmaOwner: TMA 소유주 -->
                <span class="tma-card__label">소유주</span>
                <!-- [Java] th:text="${card.tmaOwner}" -->
                <!-- [DB] 컬럼: tma_card.tma_owner -->
                <span class="tma-card__value">나잘난</span>
              </div>
              <div class="tma-card__row">
                <!-- [용어사전 §14-3] tmaFile / tmaFileNm: TMA 파일 / 파일명 -->
                <span class="tma-card__label">파일</span>
                <!-- [Java] th:if="${card.tmaFileNm != null}" -->
                <!-- [DB] 컬럼: tma_card.tma_file_nm, tma_card.tma_file_path -->
                <a href="assets/dummy/11가1111.pdf"
                   download="11가1111.pdf"
                   class="rss-link tma-card__value">
                  11가1111.pdf
                </a>
                <!-- [Java] th:unless="${card.tmaFileNm != null}" -->
                <!-- <span class="tma-card__value" style="color:#9ca3af;">-</span> -->
              </div>
            </div>
            <div class="tma-card__foot">
              <!-- [Java] th:data-id="${card.tmaCardSeq}" -->
              <button type="button" class="rss-btn rss-btn--outline rss-btn--sm"
                      onclick="openTmaModal('edit', this)" data-id="1">
                <i data-lucide="pencil" style="width:12px;height:12px;"></i>수정
              </button>
              <button type="button" class="rss-btn rss-btn--outline-danger rss-btn--sm"
                      onclick="deleteTmaCard(1)">
                <i data-lucide="trash-2" style="width:12px;height:12px;"></i>삭제
              </button>
            </div>
          </div>

          <!-- 카드 2 -->
          <div class="tma-card" data-tma-seq="2">
            <div class="tma-card__head">
              <!-- [Java] th:text="${card.tmaCarNo}" -->
              <span class="tma-card__car-no">34나 5678</span>
            </div>
            <div class="tma-card__body">
              <div class="tma-card__row">
                <span class="tma-card__label">종류</span>
                <span class="tma-card__value">TMA-3</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">차량번호</span>
                <span class="tma-card__value">34나 5678</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">소유주</span>
                <span class="tma-card__value">한국도로차단(주)</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">파일</span>
                <!-- 파일 없는 경우 더미 -->
                <span class="tma-card__value" style="color:#9ca3af;">-</span>
              </div>
            </div>
            <div class="tma-card__foot">
              <button type="button" class="rss-btn rss-btn--outline rss-btn--sm"
                      onclick="openTmaModal('edit', this)" data-id="2">
                <i data-lucide="pencil" style="width:12px;height:12px;"></i>수정
              </button>
              <button type="button" class="rss-btn rss-btn--outline-danger rss-btn--sm"
                      onclick="deleteTmaCard(2)">
                <i data-lucide="trash-2" style="width:12px;height:12px;"></i>삭제
              </button>
            </div>
          </div>

          <!-- 카드 3 -->
          <div class="tma-card" data-tma-seq="3">
            <div class="tma-card__head">
              <!-- [Java] th:text="${card.tmaCarNo}" -->
              <span class="tma-card__car-no">56다 7890</span>
            </div>
            <div class="tma-card__body">
              <div class="tma-card__row">
                <span class="tma-card__label">종류</span>
                <span class="tma-card__value">PLCS</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">차량번호</span>
                <span class="tma-card__value">56다 7890</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">소유주</span>
                <span class="tma-card__value">나잘난</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">파일</span>
                <a href="assets/dummy/차량등록증.pdf"
                   download="차량등록증.pdf"
                   class="rss-link tma-card__value">
                  차량등록증.pdf
                </a>
              </div>
            </div>
            <div class="tma-card__foot">
              <button type="button" class="rss-btn rss-btn--outline rss-btn--sm"
                      onclick="openTmaModal('edit', this)" data-id="3">
                <i data-lucide="pencil" style="width:12px;height:12px;"></i>수정
              </button>
              <button type="button" class="rss-btn rss-btn--outline-danger rss-btn--sm"
                      onclick="deleteTmaCard(3)">
                <i data-lucide="trash-2" style="width:12px;height:12px;"></i>삭제
              </button>
            </div>
          </div>

          <!-- 카드 4 (파일 있는 추가 더미) -->
          <div class="tma-card" data-tma-seq="4">
            <div class="tma-card__head">
              <span class="tma-card__car-no">78라 1234</span>
            </div>
            <div class="tma-card__body">
              <div class="tma-card__row">
                <span class="tma-card__label">종류</span>
                <span class="tma-card__value">TMA-1</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">차량번호</span>
                <span class="tma-card__value">78라 1234</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">소유주</span>
                <span class="tma-card__value">정호석</span>
              </div>
              <div class="tma-card__row">
                <span class="tma-card__label">파일</span>
                <a href="assets/dummy/차량등록증2.pdf"
                   download="차량등록증2.pdf"
                   class="rss-link tma-card__value">
                  차량등록증2.pdf
                </a>
              </div>
            </div>
            <div class="tma-card__foot">
              <button type="button" class="rss-btn rss-btn--outline rss-btn--sm"
                      onclick="openTmaModal('edit', this)" data-id="4">
                <i data-lucide="pencil" style="width:12px;height:12px;"></i>수정
              </button>
              <button type="button" class="rss-btn rss-btn--outline-danger rss-btn--sm"
                      onclick="deleteTmaCard(4)">
                <i data-lucide="trash-2" style="width:12px;height:12px;"></i>삭제
              </button>
            </div>
          </div>

        </div><!-- /tma-grid -->

      </div><!-- /rss-card -->

    <div id="rss-footer-wrap"></div>
    </main>
  </div><!-- /rss-main -->

</div><!-- /rss-app -->

<!-- ══════════════════════════════════════════════════════════
     TMA 카드 등록/수정 모달
     [Java] POST /tma-card/reg (등록)
     [Java] PUT  /tma-card/mod/{tmaCardSeq} (수정)
     [용어사전 §9] reg = 등록, mod = 수정
══════════════════════════════════════════════════════════ -->
<div id="tmaModal" class="rss-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="tmaModalTitle">
  <div class="rss-modal">
    <div class="rss-modal__head">
      <h2 class="rss-modal__title" id="tmaModalTitle">TMA 카드 등록</h2>
      <button class="rss-modal__close" onclick="closeTmaModal()" aria-label="닫기">
        <i data-lucide="x" style="width:18px;height:18px;"></i>
      </button>
    </div>
    <div class="rss-modal__body">
      <form id="tmaForm" enctype="multipart/form-data">
        <!-- [Java] th:action="@{/tma-card/reg}" method="post" -->
        <!-- [DB] tma_card.tma_card_seq -->
        <input type="hidden" name="tmaCardSeq" id="tmaCardSeq" />

        <!-- [용어사전 §14-3] tmaType: TMA 종류 -->
        <div class="rss-form-row">
          <label class="rss-form-label" for="tmaType">
            종류<span class="required">*</span>
          </label>
          <!-- [DB] 컬럼: tma_card.tma_type -->
          <select name="tmaType" id="tmaType" class="rss-form-input">
            <option value="">선택하세요</option>
            <option value="TMA1">TMA-1</option>
            <option value="TMA3">TMA-3</option>
            <option value="PLCS">PLCS</option>
          </select>
        </div>

        <!-- [용어사전 §14-3] tmaCarNo: TMA 차량번호 -->
        <div class="rss-form-row">
          <label class="rss-form-label" for="tmaCarNo">
            차량번호<span class="required">*</span>
          </label>
          <!-- [DB] 컬럼: tma_card.tma_car_no -->
          <input type="text" name="tmaCarNo" id="tmaCarNo" class="rss-form-input" placeholder="예) 12가 3456" />
        </div>

        <!-- [용어사전 §14-3] tmaOwner: TMA 소유주 -->
        <div class="rss-form-row">
          <label class="rss-form-label" for="tmaOwner">소유주</label>
          <!-- [DB] 컬럼: tma_card.tma_owner -->
          <input type="text" name="tmaOwner" id="tmaOwner" class="rss-form-input" placeholder="소유주 이름 입력" />
        </div>

        <!-- [용어사전 §14-3] tmaFile / tmaFileNm: TMA 파일 / 파일명 -->
        <div class="rss-form-row">
          <label class="rss-form-label" for="tmaFile">파일</label>
          <!-- [DB] 컬럼: tma_card.tma_file_nm, tma_card.tma_file_path -->
          <input type="file" name="tmaFile" id="tmaFile" style="display:none;"
                 accept=".pdf,.jpg,.jpeg,.png"
                 onchange="handleTmaFileSelect(this)" />
          <div class="tma-file-wrap" id="tmaFileWrap">
            <label for="tmaFile" class="tma-file-btn">
              <i data-lucide="paperclip" style="width:13px;height:13px;"></i>
              파일 선택
            </label>
            <span id="tmaFileName" class="tma-card__value" style="color:#9ca3af; font-size:var(--rss-font-sm);">선택된 파일 없음</span>
          </div>
        </div>

      </form>
    </div>
    <div class="rss-modal__foot">
      <button type="button" class="rss-btn rss-btn--outline" onclick="closeTmaModal()">취소</button>
      <button type="button" class="rss-btn rss-btn--amber" onclick="submitTmaForm()">
        <i data-lucide="save" style="width:14px;height:14px;"></i>저장
      </button>
    </div>
  </div>
</div>

<script src="rss-common.js?v=ae2cc2c"></script>
<script>
  lucide.createIcons();

  /* ── 파일 선택 처리 ── */
  function handleTmaFileSelect(input) {
    var fileNameEl = document.getElementById('tmaFileName');
    if (input.files && input.files[0]) {
      fileNameEl.textContent = input.files[0].name;
      fileNameEl.style.color = '#374151';
    } else {
      fileNameEl.textContent = '선택된 파일 없음';
      fileNameEl.style.color = '#9ca3af';
    }
    lucide.createIcons();
  }

  /* ── 모달 열기 ── */
  function openTmaModal(mode, btn) {
    var modal = document.getElementById('tmaModal');
    var title = document.getElementById('tmaModalTitle');
    // 폼 초기화
    document.getElementById('tmaForm').reset();
    document.getElementById('tmaCardSeq').value = '';
    document.getElementById('tmaFileName').textContent = '선택된 파일 없음';
    document.getElementById('tmaFileName').style.color = '#9ca3af';

    if (mode === 'edit' && btn) {
      title.textContent = 'TMA 카드 수정';
      /* [Java] 실제 환경에서는 서버에서 해당 카드 데이터를 fetch하여 폼에 바인딩:
         fetch('/tma-card/detail/' + btn.dataset.id).then(r => r.json()).then(data => {
           document.getElementById('tmaType').value = data.tmaType;
           document.getElementById('tmaCarNo').value = data.tmaCarNo;
           document.getElementById('tmaOwner').value = data.tmaOwner;
           if (data.tmaFileNm) {
             document.getElementById('tmaFileName').textContent = data.tmaFileNm;
             document.getElementById('tmaFileName').style.color = '#374151';
           }
         }) */
      document.getElementById('tmaCardSeq').value = btn.dataset.id;
    } else {
      title.textContent = 'TMA 카드 등록';
    }
    modal.classList.remove('hidden');
    lucide.createIcons();
  }

  /* ── 모달 닫기 ── */
  function closeTmaModal() {
    document.getElementById('tmaModal').classList.add('hidden');
  }

  /* ── 폼 제출 ──────────────────────────────────────────────
     [Java] POST /tma-card/reg or PUT /tma-card/mod/{tmaCardSeq}
     [용어사전 §9] reg = 등록, mod = 수정
  ─────────────────────────────────────────────────────────── */
  function submitTmaForm() {
    var tmaType  = document.getElementById('tmaType').value;
    var tmaCarNo = document.getElementById('tmaCarNo').value.trim();
    if (!tmaType)  { alert('종류를 선택해주세요.'); return; }
    if (!tmaCarNo) { alert('차량번호를 입력해주세요.'); return; }
    /* [Java] document.getElementById('tmaForm').submit(); */
    alert('저장되었습니다. (더미 동작)');
    closeTmaModal();
  }

  /* ── 삭제 ────────────────────────────────────────────────
     [Java] DELETE /tma-card/{tmaCardSeq}
     [용어사전 §9] delete = 삭제
  ─────────────────────────────────────────────────────────── */
  function deleteTmaCard(id) {
    if (confirm('해당 TMA 카드를 삭제하시겠습니까?')) {
      /* [Java] fetch('/tma-card/' + id, { method: 'DELETE' }) */
      alert('삭제되었습니다. (더미 동작)');
    }
  }

  /* 모달 외부 클릭 시 닫기 */
  document.getElementById('tmaModal').addEventListener('click', function(e) {
    if (e.target === this) closeTmaModal();
  });
</script>
</body>
</html>
