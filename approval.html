<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>승인 관리 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />

  <style>
    /* ── 승인관리 전용 스타일 ────────────────────────────── */

    /* 섹션 타이틀 */
    .apv-section-title {
      font-size: var(--rss-font-md);
      font-weight: 700;
      color: var(--rss-text);
      letter-spacing: 0.01em;
      padding: 20px 24px 14px;
      background: #f9fafb;
      border-bottom: 2px solid var(--rss-border);
    }

    /* 테이블 td 전용 스타일 */
    .apv-td-name {
      font-weight: 600;
      color: var(--rss-text);
      text-align: center;
    }
    .apv-td-tel {
      color: var(--rss-muted);
      letter-spacing: 0.02em;
      text-align: center;
    }
    .apv-td-action {
      text-align: center;
    }

    /* 빈 상태 */
    .apv-empty {
      padding: 32px 24px;
      text-align: center;
      color: var(--rss-muted);
      font-size: var(--rss-font-base);
    }

    /* 섹션 구분 */
    .apv-section-divider {
      height: 28px;
      background: var(--rss-bg);
      border-top: 1px solid var(--rss-border);
      border-bottom: 1px solid var(--rss-border);
    }

    /* ── 모바일 카드 (768px 이하에서만 표시) ── */
    .apv-mobile-list { display: none; }

    @media (max-width: 768px) {
      /* 테이블 숨김, 카드 표시 */
      .apv-desktop-table { display: none; }
      .apv-mobile-list   { display: block; }

      .apv-section-title { padding: 14px 16px 10px; font-size: var(--rss-font-base); }
    }

    /* 모바일 카드 아이템 */
    .apv-card-item {
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
    }
    .apv-card-item:last-child { border-bottom: none; }

    /* 카드 상단: 이름 + 버튼 */
    .apv-card-item__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .apv-card-item__name {
      font-size: var(--rss-font-base);
      font-weight: 600;
      color: var(--rss-text);
    }
    .apv-card-item__actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 카드 하단: 전화번호 */
    .apv-card-item__tel {
      font-size: var(--rss-font-sm);
      color: var(--rss-muted);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<div class="rss-app">

  <!-- 공통 사이드바 -->
  <div id="rss-sidebar-wrap"></div>

  <div class="rss-main" id="rssMain">

    <!-- 공통 헤더 -->
    <!-- [Java] user_type = 'BLOCK' (차단기업 대표) 인 경우에만 이 페이지 접근 허용 -->
    <div id="rss-header-wrap" data-title="승인 관리" data-icon="user-check"></div>

    <main class="rss-content">

      <!-- ══════════════════════════════════════════════════
           승인 관리 카드
      ══════════════════════════════════════════════════ -->
      <div class="rss-card" style="padding:0; overflow:hidden;">

        <!-- ① 승인 요청 섹션 ─────────────────────────────
             [DB] 테이블: tbl_mber
             [DB] 조건: mber_type = 'EMPLOYEE' AND approve_yn = 0
                        AND company_nm = #{loginUsr.companyNm}
             [DB] 정렬: ORDER BY reg_dtm DESC
             [Java] th:if="${!approveReqList.isEmpty()}"
        ──────────────────────────────────────────────── -->
        <p class="apv-section-title">승인 요청</p>

        <!-- PC 테이블 -->
        <div class="rss-table-wrap apv-desktop-table">
          <table class="rss-table" aria-label="승인 요청 목록">
            <colgroup>
              <col class="rss-col-nm" />
              <col class="rss-col-tel" />
              <col class="rss-col-mgmt" />
            </colgroup>
            <thead>
              <tr>
                <th>이름</th>
                <th>휴대폰 번호</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="approveReqList">
              <!-- [Java] th:each="mber : ${approveReqList}" -->

              <!-- 더미 데이터 1 -->
              <tr data-mber-seq="101">

                <!-- [Java] th:text="${mber.tel}" -->

                            onclick="rejectConfirm(this, '101', '도시진')"
                            data-mber-seq="101">반려</button>
                  </div>
                </td>
              </tr>

              <!-- 더미 데이터 2 -->
              <tr data-mber-seq="102">
                <td class="apv-td-name">김소리</td>
                <td class="apv-td-tel">010-8888-4111</td>
                <td class="apv-td-action">
                  <div style="display:inline-flex;align-items:center;gap:8px;">
                    <button class="rss-btn rss-btn--amber rss-btn--sm"
                            onclick="approveConfirm(this, '102', '김소리')"
                            data-mber-seq="102">승인</button>
                    <button class="rss-btn rss-btn--outline rss-btn--sm"

                            data-mber-seq="102">반려</button>

              </tr>

              <!-- [Java] th:if="${approveReqList.isEmpty()}" -->
              <!--

                <td colspan="3" class="apv-empty">새로운 승인 요청이 없습니다.</td>
              </tr>

            </tbody>

        </div>

        <!-- 모바일 카드 목록 (승인 요청) -->

          <!-- [Java] th:each="mber : ${approveReqList}" -->

          <!-- 더미 데이터 1 -->

            <div class="apv-card-item__top">
              <!-- [Java] th:text="${mber.usrNm}" -->

            </div>
            <!-- [Java] th:text="${mber.tel}" -->
            <p class="apv-card-item__tel">010-2222-7777</p>
          </div>

          <!-- 더미 데이터 2 -->
          <div class="apv-card-item" data-mber-seq="102">
            <div class="apv-card-item__top">
              <span class="apv-card-item__name">김소리</span>
              <div class="apv-card-item__actions">
                <button class="rss-btn rss-btn--amber rss-btn--sm"
                        onclick="approveConfirmCard(this, '102', '김소리')"
                        data-mber-seq="102">승인</button>
                <button class="rss-btn rss-btn--outline rss-btn--sm"
                        onclick="rejectConfirmCard(this, '102', '김소리')"

              </div>

            <p class="apv-card-item__tel">010-8888-4111</p>
          </div>

        </div><!-- /apv-mobile-list 승인 요청 -->

        <!-- 섹션 구분 -->
        <div class="apv-section-divider"></div>

        <!-- ② 승인 완료 직원(부서) 섹션 ──────────────────
             [DB] 테이블: tbl_mber
             [DB] 조건: mber_type = 'EMPLOYEE' AND approve_yn = 1
                        AND company_nm = #{loginUsr.companyNm}
             [DB] 정렬: ORDER BY reg_dtm DESC
             [Java] th:if="${!approvedMberList.isEmpty()}"
        ──────────────────────────────────────────────── -->
        <p class="apv-section-title">승인 직원(부서)</p>

          <table class="rss-table" aria-label="승인 완료 직원 목록">
            <colgroup>
              <col class="rss-col-nm" />
              <col class="rss-col-tel" />
              <col class="rss-col-mgmt" />
            </colgroup>
            <thead>
              <tr>
                <th>이름</th>
                <th>휴대폰 번호</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="approvedMberList">
              <!-- [Java] th:each="mber : ${approvedMberList}" -->

              <!-- 더미 데이터 1 -->
              <tr data-mber-seq="201">
                <!-- [Java] th:text="${mber.usrNm}" -->
                <td class="apv-td-name">민윤기</td>
                <!-- [Java] th:text="${mber.tel}" -->
                <td class="apv-td-tel">010-2222-7777</td>
                <td class="apv-td-action">

                  <button class="rss-btn rss-btn--outline rss-btn--sm"

              <!-- 더미 데이터 2 -->

                <td class="apv-td-name">신성민</td>

                <td class="apv-td-action">
                  <button class="rss-btn rss-btn--outline rss-btn--sm"

              <!-- [Java] th:if="${approvedMberList.isEmpty()}" -->
              <!--
              <tr id="approvedMberEmpty">
                <td colspan="3" class="apv-empty">승인된 직원이 없습니다.</td>

        <!-- 모바일 카드 목록 (승인 직원) -->

          <!-- [Java] th:each="mber : ${approvedMberList}" -->

          <!-- 더미 데이터 1 -->
          <div class="apv-card-item" data-mber-seq="201">
            <div class="apv-card-item__top">
              <span class="apv-card-item__name">민윤기</span>

          <!-- 더미 데이터 2 -->
          <div class="apv-card-item" data-mber-seq="202">
            <div class="apv-card-item__top">
              <span class="apv-card-item__name">신성민</span>
              <div class="apv-card-item__actions">
                <button class="rss-btn rss-btn--outline rss-btn--sm"

<!-- ══════════════════════════════════════════════════
     확인 모달 (승인 / 반려 공용)
     [Java] 실제 환경에서는 form submit 또는 fetch API로 교체
══════════════════════════════════════════════════ -->
<div class="rss-modal-backdrop" id="apvConfirmModal" role="dialog" aria-modal="true"
     aria-labelledby="apvConfirmTitle" style="display:none;">
  <div class="rss-modal">
    <p class="rss-modal__title" id="apvConfirmTitle">승인 확인</p>
    <div class="rss-modal__body" id="apvConfirmMsg"></div>
    <div class="rss-modal__footer">
      <button class="rss-btn rss-btn--outline rss-btn--sm"
              onclick="closeApvModal()">취소</button>
      <button class="rss-btn rss-btn--amber rss-btn--sm" id="apvConfirmOkBtn"
              onclick="executeApvAction()">확인</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     승인 취소 전용 모달 (예/아니오 구조)
     [Java] 실제 환경에서는 fetch API로 교체
══════════════════════════════════════════════════ -->
<div class="rss-modal-backdrop" id="apvCancelModal" role="dialog" aria-modal="true"
     aria-labelledby="apvCancelTitle" style="display:none;">
  <div class="rss-modal">
    <p class="rss-modal__title" id="apvCancelTitle">승인 취소</p>
    <div class="rss-modal__body" id="apvCancelMsg"></div>
    <div class="rss-modal__footer">
      <!-- 아니오: 모달 닫기만 -->
      <button class="rss-btn rss-btn--outline rss-btn--sm"
              onclick="closeApvCancelModal()">아니오</button>
      <!-- 예: 승인 취소 처리 실행 -->
      <button class="rss-btn rss-btn--amber rss-btn--sm" id="apvCancelYesBtn"
              onclick="executeApvCancelAction()">예</button>
    </div>
  </div>
</div>


<script src="rss-common.js?v=55aa791"></script>
<script>
/* ══════════════════════════════════════════════════
   승인 관리 인터랙션
   [Java] 실제 환경에서는 fetch API 또는 form submit으로 서버 요청 처리
   [Java] 승인: POST /api/approval/approve  { mberSeq: ... }
   [Java] 반려: POST /api/approval/reject   { mberSeq: ... }
   [Java] 취소: POST /api/approval/cancel   { mberSeq: ... }
══════════════════════════════════════════════════ */

var _apvAction   = null;
var _apvMberSeq  = null;
var _apvRowEl    = null;  /* PC: <tr>, 모바일: <div.apv-card-item> */

/* ── 공용: 가장 가까운 행/카드 요소 찾기 ── */
function _getRowEl(btn) {
  return btn.closest('tr') || btn.closest('.apv-card-item');
}

/* ── 승인 / 반려 공용 모달 (PC 테이블) ── */
function approveConfirm(btn, mberSeq, usrNm) {
  _apvAction  = 'approve';
  _apvMberSeq = mberSeq;
  _apvRowEl   = _getRowEl(btn);
  document.getElementById('apvConfirmTitle').textContent = '승인 처리';
  document.getElementById('apvConfirmMsg').innerHTML =
    '<strong>' + usrNm + '</strong> 님을 승인 처리하시겠습니까?<br>승인 후 해당 계정은 정상 사용 가능 상태로 전환됩니다.';
  document.getElementById('apvConfirmOkBtn').className = 'rss-btn rss-btn--amber rss-btn--sm';
  document.getElementById('apvConfirmOkBtn').textContent = '승인';
  openApvModal();
}

function rejectConfirm(btn, mberSeq, usrNm) {
  _apvAction  = 'reject';
  _apvMberSeq = mberSeq;
  _apvRowEl   = _getRowEl(btn);
  document.getElementById('apvConfirmTitle').textContent = '반려 처리';
  document.getElementById('apvConfirmMsg').innerHTML =
    '<strong>' + usrNm + '</strong> 님을 반려 처리하시겠습니까?<br>반려하면 모든 가입 정보가 삭제됩니다.';
  document.getElementById('apvConfirmOkBtn').className = 'rss-btn rss-btn--outline-danger rss-btn--sm';
  document.getElementById('apvConfirmOkBtn').textContent = '반려';
  openApvModal();
}

/* ── 승인 / 반려 (모바일 카드) ── */
function approveConfirmCard(btn, mberSeq, usrNm) { approveConfirm(btn, mberSeq, usrNm); }
function rejectConfirmCard(btn, mberSeq, usrNm)  { rejectConfirm(btn, mberSeq, usrNm); }

function openApvModal() {
  var modal = document.getElementById('apvConfirmModal');
  modal.style.display = 'flex';
  if (window.lucide) lucide.createIcons();
}
function closeApvModal() {
  document.getElementById('apvConfirmModal').style.display = 'none';
  _apvAction = null; _apvMberSeq = null; _apvRowEl = null;
}

function executeApvAction() {
  var action = _apvAction;
  var rowEl  = _apvRowEl;
  closeApvModal();
  if (!rowEl) return;

  /* PC tr 제거 + 모바일 카드 동기 제거 */
  var seq = rowEl.dataset.mberSeq;
  document.querySelectorAll('[data-mber-seq="' + seq + '"]').forEach(function(el) {
    el.remove();
  });

  if (action === 'approve') {
    RSS.toast('승인 처리되었습니다.', 'success');
  } else if (action === 'reject') {
    RSS.toast('반려 처리되었습니다.', 'info');
  }
}

document.getElementById('apvConfirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeApvModal();
});

/* ── 승인 취소 전용 모달 (예/아니오) ── */
var _cancelMberSeq = null;
var _cancelRowEl   = null;

function cancelConfirm(btn, mberSeq, usrNm) {
  _cancelMberSeq = mberSeq;
  _cancelRowEl   = _getRowEl(btn);
  document.getElementById('apvCancelMsg').innerHTML =
    '승인 취소하면 로그인이 불가능하고 모든 개인 정보가 삭제됩니다.<br>그래도 <strong>' + usrNm + '</strong> 님의 승인을 취소하시겠습니까?';
  var modal = document.getElementById('apvCancelModal');
  modal.style.display = 'flex';
  if (window.lucide) lucide.createIcons();
}

/* 모바일 카드용 (동일 로직) */
function cancelConfirmCard(btn, mberSeq, usrNm) { cancelConfirm(btn, mberSeq, usrNm); }

function closeApvCancelModal() {
  document.getElementById('apvCancelModal').style.display = 'none';
  _cancelMberSeq = null; _cancelRowEl = null;
}

function executeApvCancelAction() {
  /* [Java] POST /api/approval/cancel { mberSeq: _cancelMberSeq } */
  var seq = _cancelMberSeq;
  closeApvCancelModal();

  /* PC tr + 모바일 카드 동기 제거 */
  document.querySelectorAll('[data-mber-seq="' + seq + '"]').forEach(function(el) {
    el.remove();
  });
  RSS.toast('승인이 취소되었습니다.', 'info');
}

document.getElementById('apvCancelModal').addEventListener('click', function(e) {
  if (e.target === this) closeApvCancelModal();
});
</script>
  <script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    // 기존 이미지에 onerror 등록
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
    });
    // 동적으로 추가되는 이미지 감지
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            if (node.tagName === 'IMG') {
              node.addEventListener('error', function() { applyPlaceholder(this); });
            }
            node.querySelectorAll && node.querySelectorAll('img').forEach(function(img) {
              img.addEventListener('error', function() { applyPlaceholder(this); });
            });
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
  </script>
</body>
