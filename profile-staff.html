<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정보변경 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css?v=profile-staff01" />
  <style>
    /* ══════════════════════════════════════════════════════
       profile-staff.html 전용 스타일
       ■ register-company.html / profile.html과 동일한 클래스 체계 사용
       ■ rss-common.css에 이미 정의된 클래스는 중복 정의 금지
       ■ §19-5 용어사전 참조
    ══════════════════════════════════════════════════════ */

    /* 폼 입력 — register-company.html의 .reg-input과 동일 계열 */
    .reg-input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--rss-border);
      border-radius: var(--rss-radius);
      font-size: var(--rss-font-base);
      color: var(--rss-text);
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      box-sizing: border-box;
    }
    .reg-input:focus { border-color: var(--rss-amber); background: #fff; }
    .reg-input::placeholder { color: #c4c9d4; }
    .reg-input[readonly] { background: #f9fafb; color: var(--rss-muted); cursor: default; }

    /* 분할 입력 — register-company.html의 .split-wrap과 동일 */
    .split-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .split-wrap .reg-input { flex: 1; min-width: 50px; }
    .split-sep { font-size: var(--rss-font-md); color: var(--rss-muted); flex-shrink: 0; }

    /* 라디오 수신 설정 — register-company.html의 .receive-radio-wrap과 동일 */
    .receive-radio-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: var(--rss-font-base);
      color: var(--rss-muted);
      flex-wrap: wrap;
    }
    .receive-radio-wrap label {
      display: flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .receive-radio-wrap input[type="radio"] { accent-color: var(--rss-amber); }

    /* 이메일 입력 — register-company.html의 .email-wrap과 동일 */
    .email-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .email-wrap .reg-input { flex: 1; min-width: 80px; }
    .email-at { font-size: var(--rss-font-md); color: var(--rss-muted); flex-shrink: 0; }
    .email-domain-select {
      padding: 9px 10px;
      border: 1.5px solid var(--rss-border);
      border-radius: var(--rss-radius);
      font-size: var(--rss-font-base);
      color: var(--rss-text);
      outline: none;
      cursor: pointer;
      font-family: inherit;
      min-width: 110px;
    }
    .email-domain-select:focus { border-color: var(--rss-amber); }

    /* 모바일 반응형 */
    @media (max-width: 640px) {
      .split-wrap .reg-input { min-width: 0; }
      /* 이메일 가로 1줄 유지 — register-company.html 기준 */
      .receive-radio-wrap { margin-top: 6px; }
      /* 하단 버튼 모바일 대응 — 세로 스택 */
      .profile-btn-row {
        flex-direction: column;
        align-items: stretch;
      }
      .profile-btn-row .profile-btn-spacer {
        display: none !important;
      }
      .profile-btn-row > button {
        width: 100%;
        justify-content: center;
      }
      .profile-btn-row .profile-btn-right {
        justify-content: center !important;
        width: 100%;
      }
      .profile-btn-row .profile-btn-right .rss-btn {
        flex: 1;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div class="rss-app">
  <div id="rss-sidebar-wrap"></div>
  <div class="rss-main" id="rssMain">
    <div id="rss-header-wrap" data-title="정보변경" data-icon="user-cog"></div>
    <main class="rss-content">
      <div class="rss-card">
        <div class="rss-card__body">
          <!-- ══════════════════════════════════════════════════
               직원용 정보변경 폼 (B9-1)
               [Java] th:if="${loginUser.mberType == 'EMPLOYEE'}"
               [Java] th:action="@{/profile/update}" method="post"
          ══════════════════════════════════════════════════ -->
          <form id="profileStaffForm" novalidate>
            <!-- [DB] tbl_mber.mber_seq -->
            <input type="hidden" name="mberSeq" id="mberSeq" value="2001" />

            <!-- ── 아이디 (읽기전용) ── -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="loginId">아이디</label>
              <!-- [DB] tbl_mber.login_id -->
              <input type="text" id="loginId" name="loginId"
                     class="reg-input" readonly value="sawon114" />
              <p class="rss-form-hint">아이디는 변경할 수 없습니다.</p>
            </div>

            <!-- ── 상호 (읽기전용) ── -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="companyNm">상호</label>
              <!-- [DB] tbl_company.company_nm (소속 기업) -->
              <input type="text" id="companyNm" name="companyNm"
                     class="reg-input" readonly value="잘한도로차단" />
              <p class="rss-form-hint">상호는 변경할 수 없습니다.</p>
            </div>

            <!-- ── 대표자명 (읽기전용) ── -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="ceoNm">대표자명</label>
              <!-- [DB] tbl_company.ceo_nm -->
              <input type="text" id="ceoNm" name="ceoNm"
                     class="reg-input" readonly value="나잘난" />
              <p class="rss-form-hint">대표자명은 변경할 수 없습니다.</p>
            </div>

            <!-- ── 사업자 번호 (읽기전용) ── -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="bizRegNo">사업자 번호</label>
              <!-- [DB] tbl_company.biz_reg_no -->
              <input type="text" id="bizRegNo" name="bizRegNo"
                     class="reg-input" readonly value="000-00-00000" />
              <p class="rss-form-hint">사업자번호는 변경할 수 없습니다.</p>
            </div>

            <!-- ── 이름(부서명) (수정 가능) ── -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="staffNm">
                이름(부서명) <span class="rss-required">*</span>
              </label>
              <!-- [DB] tbl_mber.staff_nm / tbl_mber.dept_nm -->
              <input type="text" id="staffNm" name="staffNm"
                     class="reg-input" value="도사진"
                     placeholder="이름 또는 부서명을 입력하세요" />
            </div>

            <!-- ── 휴대폰 번호 ── -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="staffTel1">
                휴대폰 번호 <span class="rss-required">*</span>
              </label>
              <!-- [DB] tbl_mber.tel → staffTel1 + staffTel2 + staffTel3 -->
              <div class="split-wrap">
                <input type="text" id="staffTel1" name="staffTel1"
                       class="reg-input" value="010"
                       maxlength="4" inputmode="numeric" aria-label="휴대폰 앞자리" />
                <span class="split-sep">-</span>
                <input type="text" id="staffTel2" name="staffTel2"
                       class="reg-input" value="0000"
                       maxlength="4" inputmode="numeric" aria-label="휴대폰 가운데" />
                <span class="split-sep">-</span>
                <input type="text" id="staffTel3" name="staffTel3"
                       class="reg-input" value="2222"
                       maxlength="4" inputmode="numeric" aria-label="휴대폰 끝자리" />
              </div>
              <!-- [DB] tbl_mber.sms_receive_yn -->
              <div class="receive-radio-wrap" style="margin-top:6px;">
                <span>* SMS 수신 :</span>
                <label>
                  <input type="radio" name="smsReceiveYn" value="Y" checked />
                  수신
                </label>
                <label>
                  <input type="radio" name="smsReceiveYn" value="N" />
                  거부
                </label>
              </div>
            </div>

            <!-- ── 이메일 주소 ── -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="emailId">
                이메일 주소 <span class="rss-required">*</span>
              </label>
              <!-- [DB] tbl_mber.email_id + tbl_mber.email_domain -->
              <div class="email-wrap">
                <input type="text" id="emailId" name="emailId"
                       class="reg-input" value="dosajin"
                       placeholder="이메일 아이디" aria-label="이메일 아이디" />
                <span class="email-at">@</span>
                <input type="text" id="emailDomain" name="emailDomain"
                       class="reg-input" value="gmail.com"
                       placeholder="도메인" aria-label="이메일 도메인" />
                <select id="emailDomainSelect" class="email-domain-select"
                        onchange="applyEmailDomain(this.value)"
                        aria-label="이메일 도메인 선택">
                  <option value="">선택</option>
                  <option value="naver.com">naver.com</option>
                  <option value="gmail.com">gmail.com</option>
                  <option value="daum.net">daum.net</option>
                  <option value="kakao.com">kakao.com</option>
                  <option value="hanmail.net">hanmail.net</option>
                  <option value="nate.com">nate.com</option>
                  <option value="direct">직접 입력</option>
                </select>
              </div>
              <!-- [Java] POST /profile/check-email { email, mberSeq } → { duplicate: true/false } -->
              <p id="emailDupMsg" class="rss-form-hint rss-form-hint--error" style="display:none;">이미 등록된 이메일입니다.</p>
              <!-- [DB] tbl_mber.email_receive_yn -->
              <div class="receive-radio-wrap" style="margin-top:6px;">
                <span>* 이메일 수신 :</span>
                <label>
                  <input type="radio" name="emailReceiveYn" value="Y" checked />
                  수신
                </label>
                <label>
                  <input type="radio" name="emailReceiveYn" value="N" />
                  거부
                </label>
              </div>
            </div>

          </form><!-- /profileStaffForm -->
        </div><!-- /rss-card__body -->
        <!-- ══════════════════════════════════════════════════
             하단 버튼 영역 (rss-card 안에 포함 — profile.html 기업주용과 동일 구조)
             - 저장 : 중앙 (rss-page-actions)
             - 비밀번호 변경 · 회원탈퇴 : 우측 (profile-btn-right)
        ══════════════════════════════════════════════════ -->
        <div class="rss-page-actions profile-btn-row"
             style="justify-content:space-between;">
          <!-- spacer — 저장 버튼을 중앙으로 밀기 위한 flex:1 영역 -->
          <div class="profile-btn-spacer" style="flex:1;"></div>

          <!-- 저장 버튼 (중앙) -->
          <button type="button" class="rss-btn rss-btn--amber"
                  onclick="submitStaffProfile()">
            <i data-lucide="save"></i> 저장
          </button>

          <!-- 우측 버튼 그룹 -->
          <div class="profile-btn-right" style="flex:1; display:flex; justify-content:flex-end; gap:8px;">
            <button type="button" class="rss-btn rss-btn--outline"
                    onclick="openPwModal()">
              <i data-lucide="lock"></i> 비밀번호 변경
            </button>
            <button type="button" class="rss-btn rss-btn--outline-danger"
                    onclick="openWithdrawModal()">
              <i data-lucide="user-x"></i> 회원탈퇴
            </button>
          </div>
        </div>
      </div><!-- /rss-card -->

    </main><!-- /rss-content -->

    <div id="rss-footer-wrap"></div>
  </div><!-- /rss-main -->
</div><!-- /rss-app -->

<div id="rss-profile-modals"></div>
<!-- 위 모달들은 rss-common.js의 injectProfileModals가 #rss-profile-modals에 자동 주입합니다 -->

<!-- 경고 모달 — 필수 항목 누락 -->
<div class="reg-alert-modal" id="modalValidAlert" role="alertdialog" aria-modal="true">
  <div class="reg-alert-modal__box">
    <p class="reg-alert-modal__title reg-alert-modal__title--warn">
      <i data-lucide="alert-circle"></i>
      <span id="modalValidMsg">모든 항목을 빠짐없이 입력하세요.</span>
    </p>
    <div class="reg-alert-modal__body" id="modalValidDetail"></div>
    <div class="reg-alert-modal__footer">
      <button type="button" class="rss-btn rss-btn--amber"
              onclick="closeValidAlert()">
        <i data-lucide="check"></i> 확인
      </button>
    </div>
  </div>
</div>

<!-- 저장 확인 모달 -->
<div class="reg-alert-modal" id="modalSaveConfirm" role="alertdialog" aria-modal="true">
  <div class="reg-alert-modal__box">
    <p class="reg-alert-modal__title reg-alert-modal__title--info">
      <i data-lucide="save"></i>
      <span>저장하시겠습니까?</span>
    </p>
    <div class="reg-alert-modal__body">
      입력하신 정보를 저장합니다.
    </div>
    <div class="reg-alert-modal__footer">
      <button type="button" class="rss-btn rss-btn--outline"
              onclick="closeSaveConfirm()">
        <i data-lucide="x"></i> 취소
      </button>
      <button type="button" class="rss-btn rss-btn--amber"
              onclick="doSaveProfile()">
        <i data-lucide="check"></i> 예
      </button>
    </div>
  </div>
</div>

<!-- 공통 컴포넌트 로드 -->
<script src="rss-common.js"></script>
<script>
  /* ══════════════════════════════════════════════════
     profile-staff.html 전용 JS
     §19-4 / §19-5 용어사전 참조
  ══════════════════════════════════════════════════ */

  /* ── 이메일 도메인 선택 ── */
  function applyEmailDomain(val) {
    var domainInput = document.getElementById('emailDomain');
    if (val === 'direct' || val === '') {
      domainInput.value = '';
      domainInput.readOnly = false;
      domainInput.focus();
    } else {
      domainInput.value = val;
      domainInput.readOnly = true;
    }
    resetEmailDup();
  }

  /* ── 이메일 중복 체크 ── */
  var _emailDuplicated = false;

  function resetEmailDup() {
    _emailDuplicated = false;
    var msg = document.getElementById('emailDupMsg');
    if (msg) msg.style.display = 'none';
    var ei = document.getElementById('emailId');
    var ed = document.getElementById('emailDomain');
    if (ei) ei.style.borderColor = '';
    if (ed) ed.style.borderColor = '';
  }

  function checkEmailDuplicate() {
    var emailId  = (document.getElementById('emailId')     || {}).value || '';
    var emailDom = (document.getElementById('emailDomain') || {}).value || '';
    if (!emailId.trim() || !emailDom.trim()) { resetEmailDup(); return; }
    var fullEmail = emailId.trim() + '@' + emailDom.trim();
    /* [Java] 실제 구현 시 fetch 주석 해제:
       fetch('/profile/check-email', {
         method: 'POST',
         headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify({ email: fullEmail, mberSeq: CURRENT_MBER_SEQ })
       }).then(r => r.json()).then(data => {
         if (data.duplicate) showEmailDupError(); else resetEmailDup();
       });
    */
    var DUMMY_DUPLICATES = ['test@naver.com', 'admin@gmail.com', 'road@daum.net'];
    if (DUMMY_DUPLICATES.indexOf(fullEmail.toLowerCase()) !== -1) showEmailDupError();
    else resetEmailDup();
  }

  function showEmailDupError() {
    _emailDuplicated = true;
    var msg = document.getElementById('emailDupMsg');
    if (msg) msg.style.display = 'block';
    var ei = document.getElementById('emailId');
    var ed = document.getElementById('emailDomain');
    if (ei) ei.style.borderColor = '#ef4444';
    if (ed) ed.style.borderColor = '#ef4444';
  }

  document.addEventListener('DOMContentLoaded', function() {
    var ei = document.getElementById('emailId');
    var ed = document.getElementById('emailDomain');
    if (ei) { ei.addEventListener('input', resetEmailDup); ei.addEventListener('blur', checkEmailDuplicate); }
    if (ed) { ed.addEventListener('input', resetEmailDup); ed.addEventListener('blur', checkEmailDuplicate); }
  });

  /* ── 저장 유효성 검사 ── */
  function submitStaffProfile() {
    var staffNm  = document.getElementById('staffNm').value.trim();
    var tel1     = document.getElementById('staffTel1').value.trim();
    var tel2     = document.getElementById('staffTel2').value.trim();
    var tel3     = document.getElementById('staffTel3').value.trim();
    var emailId  = document.getElementById('emailId').value.trim();
    var emailDom = document.getElementById('emailDomain').value.trim();

    var missing = [];
    if (!staffNm)  missing.push('이름(부서명)');
    if (!tel1 || !tel2 || !tel3) missing.push('휴대폰 번호');
    if (!emailId || !emailDom)   missing.push('이메일 주소');

    if (missing.length > 0) {
      /* [JS] 빠진 항목 경고 */
      document.getElementById('modalValidMsg').textContent = '모든 항목을 빠짐없이 입력하세요.';
      document.getElementById('modalValidDetail').textContent = missing.join(', ') + ' 항목을 확인해 주세요.';
      document.getElementById('modalValidAlert').classList.add('open');
      lucide.createIcons();
      return;
    }
    /* 이메일 중복 체크 */
    if (_emailDuplicated) {
      document.getElementById('modalValidMsg').textContent = '이메일 주소를 확인하세요.';
      document.getElementById('modalValidDetail').textContent = '이미 등록된 이메일입니다. 다른 이메일을 입력해 주세요.';
      document.getElementById('modalValidAlert').classList.add('open');
      lucide.createIcons();
      document.getElementById('emailId').focus();
      return;
    }
    /* 저장 확인 모달 표시 */
    document.getElementById('modalSaveConfirm').classList.add('open');
    lucide.createIcons();
  }

  function closeValidAlert() {
    document.getElementById('modalValidAlert').classList.remove('open');
  }

  function closeSaveConfirm() {
    document.getElementById('modalSaveConfirm').classList.remove('open');
  }

  function doSaveProfile() {
    /* [Java] POST /profile/update
     *   파라미터: mberSeq, staffNm, staffTel1~3, smsReceiveYn,
     *             emailId, emailDomain, emailReceiveYn
     *   성공 시: 페이지 새로고침
     */
    closeSaveConfirm();
    location.reload();
  }

  /* ── 비밀번호 변경 모달 ── */
  function openPwModal() {
    ['currentPw','newPw','newPwConfirm'].forEach(function(id){
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('pwMatchMsg').style.display = 'none';
    document.getElementById('pwModal').classList.add('show');
    lucide.createIcons();
  }
  function closePwModal() {
    document.getElementById('pwModal').classList.remove('show');
    document.getElementById('currentPw').value = '';
    document.getElementById('newPw').value = '';
    document.getElementById('newPwConfirm').value = '';
    document.getElementById('pwMatchMsg').style.display = 'none';
  }
  function checkPwMatch() {
    var np  = document.getElementById('newPw').value;
    var npc = document.getElementById('newPwConfirm').value;
    var msg = document.getElementById('pwMatchMsg');
    if (npc.length > 0 && np !== npc) {
      msg.style.display = 'block';
    } else {
      msg.style.display = 'none';
    }
  }
  function submitPwChange() {
    var current = document.getElementById('currentPw').value.trim();
    var np      = document.getElementById('newPw').value.trim();
    var npc     = document.getElementById('newPwConfirm').value.trim();
    if (!current || !np || !npc) {
      alert('모든 항목을 입력해 주세요.');
      return;
    }
    if (np !== npc) {
      alert('새 비밀번호가 일치하지 않습니다.');
      return;
    }
    /* [Java] POST /profile/pw-change
     *   파라미터: mberSeq, currentPw, newPw
     *   성공 시: 모달 닫기
     */
    alert('비밀번호가 변경되었습니다.');
    closePwModal();
  }

  /* ── 회원탈퇴 모달 ──
   *
   * 탈퇴 버튼 클릭 시 공사 여부를 먼저 확인한다.
   *
   * [Java] GET /profile/withdraw/check
   *   응답: { hasConstruction: true | false }
   *   - hasConstruction = true  : 진행중 또는 예정인 공사 존재
   *                               → withdrawBlockModal 표시, 탈퇴 차단
   *   - hasConstruction = false : 공사 없음
   *                               → withdrawModal(탈퇴 확인) 표시
   *
   * [Java] POST /profile/withdraw
   *   탈퇴 확인 모달에서 탈퇴 버튼 클릭 시 호출
   *   응답 성공 시 로그인 페이지(login.html)로 이동
   */
  function openWithdrawModal() {
    /* ══════════════════════════════════════════════════
       [Java] 연동 시 아래 fetch 코드를 활성화하고 더미 코드를 제거한다.
       fetch('/profile/withdraw/check')
         .then(r => r.json())

    /* 더미: 공사 없음 시나리오 (Java 연동 전 테스트용) */
    var hasConstruction = false; /* [Java] 실제 연동 시 서버 응답값으로 교체 */
    if (hasConstruction) {
      openWithdrawBlockModal();

    }

  function showWithdrawConfirm() {
    document.getElementById('withdrawModal').classList.add('show');
    lucide.createIcons();
  }
  function closeWithdrawModal() {
    document.getElementById('withdrawModal').classList.remove('show');
  }

  function openWithdrawBlockModal() {
    document.getElementById('withdrawBlockModal').classList.add('show');
    lucide.createIcons();
  }
  function closeWithdrawBlockModal() {
    document.getElementById('withdrawBlockModal').classList.remove('show');
  }

  function submitWithdraw() {
    /* [Java] POST /profile/withdraw

    alert('탈퇴 처리되었습니다.');

<script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
      if (img.complete && img.naturalWidth === 0) applyPlaceholder(img);
    });
  })();
</script>
