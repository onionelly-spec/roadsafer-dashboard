<!--
  header.html — 공통 헤더 컴포넌트
  =====================================================
  [사용법] 각 페이지에서 아래 div를 배치하면 자동 삽입됩니다.
    <div id="rss-header-wrap" data-title="페이지 제목"></div>

  data-title 속성에 페이지 제목을 지정하면 헤더 타이틀이 자동으로 설정됩니다.

  [Java Thymeleaf 전환 시]
    이 파일 내용을 /templates/fragments/header.html 로 이동하고
    각 페이지에서 <div th:replace="fragments/header :: header(title='공지사항')"></div> 로 교체하세요.
  =====================================================
-->
<header class="rss-header">
  <div class="rss-header__left">
    <!-- 모바일 전용 햄버거 버튼 (PC에서는 CSS로 숨김) -->
    <button class="rss-header__toggle rss-header__mobile-toggle" id="rssSidebarToggle"
            aria-label="전체 메뉴 열기">
      <i data-lucide="menu" style="width:20px;height:20px;"></i>
    </button>
    <!-- 페이지 타이틀: data-title 속성 또는 Java th:text로 설정 -->
    <h1 class="rss-header__title" id="rss_header_title">대시보드</h1>
    <!-- [Java] th:text="${pageTitle}" -->
  </div>

  <div class="rss-header__right">
    <!-- 승인관리 버튼 -->
    <!-- [Java] th:if="${session.loginUsr.mberType == 'BLOCK'}" (차단기업 대표만 표시) -->
    <!-- [DB] tbl_mber WHERE mber_type='EMPLOYEE' AND approve_yn=0 AND company_nm=#{loginUsr.companyNm} COUNT -->
    <!-- data-role-block: JS에서 mberType 기준으로 표시/숨김 처리 -->
    <a href="approval.html" class="rss-header__quick-btn" id="header_approve_btn"
       data-role-block="true" aria-label="승인관리">
      <span class="rss-header__quick-label">승인 관리</span>
      <!-- [Java] th:if="${approveCnt > 0}" th:text="${approveCnt}" -->
      <span class="rss-header__quick-badge" id="header_approve_badge">1</span>
    </a>

    <!-- 공지사항 버튼 -->
    <!-- [DB] tbl_noti WHERE mber_id = ? AND read_yn = 0 COUNT -->
    <a href="notice.html" class="rss-header__quick-btn" id="header_notice_btn"
       aria-label="공지사항">
      <span class="rss-header__quick-label">공지사항</span>
      <!-- [Java] th:if="${noticeCnt > 0}" th:text="${noticeCnt}" -->
      <span class="rss-header__quick-badge" id="header_notice_badge">2</span>
    </a>
  </div>
</header>
