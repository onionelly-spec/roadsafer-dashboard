<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차단 신청 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
  <style>
    /* ── 차단 신청 전용 스타일 (공통 CSS에 없는 것만) ──
       ※ 폼 구조:     rss-form-row / rss-form-label (공통)
       ※ 안내 박스:   rss-notice (공통)
       ※ 하단 버튼:   rss-page-actions (공통)
    ── */

    /* 수량 배지 */
    .item-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 24px;
      padding: 0 8px;
      background-color: #94a3b8;
      color: #fff;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      flex-shrink: 0;
    }

    /* 차량 체크박스 리스트 */
    .vehicle-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .vehicle-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: var(--rss-font-sm);
      color: #374151;
    }
    .vehicle-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--rss-amber);
    }
    @media (max-width: 640px) {
      .vehicle-list { gap: 10px; }
    }
  </style>
</head>
<body>

<div class="rss-app">

  <div id="rss-sidebar-wrap"></div>

  <div class="rss-main" id="rssMain">

    <div id="rss-header-wrap" data-title="공사 정보" data-icon="file-text"></div>

    <main class="rss-content">

      <div class="rss-card">
        <div class="rss-card__body">

          <h2 class="text-xl font-bold mb-4">차단 신청</h2>

          <!-- 안내 문구 — rss-notice (공통) -->
          <div class="rss-notice">
            차단 신청을 하기 위해서는 TMA 카드가 등록되어 있어야 하며, TMA3, PLCS는 별도 제출을 선택하여 추후 제출이 가능합니다.<br>
            모든 차단 신청은 '선착순' 신청입니다. <strong>차단 신청 후 별도의 통보 없이 공사 취소, 차단 신청 취소가 발생할 수 있습니다.</strong>
          </div>

          <!-- ══════════════════════════════════════════════════════════════
               차단 신청 폼 (B4-2)
               [Java] th:action="@{/construction/apply/save}"
          ══════════════════════════════════════════════════════════════ -->
          <form id="applyForm" method="post">
            <!-- [Java] <input type="hidden" name="construction_seq" th:value="${construction.constructionSeq}"> -->
            <input type="hidden" name="construction_seq" value="123">

            <!-- 차단 구간 — rss-form-row / rss-form-label (공통) -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="block_section">차단 구간</label>
              <!-- [Java] th:value="${apply.blockSection}" -->
              <input type="text" name="block_section" id="block_section" class="rss-input"
                     placeholder="차단 구간을 입력하세요 (예: 105.6km ~ 105.7km)" required>
            </div>

            <!-- TMA1 -->
            <div class="rss-form-row">
              <label class="rss-form-label">TMA1</label>
              <div class="vehicle-list">
                <!-- [Java] 보유 대수 배지: ${myTma1List.size()} -->
                <span class="item-count-badge">1대</span>
                <!-- [Java] th:each="v : ${myTma1List}" -->
                <label class="vehicle-item">
                  <input type="checkbox" name="tma1_vcl_no" value="11누1111">
                  <span>11누1111</span>
                </label>
              </div>
            </div>

            <!-- TMA3 -->
            <div class="rss-form-row">
              <label class="rss-form-label">TMA3</label>
              <div class="vehicle-list">
                <!-- [Java] 보유 대수 배지: ${myTma3List.size()} -->
                <span class="item-count-badge">2대</span>
                <!-- [Java] th:each="v : ${myTma3List}" -->
                <label class="vehicle-item">
                  <input type="checkbox" name="tma3_vcl_no" value="22마2222">
                  <span>22마2222</span>
                </label>
                <label class="vehicle-item">
                  <input type="checkbox" name="tma3_vcl_no" value="33다3333">
                  <span>33다3333</span>
                </label>
                <label class="vehicle-item">
                  <input type="checkbox" name="tma3_vcl_no" value="55모3232">
                  <span>55모3232</span>
                </label>
                <label class="vehicle-item" style="color:var(--rss-amber);font-weight:600;">
                  <input type="checkbox" name="tma3_sep_yn" value="Y">
                  <span>별도 제출</span>
                </label>
              </div>
            </div>

            <!-- PLCS -->
            <div class="rss-form-row">
              <label class="rss-form-label">PLCS</label>
              <div class="vehicle-list">
                <!-- [Java] 보유 대수 배지: ${myPlcsList.size()} -->
                <span class="item-count-badge">2대</span>
                <!-- [Java] th:each="v : ${myPlcsList}" -->
                <label class="vehicle-item">
                  <input type="checkbox" name="plcs_vcl_no" value="11소6767">
                  <span>11소6767</span>
                </label>
                <label class="vehicle-item">
                  <input type="checkbox" name="plcs_vcl_no" value="32파0090">
                  <span>32파0090</span>
                </label>
                <label class="vehicle-item" style="color:var(--rss-amber);font-weight:600;">
                  <input type="checkbox" name="plcs_sep_yn" value="Y">
                  <span>별도 제출</span>
                </label>
              </div>
            </div>

            <!-- 신호수 -->
            <div class="rss-form-row">
              <label class="rss-form-label">신호수</label>
              <div class="flex items-center gap-3">
                <!-- [Java] 보유 신호수 수: ${signalerCnt} -->
                <span class="item-count-badge">0명</span>
                <select name="signaler_cnt" class="rss-input" style="width:120px;">
                  <option value="0">0명</option>
                  <option value="1">1명</option>
                  <option value="2">2명</option>
                  <option value="3">3명</option>
                </select>
              </div>
            </div>

            <!-- 의견 -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="opinion">의견</label>
              <!-- [Java] th:text="${apply.opinion}" -->
              <textarea name="opinion" id="opinion" class="rss-input rss-textarea"
                        placeholder="차단방법, 일정에 대해 자유로운 의견을 남겨주세요."></textarea>
            </div>

            <!-- 하단 버튼 — rss-page-actions (공통, 취소→등록 순서) -->
            <div class="rss-page-actions">
              <a href="construction-info-detail.html" class="rss-btn rss-btn--outline px-10">
                <i data-lucide="x" style="width:16px;height:16px;"></i>취소
              </a>
              <button type="submit" class="rss-btn rss-btn--amber px-10">
                <i data-lucide="check-circle" style="width:16px;height:16px;"></i>등록
              </button>
            </div>

          </form>

        </div><!-- /rss-card__body -->
      </div><!-- /rss-card -->

    </main>

    <div id="rss-footer-wrap"></div>

  </div><!-- /rss-main -->

</div><!-- /rss-app -->

<script src="rss-common.js?v=a57b458"></script>
<script>
  lucide.createIcons();

  document.getElementById('applyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // [Java] 실제 제출은 th:action으로 처리
    if (confirm('등록하시겠습니까?')) {
      alert('차단신청이 처리되었습니다.');
      location.href = 'construction-list.html';
    }
  });
</script>
  <script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    // 기존 이미지에 onerror 등록
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
    });
    // 동적으로 추가되는 이미지 감지
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            if (node.tagName === 'IMG') {
              node.addEventListener('error', function() { applyPlaceholder(this); });
            }
            node.querySelectorAll && node.querySelectorAll('img').forEach(function(img) {
              img.addEventListener('error', function() { applyPlaceholder(this); });
            });
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
  </script>
</body>
</html>
