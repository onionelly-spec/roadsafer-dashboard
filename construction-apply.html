<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차단 신청 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
  <style>
    /* ── 차단 신청 폼 전용 스타일 ──
       ※ 하단 버튼: rss-page-actions (공통)
       ※ 폼 테이블: form-table (reg-form-table 방식 동일, 모바일 스택 포함)
    ── */

    /* 노란 안내 박스 */
    .apply-notice {
      padding: 16px;
      background-color: #fefce8;
      border: 1px solid #fef08a;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: var(--rss-font-sm);
      line-height: 1.6;
      color: #854d0e;
    }

    /* 폼 테이블 — reg-form-table과 동일 규칙 */
    .form-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 4px;
    }
    .form-table th {
      width: 130px;
      padding: 12px 16px;
      background: #f9fafb;
      border: 1px solid var(--rss-border);
      font-size: var(--rss-font-sm);
      font-weight: 600;
      color: var(--rss-muted);
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }
    .form-table td {
      padding: 12px 16px;
      border: 1px solid var(--rss-border);
      font-size: var(--rss-font-base);
      color: var(--rss-text);
      vertical-align: middle;
    }
    /* 모바일: 테이블 → 스택 레이아웃 (reg-form-table 방식 동일) */
    @media (max-width: 640px) {
      .form-table,
      .form-table tbody,
      .form-table tr,
      .form-table th,
      .form-table td { display: block; width: 100%; }
      .form-table tr { margin-bottom: 12px; }
      .form-table th {
        text-align: left;
        border-bottom: none;
        padding: 8px 12px 4px;
        background: transparent;
        font-size: var(--rss-font-sm);
        color: var(--rss-text);
        font-weight: 700;
      }
      .form-table td {
        border-top: none;
        padding: 4px 12px 8px;
      }
    }

    /* 수량 배지 */
    .item-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 24px;
      padding: 0 8px;
      background-color: #94a3b8;
      color: #fff;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      flex-shrink: 0;
    }

    /* 차량 체크박스 리스트 */
    .vehicle-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .vehicle-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: var(--rss-font-sm);
      color: #374151;
    }
    .vehicle-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--rss-amber);
    }
    @media (max-width: 640px) {
      .vehicle-list { gap: 10px; }
    }
  </style>
</head>
<body>

<div class="rss-app">

  <div id="rss-sidebar-wrap"></div>

  <div class="rss-main" id="rssMain">

    <div id="rss-header-wrap" data-title="공사 정보" data-icon="file-text"></div>

    <main class="rss-content">

      <div class="rss-card">
        <div class="rss-card__body">

          <h2 class="text-xl font-bold mb-4">차단 신청</h2>

          <!-- 안내 문구 -->
          <div class="apply-notice">
            차단 신청을 하기 위해서는 TMA 카드가 등록되어 있어야 하며, TMA3, PLCS는 별도 제출을 선택하여 추후 제출이 가능합니다.<br>
            모든 차단 신청은 '선착순' 신청입니다. <strong style="color:#dc2626;">차단 신청 후 별도의 통보 없이 공사 취소, 차단 신청 취소가 발생할 수 있습니다.</strong>
          </div>

          <!-- ══════════════════════════════════════════════════
               차단 신청 폼 (B4-2)
               [Java] th:action="@{/construction/apply/save}"
          ══════════════════════════════════════════════════ -->
          <form id="applyForm" method="post">
            <!-- [Java] <input type="hidden" name="construction_seq" th:value="${construction.constructionSeq}"> -->
            <input type="hidden" name="construction_seq" value="123">

            <!-- 폼 테이블: form-table (PC: 2열 th+td, 모바일: 세로 스택) -->
            <table class="form-table">
              <tbody>

                <!-- 차단 구간 -->
                <tr>
                  <th scope="row">차단 구간</th>
                  <td>
                    <!-- [Java] th:value="${apply.blockSection}" -->
                    <input type="text" name="block_section" class="rss-input w-full"
                           placeholder="차단 구간을 입력하세요 (예: 105.6km ~ 105.7km)" required>
                  </td>
                </tr>

                <!-- TMA1 -->
                <tr>
                  <th scope="row">TMA1</th>
                  <td>
                    <div class="vehicle-list">
                      <!-- [Java] 보유 대수 배지: ${myTma1List.size()} -->
                      <span class="item-count-badge">1대</span>
                      <!-- [Java] th:each="v : ${myTma1List}" -->
                      <label class="vehicle-item">
                        <input type="checkbox" name="tma1_vcl_no" value="11누1111">
                        <span>11누1111</span>
                      </label>
                    </div>
                  </td>
                </tr>

                <!-- TMA3 -->
                <tr>
                  <th scope="row">TMA3</th>
                  <td>
                    <div class="vehicle-list">
                      <!-- [Java] 보유 대수 배지: ${myTma3List.size()} -->
                      <span class="item-count-badge">2대</span>
                      <!-- [Java] th:each="v : ${myTma3List}" -->
                      <label class="vehicle-item">
                        <input type="checkbox" name="tma3_vcl_no" value="22마2222">
                        <span>22마2222</span>
                      </label>
                      <label class="vehicle-item">
                        <input type="checkbox" name="tma3_vcl_no" value="33다3333">
                        <span>33다3333</span>
                      </label>
                      <label class="vehicle-item">
                        <input type="checkbox" name="tma3_vcl_no" value="55모3232">
                        <span>55모3232</span>
                      </label>
                      <label class="vehicle-item" style="color:var(--rss-amber);font-weight:600;">
                        <input type="checkbox" name="tma3_sep_yn" value="Y">
                        <span>별도 제출</span>
                      </label>
                    </div>
                  </td>
                </tr>

                <!-- PLCS -->
                <tr>
                  <th scope="row">PLCS</th>
                  <td>
                    <div class="vehicle-list">
                      <!-- [Java] 보유 대수 배지: ${myPlcsList.size()} -->
                      <span class="item-count-badge">2대</span>
                      <!-- [Java] th:each="v : ${myPlcsList}" -->
                      <label class="vehicle-item">
                        <input type="checkbox" name="plcs_vcl_no" value="11소6767">
                        <span>11소6767</span>
                      </label>
                      <label class="vehicle-item">
                        <input type="checkbox" name="plcs_vcl_no" value="32파0090">
                        <span>32파0090</span>
                      </label>
                      <label class="vehicle-item" style="color:var(--rss-amber);font-weight:600;">
                        <input type="checkbox" name="plcs_sep_yn" value="Y">
                        <span>별도 제출</span>
                      </label>
                    </div>
                  </td>
                </tr>

                <!-- 신호수 -->
                <tr>
                  <th scope="row">신호수</th>
                  <td>
                    <div class="flex items-center gap-3">
                      <!-- [Java] 보유 신호수 수: ${signalerCnt} -->
                      <span class="item-count-badge">0명</span>
                      <select name="signaler_cnt" class="rss-input" style="width:120px;">
                        <option value="0">0명</option>
                        <option value="1">1명</option>
                        <option value="2">2명</option>
                        <option value="3">3명</option>
                      </select>
                    </div>
                  </td>
                </tr>

                <!-- 의견 -->
                <tr>
                  <th scope="row">의견</th>
                  <td>
                    <!-- [Java] th:text="${apply.opinion}" -->
                    <textarea name="opinion" class="rss-input rss-textarea w-full"
                              placeholder="차단방법, 일정에 대해 자유로운 의견을 남겨주세요."></textarea>
                  </td>
                </tr>

              </tbody>
            </table>

            <!-- 하단 버튼: rss-page-actions (공통 규칙 — 가운데 정렬, 모바일 50%씩 나란히) -->
            <div class="rss-page-actions">
              <button type="submit" class="rss-btn rss-btn--amber px-10">
                <i data-lucide="check-circle" style="width:16px;height:16px;"></i>등록
              </button>
              <a href="construction-info-detail.html" class="rss-btn rss-btn--outline px-10">
                <i data-lucide="x" style="width:16px;height:16px;"></i>취소
              </a>
            </div>

          </form>

        </div><!-- /rss-card__body -->
      </div><!-- /rss-card -->

    </main>

    <div id="rss-footer-wrap"></div>

  </div><!-- /rss-main -->

</div><!-- /rss-app -->

<script src="rss-common.js"></script>
<script>
  lucide.createIcons();

  document.getElementById('applyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // [Java] 실제 제출은 th:action으로 처리
    if (confirm('등록하시겠습니까?')) {
      alert('차단신청이 처리되었습니다.');
      location.href = 'construction-list.html';
    }
  });
</script>
</body>
</html>
