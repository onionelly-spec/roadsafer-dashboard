<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장터 등록/수정 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
</head>
<body>

<div class="rss-app">
  <div id="rss-sidebar-wrap"></div>
  <div class="rss-main" id="rssMain">
    <!-- [Java] 수정 시: data-title="장터 수정", 등록 시: data-title="장터 등록" -->
    <div id="rss-header-wrap" data-title="장터 등록" data-icon="shopping-bag"></div>

    <main class="rss-content">
      <div class="rss-card">
        <div class="rss-card__body">

          <!-- ══════════════════════════════════════════════════
               장터 등록/수정 폼 (스토리보드 §B5-2)
               [Java] POST /market/save (등록)
               [Java] POST /market/update (수정)
               [DB] 테이블: market
               ① 모든 정보 필수 입력
               ② 확인 경고창 → 등록 처리 → 목록(B5)으로 이동
               ③ 취소 → 목록(B5)으로 이동
          ══════════════════════════════════════════════════ -->
          <form id="marketWriteForm" novalidate>
            <!-- 수정 시 시퀀스 hidden 전달 -->
            <!-- [Java] th:if="${item != null}" -->
            <input type="hidden" name="marketSeq" id="marketSeq" /><!-- [DB] market.market_seq -->

            <!-- ① 카테고리 — 라디오 버튼 (스토리보드 §B5-2 ①: 좌측 항목 중 택 1) -->
            <div class="rss-form-row">
              <label class="rss-form-label">
                카테고리<span class="required">*</span>
              </label>
              <!-- [DB] market.market_category ('sinca'|'sign'|'safety'|'sinboard'|'tma') -->
              <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:center; padding-top:4px;">
                <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:var(--rss-font-base); color:var(--rss-text);">
                  <input type="radio" name="marketCategory" value="sinca" />싸인카
                </label>
                <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:var(--rss-font-base); color:var(--rss-text);">
                  <input type="radio" name="marketCategory" value="sign" />간판시설물
                </label>
                <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:var(--rss-font-base); color:var(--rss-text);">
                  <input type="radio" name="marketCategory" value="safety" />안전시설물
                </label>
                <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:var(--rss-font-base); color:var(--rss-text);">
                  <input type="radio" name="marketCategory" value="sinboard" />싸인보드
                </label>
                <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:var(--rss-font-base); color:var(--rss-text);">
                  <input type="radio" name="marketCategory" value="tma" />TMA
                </label>
              </div>
            </div>

            <!-- ② 수량 (스토리보드 §B5-2 ①) -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="marketQty">
                수량<span class="required">*</span>
              </label>
              <!-- [DB] market.market_qty (INT) -->
              <input type="number" name="marketQty" id="marketQty" class="rss-input"
                     placeholder="수량을 입력하세요" min="1" style="max-width:200px;" />
            </div>

            <!-- ③ 규격 (자율 입력, 50자 제한, 스토리보드 §B5-2 ①) -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="marketSpec">
                규격<span class="required">*</span>
              </label>
              <!-- [DB] market.market_spec (VARCHAR 50) -->
              <input type="text" name="marketSpec" id="marketSpec" class="rss-input"
                     placeholder="규격을 입력하세요 (예: 대형, 2022년식, 45,000km)" maxlength="50" />
            </div>

            <!-- ④ 판매가 (자율 입력, 50자 제한, 스토리보드 §B5-2 ①) -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="marketPrice">
                판매가<span class="required">*</span>
              </label>
              <!-- [DB] market.market_price (VARCHAR 50 — '협의' 등 텍스트 허용) -->
              <input type="text" name="marketPrice" id="marketPrice" class="rss-input"
                     placeholder="판매가를 입력하세요 (예: 3,500,000원 또는 협의)" maxlength="50" />
            </div>

            <!-- ⑤ 내용 (textarea, 500자 제한, 스토리보드 §B5-2 ①) -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="marketContent">
                내용<span class="required">*</span>
              </label>
              <!-- [DB] market.market_content (TEXT) -->
              <textarea name="marketContent" id="marketContent" class="rss-input rss-textarea"
                        placeholder="상품 설명을 입력하세요. (최대 500자)" maxlength="500"></textarea>
            </div>

            <!-- ⑥ 이미지 첨부 (최대 10장, 첫 번째 = 대표 이미지, 스토리보드 §B5-2 ①) -->
            <div class="rss-form-row">
              <label class="rss-form-label">
                이미지 첨부
                <span style="font-size:var(--rss-font-sm); color:var(--rss-muted); font-weight:400;">
                  (최대 10장 / 첫 번째 이미지가 대표 이미지)
                </span>
              </label>
              <!-- [DB] 테이블: market_image (market_seq, img_url, original_file_nm, sort_order) -->
              <div class="rss-img-upload" onclick="document.getElementById('marketImages').click()">
                <div class="rss-img-upload__icon">
                  <i data-lucide="image-plus" style="width:32px;height:32px;"></i>
                </div>
                <p class="rss-img-upload__text">클릭하여 이미지를 업로드하세요</p>
                <p class="rss-img-upload__hint">JPG, PNG 지원 / 파일당 최대 5MB / 최대 10장</p>
                <input type="file" name="marketImages" id="marketImages"
                       accept="image/*" multiple onchange="previewImages(this)" />
              </div>
              <div class="rss-img-preview" id="imgPreviewList"></div>
            </div>

          </form>

          <!-- 하단 버튼 — rss-page-actions (공통, 취소→등록 순서) -->
          <div class="rss-page-actions">
            <a href="market.html" class="rss-btn rss-btn--outline px-10">
              <i data-lucide="x" style="width:16px;height:16px;"></i>취소
            </a>
            <button type="button" class="rss-btn rss-btn--amber px-10" onclick="submitMarketForm()">
              <i data-lucide="check-circle" style="width:16px;height:16px;"></i>등록하기
            </button>
          </div>

        </div><!-- /rss-card__body -->
      </div><!-- /rss-card -->
    </main>

    <div id="rss-footer-wrap"></div>
  </div><!-- /rss-main -->
</div><!-- /rss-app -->

<script src="rss-common.js?v=7e12cb4"></script>
<script>
  lucide.createIcons();

  /* 이미지 미리보기 (최대 10장, 스토리보드 §B5-2 ①) */
  function previewImages(input) {
    var list    = document.getElementById('imgPreviewList');
    var files   = Array.from(input.files);
    var maxCount = 10;
    var current  = list.querySelectorAll('.rss-img-preview__item').length;

    if (current >= maxCount) {
      alert('이미지는 최대 10장까지 첨부할 수 있습니다.');
      input.value = '';
      return;
    }

    files.slice(0, maxCount - current).forEach(function(file) {
      if (!file.type.startsWith('image/')) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var item = document.createElement('div');
        item.className = 'rss-img-preview__item';
        item.style.position = 'relative';
        var isFirst = list.querySelectorAll('.rss-img-preview__item').length === 0;
        item.innerHTML = '<img src="' + e.target.result + '" alt="미리보기" />'
          + (isFirst ? '<span style="position:absolute;top:4px;left:4px;background:var(--rss-amber);color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;line-height:1.6;">대표</span>' : '')
          + '<button type="button" class="rss-img-preview__del" onclick="removePreview(this)" aria-label="삭제">✕</button>';
        list.appendChild(item);
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  function removePreview(btn) { btn.closest('.rss-img-preview__item').remove(); }

  /* 폼 제출 (스토리보드 §B5-2 ②) */
  function submitMarketForm() {
    var cat     = document.querySelector('input[name="marketCategory"]:checked');
    var qty     = document.getElementById('marketQty').value.trim();
    var spec    = document.getElementById('marketSpec').value.trim();
    var price   = document.getElementById('marketPrice').value.trim();
    var content = document.getElementById('marketContent').value.trim();

    if (!cat)     { alert('카테고리를 선택해주세요.'); return; }
    if (!qty)     { alert('수량을 입력해주세요.'); return; }
    if (!spec)    { alert('규격을 입력해주세요.'); return; }
    if (!price)   { alert('판매가를 입력해주세요.'); return; }
    if (!content) { alert('내용을 입력해주세요.'); return; }

    /* [Java] 모든 정보 빠짐없이 입력 확인 후 경고창 → 등록 처리 → 목록(B5)으로 이동 */
    if (confirm('등록하시겠습니까?')) {
      alert('등록되었습니다. (더미 동작)');
      location.href = 'market.html';
    }
  }
</script>
  <script>
  /* ── 이미지 로드 실패 시 placeholder 자동 대체 (rss-common) ── */
  (function() {
    var PLACEHOLDER = 'img-placeholder.png';
    function applyPlaceholder(img) {
      if (img.src && img.src.indexOf(PLACEHOLDER) === -1) {
        img.src = PLACEHOLDER;
        img.classList.add('rss-img-error');
      }
    }
    // 기존 이미지에 onerror 등록
    document.querySelectorAll('img').forEach(function(img) {
      img.addEventListener('error', function() { applyPlaceholder(this); });
    });
    // 동적으로 추가되는 이미지 감지
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            if (node.tagName === 'IMG') {
              node.addEventListener('error', function() { applyPlaceholder(this); });
            }
            node.querySelectorAll && node.querySelectorAll('img').forEach(function(img) {
              img.addEventListener('error', function() { applyPlaceholder(this); });
            });
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
  </script>
</body>
</html>
