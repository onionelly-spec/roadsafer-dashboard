<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커뮤니티 글쓰기 — 로드세이프티시스템</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="rss-common.css" />
  <!-- 커뮤니티 글쓰기 전용 스타일 없음 — 모두 rss-common.css 공통 클래스 사용 -->
</head>
<body>

<div class="rss-app">

  <div id="rss-sidebar-wrap"></div>

  <div class="rss-main" id="rssMain">

    <!-- [Java] 수정 시: data-title="커뮤니티 수정", 등록 시: data-title="커뮤니티" -->
    <div id="rss-header-wrap" data-title="커뮤니티" data-icon="users"></div>

    <main class="rss-content">

      <div class="rss-card">
        <div class="rss-card__body">

          <!-- ══════════════════════════════════════════════════
               커뮤니티 등록/수정 폼 (B5-2)
               [Java] POST /community/save (등록)
               [Java] POST /community/update (수정)
               [DB] 테이블: community
          ══════════════════════════════════════════════════ -->
          <!-- [Java] th:action="@{/community/save}" method="post" enctype="multipart/form-data" -->
          <form id="communityWriteForm" novalidate>
            <!-- 수정 시 시퀀스 hidden 전달 -->
            <!-- [Java] th:if="${post != null}" -->
            <input type="hidden" name="communitySeq" id="communitySeq" /><!-- [DB] community.community_seq -->

            <!-- 카테고리 — rss-form-row / rss-form-label (공통) -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="category">
                카테고리<span class="required">*</span>
              </label>
              <!-- [DB] 컬럼: community.category ('info'|'qna'|'free') -->
              <select name="category" id="category" class="rss-select">
                <option value="">카테고리를 선택하세요</option>
                <option value="info">정보공유</option>
                <option value="qna">질문/답변</option>
                <option value="free">자유게시판</option>
              </select>
            </div>

            <!-- 제목 -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="title">
                제목<span class="required">*</span>
              </label>
              <!-- [DB] 컬럼: community.title -->
              <input type="text" name="title" id="title" class="rss-input"
                     placeholder="제목을 입력하세요" maxlength="100" />
            </div>

            <!-- 내용 -->
            <div class="rss-form-row">
              <label class="rss-form-label" for="content">
                내용<span class="required">*</span>
              </label>
              <!-- [DB] 컬럼: community.content (TEXT) -->
              <textarea name="content" id="content" class="rss-input rss-textarea"
                        placeholder="내용을 입력하세요."></textarea>
            </div>

            <!-- 이미지 첨부 — rss-img-upload / rss-img-preview (공통) -->
            <div class="rss-form-row">
              <label class="rss-form-label">이미지 첨부 (최대 3장)</label>
              <!-- [DB] 테이블: community_image (community_seq, img_url, original_file_nm, sort_order) -->
              <div class="rss-img-upload" onclick="document.getElementById('communityImages').click()">
                <div class="rss-img-upload__icon">
                  <i data-lucide="image-plus" style="width:32px;height:32px;"></i>
                </div>
                <p class="rss-img-upload__text">클릭하여 이미지를 업로드하세요</p>
                <p class="rss-img-upload__hint">JPG, PNG, GIF 지원 / 파일당 최대 5MB</p>
                <input type="file" name="communityImages" id="communityImages"
                       accept="image/*" multiple onchange="previewImages(this)" />
              </div>
              <div class="rss-img-preview" id="imgPreviewList"></div>
            </div>

          </form>

          <!-- 하단 버튼 — rss-page-actions (공통, 취소→등록 순서) -->
          <div class="rss-page-actions">
            <a href="community.html" class="rss-btn rss-btn--outline px-10">취소</a>
            <button type="button" class="rss-btn rss-btn--amber px-10" onclick="submitCommunityForm()">
              <i data-lucide="save" style="width:14px;height:14px;"></i>등록하기
            </button>
          </div>

        </div><!-- /rss-card__body -->
      </div><!-- /rss-card -->

    </main>

    <div id="rss-footer-wrap"></div>

  </div><!-- /rss-main -->

</div><!-- /rss-app -->

<script src="rss-common.js?v=ae2cc2c"></script>
<script>
  lucide.createIcons();

  /* ── 이미지 미리보기 ── */
  function previewImages(input) {
    var list = document.getElementById('imgPreviewList');
    var files = Array.from(input.files);
    var maxCount = 3;
    var current = list.querySelectorAll('.rss-img-preview__item').length;
    files.slice(0, maxCount - current).forEach(function(file) {
      if (!file.type.startsWith('image/')) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var item = document.createElement('div');
        item.className = 'rss-img-preview__item';
        item.innerHTML = '<img src="' + e.target.result + '" alt="미리보기" />'
          + '<button type="button" class="rss-img-preview__del" onclick="removePreview(this)" aria-label="삭제">✕</button>';
        list.appendChild(item);
      };
      reader.readAsDataURL(file);
    });
  }

  function removePreview(btn) { btn.closest('.rss-img-preview__item').remove(); }

  /* ── 폼 제출 ──────────────────────────────────────────────
     [Java] document.getElementById('communityWriteForm').submit();
  ─────────────────────────────────────────────────────────── */
  function submitCommunityForm() {
    var category = document.getElementById('category').value;
    var title    = document.getElementById('title').value.trim();
    var content  = document.getElementById('content').value.trim();
    if (!category) { alert('카테고리를 선택해주세요.'); return; }
    if (!title)    { alert('제목을 입력해주세요.'); return; }
    if (!content)  { alert('내용을 입력해주세요.'); return; }
    /* [Java] document.getElementById('communityWriteForm').submit(); */
    alert('등록되었습니다. (더미 동작)');
    location.href = 'community.html';
  }
</script>
</body>
</html>
